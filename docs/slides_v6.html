</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="141" lang="en-US">
<h1 id="webmcp-vs-backend-mcp-integration">WebMCP vs. Backend MCP Integration</h1>
<h2 id="tabla-comparativa-1">Tabla comparativa</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="142" lang="en-US">
<table>
<thead>
<tr>
<th>Aspecto</th>
<th>WebMCP</th>
<th>Backend MCP</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Dónde corre el código</strong></td>
<td>Client-side JavaScript en el navegador</td>
<td>Server-side (Python, Node.js, etc.)</td>
</tr>
<tr>
<td><strong>Requiere navegación</strong></td>
<td>Sí - la página debe estar abierta</td>
<td>No - siempre disponible si el servidor corre</td>
</tr>
<tr>
<td><strong>Contexto UI compartido</strong></td>
<td>Sí - usuario y agente comparten la misma página</td>
<td>No - el agente interactúa sin UI</td>
</tr>
<tr>
<td><strong>Auth / sesión</strong></td>
<td>Naturalmente compartida con la sesión del navegador</td>
<td>Debe gestionarse separadamente</td>
</tr>
<tr>
<td><strong>Mejor para</strong></td>
<td>Escenarios colaborativos, human-in-the-loop</td>
<td>Flujos autónomos, headless, server-to-server</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="143" lang="en-US">
<p><strong>Conclusión: Son complementarios, no competidores.</strong></p>
<p>Muchas aplicaciones usarán ambos.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="144" lang="en-US">
<h1 id="webmcp-vs-ui-actuation">WebMCP vs. UI Actuation</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="145" lang="en-US">
<table>
<thead>
<tr>
<th>Aspecto</th>
<th>WebMCP</th>
<th>UI Actuation</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Fiabilidad</strong></td>
<td>Alta</td>
<td>Baja - frágil a cambios de UI</td>
</tr>
<tr>
<td><strong>Velocidad</strong></td>
<td>Rápida - llamadas directas</td>
<td>Lenta - múltiples pasos</td>
</tr>
<tr>
<td><strong>Control del desarrollador</strong></td>
<td>Total - defines las tools</td>
<td>Ninguno - el agente adivina</td>
</tr>
<tr>
<td><strong>Costo en tokens</strong></td>
<td>Bajo - JSON compacto</td>
<td>~2,000 tokens/screenshot</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="146" lang="en-US">
<h1 id="webmcp-vs-openapi--a2a">WebMCP vs. OpenAPI &amp; A2A</h1>
<h2 id="otros-enfoques">Otros enfoques</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="147" lang="en-US">
<h3 id="vs-openapi">vs. OpenAPI</h3>
<p>OpenAPI describe APIs HTTP para function-calling (ChatGPT Actions, Gemini Function Calling).</p>
<p>WebMCP corre en el navegador usando JavaScript, no HTTP. Las tools ejecutan client-side.</p>
<p><strong>Relación: complementarios - OpenAPI para server-side, WebMCP para client-side.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="148" lang="en-US">
<h3 id="vs-agent2agent-a2a">vs. Agent2Agent (A2A)</h3>
<p>A2A conecta agentes de IA entre sí, con advertisement de capacidades, interacciones de larga duración, y I/O multimodal.</p>
<p>WebMCP es para conectar agentes de IA a aplicaciones web con un humano en el loop.</p>
<p><strong>Relación: problemas diferentes - A2A para agent mesh, WebMCP para workflows web humano+agente.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="149" lang="en-US">
<h1 id="which-approach-to-use">Which Approach to Use?</h1>
<h2 id="gu%C3%ADa-de-decisi%C3%B3n">Guía de decisión</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="150" lang="en-US">
<h3 id="usa-webmcp-cuando">Usa WebMCP cuando...</h3>
<ul>
<li>El usuario está activamente presente en la pestaña</li>
<li>Quieres reutilizar código frontend</li>
<li>Se requiere supervisión humana</li>
<li>El contexto UI compartido importa</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="151" lang="en-US">
<h3 id="usa-backend-mcp-cuando">Usa Backend MCP cuando...</h3>
<ul>
<li>No se necesita pestaña de navegador</li>
<li>Workflows server-to-server</li>
<li>Pipelines totalmente autónomos</li>
<li>Herramientas siempre disponibles</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="152" lang="en-US">
<h3 id="usa-openapi-cuando">Usa OpenAPI cuando...</h3>
<ul>
<li>Exponiendo APIs HTTP REST</li>
<li>Integración ChatGPT/Gemini</li>
<li>Consumidores estándar de APIs web</li>
<li>Sin acceso al código frontend</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="153" lang="en-US">
<h3 id="usa-a2a-cuando">Usa A2A cuando...</h3>
<ul>
<li>Comunicación agent-to-agent</li>
<li>Tareas de agentes de larga duración</li>
<li>I/O multimodal de agentes</li>
<li>Sin humano en el loop</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="154" lang="en-US">
<h1 id="canonical-use-cases">Canonical Use Cases</h1>
<h2 id="tres-ejemplos-oficiales-del-w3c">Tres ejemplos oficiales del W3C</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="155" lang="en-US">
<h3 id="creative-applications">Creative Applications</h3>
<p><strong>Scenario:</strong> Un usuario colabora con un agente del navegador en una plataforma de diseño gráfico. El agente ayuda a encontrar plantillas y hacer cambios de diseño mientras el usuario retiene revisión y control completos.</p>
<p><strong>Example Tools:</strong></p>
<ul>
<li><code>filterTemplates(description)</code></li>
<li><code>editDesign(instructions)</code></li>
<li><code>orderPrint(designId, format)</code></li>
</ul>
<p><strong>Benefit:</strong> El agente descubre features que el usuario no sabía que existían.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="156" lang="en-US">
<h1 id="canonical-use-cases-continuaci%C3%B3n">Canonical Use Cases (continuación)</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="157" lang="en-US">
<h3 id="e-commerce--shopping">E-Commerce / Shopping</h3>
<p><strong>Scenario:</strong> Un usuario navega una tienda de ropa. El agente llama <code>getDresses(size)</code> para recibir una lista JSON estructurada con descripciones e imágenes, filtra por criterios, luego llama <code>showDresses(product_ids)</code> para actualizar la UI.</p>
<p><strong>Example Tools:</strong></p>
<ul>
<li><code>getDresses(size, color?, priceMax?)</code></li>
<li><code>showDresses(productIds)</code></li>
<li><code>addToCart(productId, size)</code></li>
</ul>
<p><strong>Benefit:</strong> Respuesta JSON estructurada vs miles de tokens de screenshots.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="158" lang="en-US">
<h3 id="developer-tooling-code-review">Developer Tooling (Code Review)</h3>
<p><strong>Scenario:</strong> En una plataforma de code review como Gerrit, herramientas específicas permiten al agente recuperar datos de fallos de test y aplicar sugerencias de código de forma estructurada.</p>
<p><strong>Example Tools:</strong></p>
<ul>
<li><code>getTryRunStatuses(patchsetId)</code> - Retorna datos de fallos de CI</li>
<li><code>addSuggestedEdit(filename, patch)</code> - Aplica sugerencia al review</li>
<li><code>getOpenComments()</code> - Lista comentarios sin resolver</li>
</ul>
<p><strong>Benefit:</strong> El agente maneja trabajo repetitivo; el humano revisa y aprueba.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="159" lang="en-US">
<h1 id="accessibility-benefits">Accessibility Benefits</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="160" lang="en-US">
<h3 id="problema-tradicional">Problema tradicional</h3>
<p>Los accessibility trees tradicionales no están ampliamente implementados. Las tecnologías de asistencia tienen dificultades para interactuar con aplicaciones web complejas vía interacciones a nivel de DOM.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="161" lang="en-US">
<h3 id="lo-que-webmcp-proporciona">Lo que WebMCP proporciona</h3>
<p>Acciones de aplicación de alto nivel estandarizadas mapeadas a operaciones significativas (ej: &quot;añadir item de todo&quot;) en lugar de interacciones DOM de bajo nivel.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="162" lang="en-US">
<h3 id="unified-surface">Unified Surface</h3>
<p>Las mismas tools disponibles para agentes de IA están disponibles para herramientas de accesibilidad - una implementación sirve para ambas audiencias sin trabajo extra.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="163" lang="en-US">
<h1 id="testing--debugging-api">Testing &amp; Debugging API</h1>
<h2 id="inspectormodelcontexttesting">inspector.modelContextTesting</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="164" lang="en-US">
<p><strong>Disponible en Chrome 146+ con flag</strong></p>
<p><code>#enable-webmcp-for-testing</code> en chrome://flags</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="165" lang="en-US">
<h3 id="qu%C3%A9-es">Qué es</h3>
<p>Un companion de testing para <code>navigator.modelContextTesting</code>. Puede leer y reemplazar todas las tools registradas en la página actual.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="166" lang="en-US">
<h3 id="qui%C3%A9n-lo-usa">Quién lo usa</h3>
<p>Extensiones de navegador, paneles de DevTools, y scripts de test automatizados que necesitan inspeccionar o hacer stub de tools sin modificar el código fuente.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="167" lang="en-US">
<p><strong>Solo desarrollo - no disponible en producción.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="168" lang="en-US">
<h1 id="testing-api---feature-detection">Testing API - Feature Detection</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="169" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Check production API</span>
<span class="hljs-keyword">if</span> (<span class="hljs-string">&#x27;modelContext&#x27;</span> <span class="hljs-keyword">in</span> navigator) {
  <span class="hljs-comment">// Safe to call registerTool / unregisterTool</span>
  navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({ ... });
}

<span class="hljs-comment">// Check testing API (dev environments only)</span>
<span class="hljs-keyword">if</span> (<span class="hljs-string">&#x27;modelContextTesting&#x27;</span> <span class="hljs-keyword">in</span> navigator) {
  <span class="hljs-comment">// Safe to call getTools / provideContext / clearContext</span>
  <span class="hljs-keyword">const</span> tools = <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">modelContextTesting</span>.<span class="hljs-title function_">getTools</span>();
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="170" lang="en-US">
<p><strong>Importante:</strong> Siempre verificar existencia antes de usar.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="171" lang="en-US">
<h1 id="testing-api---gettools">Testing API - getTools()</h1>
<h2 id="listar-herramientas-registradas">Listar herramientas registradas</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="172" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Listar todas las tools registradas en la página</span>
<span class="hljs-keyword">const</span> tools = <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">modelContextTesting</span>.<span class="hljs-title function_">getTools</span>();
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(tools.<span class="hljs-title function_">map</span>(<span class="hljs-function"><span class="hljs-params">t</span> =&gt;</span> t.<span class="hljs-property">name</span>));
<span class="hljs-comment">// → [&quot;searchProducts&quot;, &quot;addToCart&quot;, &quot;checkout&quot;]</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="173" lang="en-US">
<h1 id="testing-api---providecontext">Testing API - provideContext()</h1>
<h2 id="reemplazar-herramientas-en-una-llamada-at%C3%B3mica">Reemplazar herramientas en una llamada atómica</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="174" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Reemplaza TODAS las tools actualmente registradas</span>
<span class="hljs-keyword">await</span> navigator.<span class="hljs-property">modelContextTesting</span>.<span class="hljs-title function_">provideContext</span>({
  <span class="hljs-attr">tools</span>: [
    {
      <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;stubSearch&quot;</span>,
      <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Returns mock search results&quot;</span>,
      <span class="hljs-attr">inputSchema</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
        <span class="hljs-attr">properties</span>: {
          <span class="hljs-attr">query</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span> }
        }
      },
      <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> () =&gt; ({ <span class="hljs-attr">results</span>: [<span class="hljs-string">&quot;mock-item-1&quot;</span>] })
    }
  ]
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="175" lang="en-US">
<p><strong>Benefit:</strong> Atómico - no hay estado intermedio visible para los agentes.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="176" lang="en-US">
<h1 id="testing-api---clearcontext">Testing API - clearContext()</h1>
<h2 id="limpiar-todas-las-herramientas">Limpiar todas las herramientas</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="177" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Tear down después de cada test</span>
<span class="hljs-title function_">afterEach</span>(<span class="hljs-title function_">async</span> () =&gt; {
  <span class="hljs-keyword">if</span> (<span class="hljs-string">&#x27;modelContextTesting&#x27;</span> <span class="hljs-keyword">in</span> navigator) {
    <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">modelContextTesting</span>.<span class="hljs-title function_">clearContext</span>();
  }
});

<span class="hljs-comment">// O resetear antes de cada escenario</span>
<span class="hljs-title function_">beforeEach</span>(<span class="hljs-title function_">async</span> () =&gt; {
  <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">modelContextTesting</span>.<span class="hljs-title function_">clearContext</span>();
  <span class="hljs-comment">// Luego registrar exactamente las tools que este test necesita</span>
  navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;myTool&quot;</span>, ... });
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="178" lang="en-US">
<h1 id="testing-api---executetool">Testing API - executeTool()</h1>
<h2 id="ejecutar-herramientas-directamente">Ejecutar herramientas directamente</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="179" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Listar tools primero</span>
<span class="hljs-keyword">const</span> tools = <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">modelContextTesting</span>.<span class="hljs-title function_">getTools</span>();
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(tools.<span class="hljs-title function_">map</span>(<span class="hljs-function"><span class="hljs-params">t</span> =&gt;</span> t.<span class="hljs-property">name</span>));
<span class="hljs-comment">// → [&quot;searchProducts&quot;, &quot;addToCart&quot;, &quot;checkout&quot;]</span>

<span class="hljs-comment">// Ejecutar una tool específica con input de test</span>
<span class="hljs-keyword">const</span> result = <span class="hljs-keyword">await</span> navigator.<span class="hljs-property">modelContextTesting</span>
  .<span class="hljs-title function_">executeTool</span>(<span class="hljs-string">&quot;searchProducts&quot;</span>, { <span class="hljs-attr">query</span>: <span class="hljs-string">&quot;shoes&quot;</span> });
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(result);
<span class="hljs-comment">// → { products: [...], total: 12 }</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="180" lang="en-US">
<h1 id="testing-api---idl-summary">Testing API - IDL Summary</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="181" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">partial interface <span class="hljs-title class_">Navigator</span> {
  [<span class="hljs-title class_">SecureContext</span>] 
  readonly attribute <span class="hljs-title class_">ModelContextTesting</span> modelContextTesting;
};

[<span class="hljs-title class_">Exposed</span>=<span class="hljs-title class_">Window</span>, <span class="hljs-title class_">SecureContext</span>]
interface <span class="hljs-title class_">ModelContextTesting</span> {
  <span class="hljs-comment">// Leer todas las tools registradas en esta página</span>
  <span class="hljs-title class_">Promise</span>&lt;<span class="hljs-title class_">FrozenArray</span>&lt;<span class="hljs-title class_">ModelContextToolInfo</span>&gt;&gt; <span class="hljs-title function_">getTools</span>();

  <span class="hljs-comment">// Reemplazar todo el conjunto de tools atómicamente</span>
  <span class="hljs-literal">undefined</span> <span class="hljs-title function_">provideContext</span>(<span class="hljs-title class_">ModelContextInit</span> init);

  <span class="hljs-comment">// Eliminar todas las tools registradas</span>
  <span class="hljs-literal">undefined</span> <span class="hljs-title function_">clearContext</span>();

  <span class="hljs-comment">// Invocar una tool por nombre con JSON input</span>
  <span class="hljs-title class_">Promise</span>&lt;object&gt; <span class="hljs-title function_">executeTool</span>(<span class="hljs-title class_">DOMString</span> name, object input);
};
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="182" lang="en-US">
<h1 id="security--privacy">Security &amp; Privacy</h1>
<h2 id="dos-trust-boundaries">Dos Trust Boundaries</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="183" lang="en-US">
<h3 id="boundary-1-site-%E2%86%92-browser">Boundary 1: Site → Browser</h3>
<p>Cuando un sitio web registra tools vía WebMCP, expone información sobre sus capacidades al navegador.</p>
<p><strong>El navegador debe:</strong></p>
<ul>
<li>Pedir permiso al usuario</li>
<li>Proporcionar visibilidad sobre qué tools están expuestas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="184" lang="en-US">
<h3 id="boundary-2-agent-%E2%86%92-site-via-browser">Boundary 2: Agent → Site (via Browser)</h3>
<p>Cuando un agente quiere usar esas tools, el sitio recibe input no confiable en parámetros y las salidas pueden contener datos sensibles del usuario.</p>
<p><strong>El navegador media este límite.</strong></p>
<p>**Usuarios pueden &quot;always allow&quot; tool calls para pares sitio+agente confiables.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="185" lang="en-US">
<h1 id="security---https-required">Security - HTTPS Required</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="186" lang="en-US">
<p><code>navigator.modelContext</code> tiene <code>[SecureContext]</code> - solo existe en páginas HTTPS.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="187" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// En HTTP - undefined</span>
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(navigator.<span class="hljs-property">modelContext</span>); <span class="hljs-comment">// undefined</span>

<span class="hljs-comment">// En HTTPS - funciona</span>
navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>(...);
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="188" lang="en-US">
<p><strong>Verificar antes de llamar:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">if</span> (<span class="hljs-variable language_">window</span>.<span class="hljs-property">isSecureContext</span>) {
  navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>(...);
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="189" lang="en-US">
<h1 id="security---top-level-browsing-contexts-only">Security - Top-Level Browsing Contexts Only</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="190" lang="en-US">
<p>Solo un contexto de navegación de nivel superior (una pestaña del navegador) puede ser un Model Context Provider.</p>
<p><strong>iframes están excluidos.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="191" lang="en-US">
<h3 id="por-qu%C3%A9-iframes-est%C3%A1n-excluidos">Por qué iframes están excluidos</h3>
<ul>
<li>Mantiene un límite de seguridad claro</li>
<li>Previene que contenido embebido exponga tools sin conocimiento de la página padre</li>
<li>Los embedders gestionan capacidades de contextos embebidos</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="192" lang="en-US">
<h1 id="security---model-poisoning-risk">Security - Model Poisoning Risk</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="193" lang="en-US">
<h3 id="el-riesgo">El Riesgo</h3>
<p>Desarrolladores web maliciosos podrían crear tools para exponer contenido que el usuario normalmente no vería, o manipular comportamiento del agente a través de descripciones y respuestas de tools cuidadosamente diseñadas.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="194" lang="en-US">
<p><strong>Esto es una pregunta abierta en el spec - activamente bajo investigación por el W3C community group.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="195" lang="en-US">
<h1 id="security---cross-origin-isolation">Security - Cross-Origin Isolation</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="196" lang="en-US">
<h3 id="la-preocupaci%C3%B3n">La Preocupación</h3>
<p>Data output de las tools de una app podría pasarse como input a las tools de otra app. Aunque workflows cross-origin legítimos existen, esto requiere mediación cuidadosa del navegador.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="197" lang="en-US">
<h3 id="browser-responsibility">Browser Responsibility</h3>
<p>El navegador debe indicar claramente qué aplicaciones web están siendo invocadas y con qué datos, para que los usuarios puedan intervenir en cadenas de tools cross-origin.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="198" lang="en-US">
<h1 id="security---developer-checklist">Security - Developer Checklist</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="199" lang="en-US">
<h3 id="input-validation">Input Validation</h3>
<ul>
<li>Siempre validar inputs del agente contra tu inputSchema</li>
<li>Tratar input como no confiable (como input de usuario de un formulario)</li>
<li>Sanitizar strings antes de usar en queries o HTML</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="200" lang="en-US">
<h3 id="sensitive-data">Sensitive Data</h3>
<ul>
<li>Solo retornar datos que el usuario tiene permiso de ver</li>
<li>No exponer PII en respuestas de tools innecesariamente</li>
<li>Usar <code>requestUserInteraction</code> para operaciones destructivas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="201" lang="en-US">
<h3 id="auth--state">Auth &amp; State</h3>
<ul>
<li>Verificar que el usuario está autenticado antes de registrar tools sensibles</li>
<li>Eliminar tools cuando el usuario hace logout</li>
<li>Marcar tools de solo lectura con <code>readOnlyHint: true</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="202" lang="en-US">
<h1 id="future-roadmap">Future Roadmap</h1>
<h2 id="extensiones-planificadas-y-preguntas-abiertas">Extensiones planificadas y preguntas abiertas</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="203" lang="en-US">
<h3 id="declarative-webmcp">Declarative WebMCP</h3>
<p><strong>Status:</strong> TODO en spec - deferred</p>
<p><strong>Concepto:</strong> Registrar tools vía elementos HTML en lugar de llamadas JavaScript <code>registerTool()</code>. Las tools se derivarían de formularios HTML y sus elementos asociados.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="204" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-html"><span class="hljs-comment">&lt;!-- Conceptual future syntax --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">form</span> <span class="hljs-attr">webmcp-tool</span>=<span class="hljs-string">&quot;searchProducts&quot;</span>
      <span class="hljs-attr">webmcp-description</span>=<span class="hljs-string">&quot;Search for products&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">input</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;query&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;text&quot;</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">form</span>&gt;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="205" lang="en-US">
<p>Un algoritmo &quot;synthesize a declarative JSON Schema&quot; derivaría el inputSchema de los elementos del formulario automáticamente.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="206" lang="en-US">
<h1 id="future-roadmap-continuaci%C3%B3n">Future Roadmap (continuación)</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="207" lang="en-US">
<h3 id="progressive-web-apps-pwas">Progressive Web Apps (PWAs)</h3>
<p><strong>Status:</strong> Future exploration</p>
<p><strong>Concepto:</strong> Una PWA con manifest podría declarar tools disponibles &quot;offline&quot; - antes de que la PWA se lance. Cuando un agente llama la tool, el sistema host auto-lanza la PWA y navega a la página apropiada.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="208" lang="en-US">
<p><strong>Esto cerraría la brecha entre WebMCP (tab debe estar abierta) y backend MCP (siempre disponible).</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="209" lang="en-US">
<h3 id="background-model-context-providers">Background Model Context Providers</h3>
<p><strong>Status:</strong> Future exploration</p>
<p><strong>Concepto:</strong> Algunas tools pueden no requerir UI de navegador. Una app de to-do podría exponer una tool &quot;add item&quot; que corre sin mostrar ventana - mostrando solo una notificación cuando se trigger.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="210" lang="en-US">
<p><strong>Punto de integración:</strong> Podría combinarse con la web app launch handler API para ejecución de tools en background seamless.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="211" lang="en-US">
<h1 id="future-roadmap---tool-discovery">Future Roadmap - Tool Discovery</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="212" lang="en-US">
<h3 id="current-limitation">Current Limitation</h3>
<p>Las tools solo son descubribles una vez que se navega a una página. Un agente no puede saber qué tools ofrece un sitio sin cargarlo primero.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="213" lang="en-US">
<h3 id="future-manifest-based-discovery">Future: Manifest-Based Discovery</h3>
<p>Definiciones de tools declarativas en el app manifest permitirían a agentes descubrir capacidades de un sitio vía un simple HTTP GET - sin navegación completa de página.</p>
<p><strong>Los agentes seguirían necesitando navegar para usar las tools.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="214" lang="en-US">
<h1 id="future-roadmap---open-design-questions">Future Roadmap - Open Design Questions</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="215" lang="en-US">
<h3 id="main-thread-performance">Main Thread Performance</h3>
<p>Las llamadas a tools corren en el main thread. Cuando los agentes solicitan muchas llamadas en secuencia o las tools son computacionalmente costosas, esto puede causar problemas de rendimiento.</p>
<p><strong>Status:</strong> Under investigation.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="216" lang="en-US">
<h3 id="permission-model-details">Permission Model Details</h3>
<p>El UX exacto para los prompts de permiso del navegador - cuándo preguntar, cómo formularlo, qué granularidad de &quot;always allow&quot; - necesita más input de la comunidad y coordinación con browser vendors.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="217" lang="en-US">
<h3 id="iframe-capabilities">iframe Capabilities</h3>
<p>¿Cómo deberían los embedders (páginas padre) gestionar las capacidades proporcionadas a iframes embebidos? La propuesta actual limita esto a contextos de nivel superior, pero trabajo futuro puede definir modelos de delegación.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="218" lang="en-US">
<h1 id="spec-status--governance">Spec Status &amp; Governance</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="219" lang="en-US">
<h3 id="current-status">Current Status</h3>
<p>Draft Community Group Report - 9 March 2026</p>
<p><strong>NOT a W3C Standard, nor on the W3C Standards Track. Under incubation.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="220" lang="en-US">
<h3 id="editors">Editors</h3>
<ul>
<li>Brandon Walderman - Microsoft</li>
<li>Khushal Sagar - Google</li>
<li>Dominic Farolino - Google</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="221" lang="en-US">
<h3 id="governing-body">Governing Body</h3>
<p>W3C Web Machine Learning Community Group</p>
<p>License: W3C Community Contributor License Agreement (CLA)</p>
<p>First published: August 13, 2025</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="222" lang="en-US">
<h1 id="resources--tools">Resources &amp; Tools</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="223" lang="en-US">
<h3 id="webmcp-inspector">WebMCP Inspector</h3>
<p>Inspect &amp; augment WebMCP tools on any page. Browse, test, and debug tools registered via navigator.modelContext directly in your browser.</p>
<p><strong>URL:</strong> webmcpinspector.com/inspect/</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="224" lang="en-US">
<h3 id="model-context-tool-inspector">Model Context Tool Inspector</h3>
<p>A Chrome extension built on <code>navigator.modelContextTesting</code> that provides a visual UI:</p>
<ul>
<li>Lists all tools registered on the current page with full schema</li>
<li>Execute any tool with a JSON input editor</li>
<li>View execution output in real time</li>
<li>Optionally chain calls through Gemini for agent-style testing</li>
</ul>
<p><strong>Source:</strong> github.com/beaufortfrancois/model-context-tool-inspector</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="225" lang="en-US">
<h1 id="prior-art--related-projects">Prior Art &amp; Related Projects</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="226" lang="en-US">
<h3 id="mcp-b-webmcp-by-miguelspizza">MCP-B (WebMCP by MiguelsPizza)</h3>
<p>Open-source project with similar motivation. Extends MCP with tab transports for in-page communication and extension transports for cross-extension communication. Enables tool caching and cross-site tool composition.</p>
<p><strong>Acknowledged as directly related prior art by the W3C spec.</strong></p>
<p>github.com/MiguelsPizza/WebMCP</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="227" lang="en-US">
<h3 id="openapi">OpenAPI</h3>
<p>Standard for describing HTTP APIs. Used by ChatGPT Actions and Gemini Function Calling. Unlike WebMCP, OpenAPI tools are backend HTTP services - no browser required.</p>
<p><strong>Relationship:</strong> Complementary - OpenAPI for server-side, WebMCP for client-side.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="228" lang="en-US">
<h3 id="agent2agent-a2a">Agent2Agent (A2A)</h3>
<p>Protocol for AI agent-to-agent communication. Provides capability advertisement, long-running interactions, and multimodal I/O.</p>
<p><strong>Relationship:</strong> Different problem - A2A for agent mesh, WebMCP for human+agent web workflows.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="229" lang="en-US">
<h1 id="key-design-rationale">Key Design Rationale</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="230" lang="en-US">
<h3 id="why-align-with-mcp">Why Align with MCP?</h3>
<ul>
<li>Cualquier agente compatible con MCP funciona con traducción mínima</li>
<li>Desarrolladores pueden reutilizar código entre WebMCP y backend MCP</li>
<li>El navegador puede evolucionar compatibilidad MCP independientemente</li>
<li>Políticas de seguridad web-platform pueden aplicarse</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="231" lang="en-US">
<h3 id="why-not-static-manifests">Why Not Static Manifests?</h3>
<ul>
<li>Limitaría WebMCP a PWAs instalados solo</li>
<li>Un nuevo formato de manifest aún necesita implementación</li>
<li>No puede ejecutar código o actualizar tools dinámicamente</li>
<li>El registro dinámico es una capability crítica para desarrolladores</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="232" lang="en-US">
<h3 id="why-top-level-only">Why Top-Level Only?</h3>
<ul>
<li>Límite de seguridad claro y entendible</li>
<li>Previene leakage de capacidades basado en iframes</li>
<li>Embedders gestionan capacidades de iframes</li>
<li>Modelo mental más simple para usuarios y desarrolladores</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="233" lang="en-US">
<h1 id="mejores-pr%C3%A1cticas---descripci%C3%B3n">Mejores Prácticas - Descripción</h1>
<h2 id="escribir-descripciones-claras">Escribir descripciones claras</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="234" lang="en-US">
<p><strong>La descripción es lo más importante.</strong></p>
<p>La IA la usa para decidir si llamar a la tool.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="235" lang="en-US">
<p><strong><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Malo:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Busca productos&quot;</span>
</code></pre>
<p>Demasiado vago. La IA no sabe bien qué hace.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="236" lang="en-US">
<p><strong><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Bueno:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Busca productos en el catálogo por palabra clave. Retorna una lista de productos con nombre, precio y disponibilidad.&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="237" lang="en-US">
<p><strong>Regla:</strong></p>
<p>Escribe como si le explicaras a otra persona.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="238" lang="en-US">
<h1 id="mejores-pr%C3%A1cticas---inputschema">Mejores Prácticas - inputSchema</h1>
<h2 id="ser-espec%C3%ADfico-con-los-tipos">Ser específico con los tipos</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="239" lang="en-US">
<p><strong>Cada campo debe tener:</strong></p>
<ul>
<li>Tipo de dato</li>
<li>Descripción</li>
<li>Restricciones (si aplica)</li>
<li>Si es obligatorio</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="240" lang="en-US">
<p><strong><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Débil:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">properties</span>: { <span class="hljs-attr">id</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span> } }
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="241" lang="en-US">
<p><strong><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Preciso:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">properties</span>: {
  <span class="hljs-attr">productId</span>: { 
    <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
    <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;UUID del producto (formato: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)&quot;</span>
  },
  <span class="hljs-attr">quantity</span>: { 
    <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;integer&quot;</span>,
    <span class="hljs-attr">minimum</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">maximum</span>: <span class="hljs-number">99</span>,
    <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Cantidad a añadir (1-99)&quot;</span>
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="242" lang="en-US">
<h1 id="mejores-pr%C3%A1cticas---readonlyhint">Mejores Prácticas - readOnlyHint</h1>
<h2 id="indicar-correctamente-el-tipo">Indicar correctamente el tipo</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="243" lang="en-US">
<p><strong>Regla simple:</strong></p>
<ul>
<li>Si la tool solo lee datos → <code>readOnlyHint: true</code></li>
<li>Si la tool modifica datos → omitir o <code>false</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="244" lang="en-US">
<p><strong>Por qué importa:</strong></p>
<ul>
<li>Los clientes pueden priorizar tools de solo lectura</li>
<li>Herramientas de escritura pueden requerir confirmación</li>
<li>Mejor experiencia de usuario</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="245" lang="en-US">
<h1 id="mejores-pr%C3%A1cticas---errores">Mejores Prácticas - Errores</h1>
<h2 id="retornar-siempre-errores-estructurados">Retornar siempre errores estructurados</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="246" lang="en-US">
<p><strong><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Nunca hacer:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">try</span> {
  <span class="hljs-keyword">return</span> <span class="hljs-keyword">await</span> <span class="hljs-title function_">operation</span>();
} <span class="hljs-keyword">catch</span> {
  <span class="hljs-keyword">return</span> <span class="hljs-literal">null</span>; <span class="hljs-comment">// Pierde información</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="247" lang="en-US">
<p><strong><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Siempre hacer:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">try</span> {
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: <span class="hljs-keyword">await</span> <span class="hljs-title function_">operation</span>() };
} <span class="hljs-keyword">catch</span> (error) {
  <span class="hljs-keyword">return</span> { 
    <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>, 
    <span class="hljs-attr">error</span>: error.<span class="hljs-property">message</span>,
    <span class="hljs-attr">code</span>: error.<span class="hljs-property">code</span> 
  };
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="248" lang="en-US">
<h1 id="anti-patrones---descripci%C3%B3n-vaga">Anti-Patrones - Descripción Vaga</h1>
<h2 id="lo-que-no-hacer">Lo que NO hacer</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="249" lang="en-US">
<p><strong>Demasiado corta:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Hace algo&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="250" lang="en-US">
<p><strong>Sin contexto:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Función helper&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="251" lang="en-US">
<p><strong>Técnica sin explicar:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">description</span>: <span class="hljs-string">&quot;POST /api/v2/products&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="252" lang="en-US">
<p><strong>Nombres crípticos:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">name</span>: <span class="hljs-string">&quot;fn1&quot;</span>
<span class="hljs-attr">name</span>: <span class="hljs-string">&quot;process&quot;</span>
<span class="hljs-attr">name</span>: <span class="hljs-string">&quot;helper&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="253" lang="en-US">
<h1 id="anti-patrones---inputschema-d%C3%A9bil">Anti-Patrones - inputSchema Débil</h1>
<h2 id="validaci%C3%B3n-insuficiente">Validación insuficiente</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="254" lang="en-US">
<p><strong>Sin validación:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">inputSchema</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span> }
</code></pre>
<p>El modelo no sabe qué enviar.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="255" lang="en-US">
<p><strong>Sin required:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">properties</span>: { <span class="hljs-attr">id</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span> } }
</code></pre>
<p>¿El id es obligatorio o opcional?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="256" lang="en-US">
<p><strong>Sin límites:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">quantity</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;integer&quot;</span> }
</code></pre>
<p>¿Puede ser 0? ¿Negativo? ¿Mil millones?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="257" lang="en-US">
<h1 id="anti-patrones---errores-silenciosos">Anti-Patrones - Errores Silenciosos</h1>
<h2 id="no-ocultar-errores">No ocultar errores</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="258" lang="en-US">
<p><strong>Ignorar errores:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">try</span> {
  <span class="hljs-keyword">return</span> <span class="hljs-keyword">await</span> <span class="hljs-title function_">operation</span>();
} <span class="hljs-keyword">catch</span> {
  <span class="hljs-keyword">return</span> <span class="hljs-literal">null</span>; <span class="hljs-comment">// <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Pierde información</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="259" lang="en-US">
<p><strong>Lanzar excepción sin manejar:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
  <span class="hljs-comment">// Si falla, rompe todo</span>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="260" lang="en-US">
<p><strong>Correcto:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {

  }

</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="261" lang="en-US">
<h1 id="ejercicios---introducci%C3%B3n">Ejercicios - Introducción</h1>
<h2 id="pr%C3%A1ctica">Práctica</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="262" lang="en-US">
<p>A continuación, tres ejercicios:</p>
<ol>
<li>Implementar herramienta de búsqueda</li>
<li>Implementar herramienta con confirmación</li>
<li>Implementar registro dinámico</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="263" lang="en-US">
<h1 id="ejercicio-1---b%C3%BAsqueda">Ejercicio 1 - Búsqueda</h1>
<h2 id="implementar-b%C3%BAsqueda-de-productos">Implementar búsqueda de productos</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="264" lang="en-US">
<p><strong>Objetivo:</strong></p>
<p>Crear una tool que busque productos en un array.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="265" lang="en-US">
<p><strong>Requisitos:</strong></p>
<ul>
<li>Nombre: <code>searchProducts</code></li>
<li>Parámetro obligatorio: <code>query</code> (string)</li>
<li>Parámetro opcional: <code>category</code> (string)</li>
<li>Retornar lista de productos que coincidan</li>
<li><code>readOnlyHint: true</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="266" lang="en-US">
<p><strong>Datos de prueba:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">const</span> productos = [
  { <span class="hljs-attr">id</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">nombre</span>: <span class="hljs-string">&quot;Laptop&quot;</span>, <span class="hljs-attr">categoria</span>: <span class="hljs-string">&quot;tech&quot;</span> },
  { <span class="hljs-attr">id</span>: <span class="hljs-number">2</span>, <span class="hljs-attr">nombre</span>: <span class="hljs-string">&quot;Camiseta&quot;</span>, <span class="hljs-attr">categoria</span>: <span class="hljs-string">&quot;ropa&quot;</span> },
  { <span class="hljs-attr">id</span>: <span class="hljs-number">3</span>, <span class="hljs-attr">nombre</span>: <span class="hljs-string">&quot;Libro&quot;</span>, <span class="hljs-attr">categoria</span>: <span class="hljs-string">&quot;libros&quot;</span> }
];
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="267" lang="en-US">
<h1 id="ejercicio-1---soluci%C3%B3n">Ejercicio 1 - Solución</h1>
<h2 id="implementaci%C3%B3n-1">Implementación</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="268" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;searchProducts&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Busca productos por nombre o categoría&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">query</span>: { 
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
        <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Palabra clave para buscar&quot;</span>
      },
      <span class="hljs-attr">category</span>: { 
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
        <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Categoría para filtrar&quot;</span>
      }
    },
    <span class="hljs-attr">required</span>: [<span class="hljs-string">&quot;query&quot;</span>]
  },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
    <span class="hljs-keyword">let</span> results = productos.<span class="hljs-title function_">filter</span>(<span class="hljs-function"><span class="hljs-params">p</span> =&gt;</span>
      p.<span class="hljs-property">nombre</span>.<span class="hljs-title function_">toLowerCase</span>().<span class="hljs-title function_">includes</span>(input.<span class="hljs-property">query</span>.<span class="hljs-title function_">toLowerCase</span>())
    );
    <span class="hljs-keyword">if</span> (input.<span class="hljs-property">category</span>) {
      results = results.<span class="hljs-title function_">filter</span>(<span class="hljs-function"><span class="hljs-params">p</span> =&gt;</span> p.<span class="hljs-property">categoria</span> === input.<span class="hljs-property">category</span>);
    }
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">products</span>: results, <span class="hljs-attr">total</span>: results.<span class="hljs-property">length</span> };
  },
  <span class="hljs-attr">annotations</span>: { <span class="hljs-attr">readOnlyHint</span>: <span class="hljs-literal">true</span> }
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="269" lang="en-US">
<h1 id="ejercicio-2---confirmaci%C3%B3n">Ejercicio 2 - Confirmación</h1>
<h2 id="eliminar-archivo-con-confirmaci%C3%B3n">Eliminar archivo con confirmación</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="270" lang="en-US">
<p><strong>Objetivo:</strong></p>
<p>Crear una tool que elimine un archivo, pidiendo confirmación.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="271" lang="en-US">
<p><strong>Requisitos:</strong></p>
<ul>
<li>Nombre: <code>deleteFile</code></li>
<li>Parámetro obligatorio: <code>filename</code> (string)</li>
<li>Mostrar diálogo de confirmación</li>
<li>Si confirma, eliminar</li>
<li>Retornar resultado</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="272" lang="en-US">
<h1 id="ejercicio-2---soluci%C3%B3n">Ejercicio 2 - Solución</h1>
<h2 id="implementaci%C3%B3n-2">Implementación</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="273" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;deleteFile&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Elimina un archivo con confirmación del usuario&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">filename</span>: { 
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
        <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Nombre del archivo a eliminar&quot;</span>
      }
    },
    <span class="hljs-attr">required</span>: [<span class="hljs-string">&quot;filename&quot;</span>]
  },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input, client) =&gt; {
    <span class="hljs-keyword">const</span> confirmed = <span class="hljs-keyword">await</span> client.<span class="hljs-title function_">requestUserInteraction</span>(
      <span class="hljs-title function_">async</span> () =&gt; <span class="hljs-title function_">confirm</span>(<span class="hljs-string">`¿Eliminar <span class="hljs-subst">${input.filename}</span>?`</span>)
    );
    <span class="hljs-keyword">if</span> (!confirmed) {
      <span class="hljs-keyword">return</span> { <span class="hljs-attr">cancelled</span>: <span class="hljs-literal">true</span> };
    }
    <span class="hljs-keyword">await</span> fs.<span class="hljs-title function_">unlink</span>(input.<span class="hljs-property">filename</span>);
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">deleted</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">filename</span>: input.<span class="hljs-property">filename</span> };
  }
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="274" lang="en-US">
<h1 id="ejercicio-3---registro-din%C3%A1mico">Ejercicio 3 - Registro Dinámico</h1>
<h2 id="herramientas-seg%C3%BAn-estado">Herramientas según estado</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="275" lang="en-US">
<p><strong>Objetivo:</strong></p>
<p>Implementar registro y eliminación de tools según login/logout.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="276" lang="en-US">
<p><strong>Requisitos:</strong></p>
<ul>
<li>Al hacer login: registrar <code>getUserOrders</code></li>
<li>Al hacer logout: eliminar <code>getUserOrders</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="277" lang="en-US">
<h1 id="ejercicio-3---soluci%C3%B3n">Ejercicio 3 - Solución</h1>
<h2 id="implementaci%C3%B3n-3">Implementación</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="278" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">let</span> currentUser = <span class="hljs-literal">null</span>;

<span class="hljs-keyword">function</span> <span class="hljs-title function_">onUserLogin</span>(<span class="hljs-params">user</span>) {
  currentUser = user;
  
  navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({
    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;getUserOrders&quot;</span>,
    <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Obtiene el historial de pedidos del usuario actual&quot;</span>,
    <span class="hljs-attr">inputSchema</span>: {
      <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
      <span class="hljs-attr">properties</span>: {
        <span class="hljs-attr">limit</span>: { 
          <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;integer&quot;</span>,
          <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Número máximo de pedidos a retornar&quot;</span>
        }
      }
    },
    <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
      <span class="hljs-keyword">const</span> limit = input.<span class="hljs-property">limit</span> || <span class="hljs-number">10</span>;
      <span class="hljs-keyword">return</span> { 
        <span class="hljs-attr">orders</span>: <span class="hljs-keyword">await</span> api.<span class="hljs-title function_">getOrders</span>(currentUser.<span class="hljs-property">id</span>, limit) 
      };
    },
    <span class="hljs-attr">annotations</span>: { <span class="hljs-attr">readOnlyHint</span>: <span class="hljs-literal">true</span> }
  });
}

<span class="hljs-keyword">function</span> <span class="hljs-title function_">onUserLogout</span>(<span class="hljs-params"></span>) {
  currentUser = <span class="hljs-literal">null</span>;
  navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">unregisterTool</span>(<span class="hljs-string">&quot;getUserOrders&quot;</span>);
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="279" lang="en-US">
<h1 id="resumen---puntos-clave">Resumen - Puntos Clave</h1>
<h2 id="lo-m%C3%A1s-importante">Lo más importante</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="280" lang="en-US">
<ol>
<li>
<p><strong>MCP</strong> es un estándar abierto para conectar IAs con herramientas</p>
</li>
<li>
<p><strong>WebMCP</strong> lleva MCP al navegador - registra funciones JS como tools</p>
</li>
<li>
<p><strong>Tres primitivas</strong>: Tools, Resources, Prompts</p>
</li>
<li>
<p><strong>readOnlyHint</strong> indica si la tool modifica estado</p>
</li>
<li>
<p><strong>requestUserInteraction</strong> permite pedir confirmación</p>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="281" lang="en-US">
<ol start="6">
<li>
<p><strong>Testing API</strong> para depurar en desarrollo</p>
</li>
<li>
<p><strong>Reutiliza lógica frontend</strong> sin backend extra</p>
</li>
<li>
<p><strong>HTTPS requerido</strong> (SecureContext)</p>
</li>
<li>
<p><strong>Solo top-level contexts</strong> - no iframes</p>
</li>
<li>
<p><strong>WebMCP y Backend MCP son complementarios</strong></p>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="282" lang="en-US">
<h1 id="resumen---continuaci%C3%B3n">Resumen - Continuación</h1>
<h2 id="m%C3%A1s-puntos-clave">Más puntos clave</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="283" lang="en-US">
<ol start="11">
<li>
<p><strong>Key Terminology</strong>: Agent, Model Context Provider, Tool Definition, Actuation</p>
</li>
<li>
<p><strong>Security Boundaries</strong>: Site→Browser y Agent→Site</p>
</li>
<li>
<p><strong>Model Poisoning Risk</strong>: pregunta abierta en el spec</p>
</li>
<li>
<p><strong>Future Roadmap</strong>: Declarative WebMCP, PWAs, Background Providers</p>
</li>
<li>
<p><strong>Spec Status</strong>: Draft Community Group Report, no W3C Standard aún</p>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="284" lang="en-US">
<h1 id="pr%C3%B3ximos-pasos">Próximos Pasos</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="285" lang="en-US">
<ol>
<li>
<p>Habilitar flag WebMCP en Chrome (chrome://flags)</p>
</li>
<li>
<p>Probar con WebMCP Inspector</p>
</li>
<li>
<p>Implementar tools en tu app</p>
</li>
<li>
<p>Combinar con Backend MCP según necesites</p>
</li>
<li>
<p>Contribuir al spec W3C</p>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="286" lang="en-US">
<h1 id="cierre">Cierre</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="287" lang="en-US">
<p><strong>Model Context Protocol (MCP)</strong></p>
<p><em>Conectando IAs con el mundo, un estándar a la vez.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="288" lang="en-US">
