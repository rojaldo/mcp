</style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="1" lang="en-US">
<h1 id="curso-protocolo-de-contexto-de-modelos-mcp-y-webmcp">Curso: Protocolo de Contexto de Modelos (MCP) y WebMCP</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="en-US">
<h1 id="portada">Portada</h1>
<h2 id="model-context-protocol-mcp">Model Context Protocol (MCP)</h2>
<h3 id="el-est%C3%A1ndar-universal-para-conectar-ias-con-el-mundo">El Estándar Universal para Conectar IAs con el Mundo</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="en-US">
<p><strong>Curso completo sobre MCP y WebMCP</strong></p>
<p><em>De los fundamentos a la implementación práctica</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="en-US">
<h1 id="%C2%BFpor-qu%C3%A9-mcp">¿Por qué MCP?</h1>
<h2 id="el-problema-de-la-integraci%C3%B3n">El Problema de la Integración</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="en-US">
<p><strong>Sin MCP:</strong></p>
<ul>
<li>Cada servicio necesita su propia integración</li>
<li>El código se duplica para cada cliente de IA</li>
<li>Las actualizaciones son manuales y costosas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="en-US">
<p><strong>Con MCP:</strong></p>
<ul>
<li>Un solo servidor MCP funciona con todos los clientes</li>
<li>Protocolo estándar y unificado</li>
<li>Escribir una vez, usar en todas partes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h1 id="%C2%BFqu%C3%A9-es-mcp">¿Qué es MCP?</h1>
<h2 id="model-context-protocol">Model Context Protocol</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<p><strong>Definición:</strong></p>
<p>MCP es un estándar abierto creado por Anthropic en noviembre de 2024.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<p><strong>Propósito:</strong></p>
<p>Permitir que aplicaciones de IA se conecten de forma estandarizada con:</p>
<ul>
<li>Herramientas externas (tools)</li>
<li>Fuentes de datos (resources)</li>
<li>Plantillas de interacción (prompts)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="en-US">
<h1 id="la-analog%C3%ADa-del-usb-c">La Analogía del USB-C</h1>
<h2 id="antes-vs-despu%C3%A9s">Antes vs Después</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="en-US">
<p><strong>Antes del USB-C:</strong></p>
<p>Cada dispositivo tenía su propio conector:</p>
<ul>
<li>Cargadores diferentes</li>
<li>Cables incompatibles</li>
<li>Adaptadores por todas partes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="en-US">
<p><strong>Con USB-C:</strong></p>
<p>Un solo conector para todo:</p>
<ul>
<li>Carga</li>
<li>Datos</li>
<li>Vídeo</li>
<li>Accesorios</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="en-US">
<p><strong>MCP hace lo mismo para las IAs:</strong></p>
<p>Un solo protocolo para todas las integraciones.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" lang="en-US">
<h1 id="key-terminology">Key Terminology</h1>
<h2 id="terminolog%C3%ADa-oficial-del-w3c">Terminología Oficial del W3C</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" lang="en-US">
<h3 id="agent-agente">Agent (Agente)</h3>
<p>Un asistente autónomo basado en LLM que entiende los objetivos del usuario y realiza acciones en su nombre a través de interfaces de chat.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="en-US">
<h3 id="model-context-provider">Model Context Provider</h3>
<p>Una pestaña del navegador navegada a una página que usa la API WebMCP para proporcionar herramientas a los agentes.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="en-US">
<h3 id="tool-definition">Tool Definition</h3>
<p>Una estructura con: name, description, inputSchema, execute steps, y readOnlyHint annotation.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" lang="en-US">
<h3 id="actuation">Actuation</h3>
<p>Un agente interactuando con una página web simulando entrada de usuario: clicks, scroll, typing. WebMCP reemplaza esto.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="en-US">
<h1 id="key-terminology-continuaci%C3%B3n">Key Terminology (continuación)</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" lang="en-US">
<h3 id="browsers-agent">Browser's Agent</h3>
<p>Un agente proporcionado por o a través del navegador - integrado, o vía extensión/plug-in del navegador.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" lang="en-US">
<h3 id="backend-integration">Backend Integration</h3>
<p>Una integración API donde una plataforma de IA habla directamente al backend de un servicio sin una UI en vivo. WebMCP complementa, no reemplaza, estas.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" lang="en-US">
<h3 id="goals-objetivos">Goals (Objetivos)</h3>
<ul>
<li><strong>Human-in-the-loop</strong>: usuarios retienen visibilidad y control</li>
<li><strong>Simplify AI integration</strong>: herramientas estructuradas vs UI scraping</li>
<li><strong>Minimize dev burden</strong>: reutilizar código JS existente</li>
<li><strong>Improve accessibility</strong>: acceso estandarizado para AT</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="en-US">
<h3 id="non-goals-no-objetivos">Non-Goals (No-Objetivos)</h3>
<ul>
<li><strong>Headless browsing</strong>: no para escenarios sin humano presente</li>
<li><strong>Autonomous agents</strong>: usar protocolo A2A en su lugar</li>
<li><strong>Replacing backend MCP</strong>: WebMCP es complementario</li>
<li><strong>Replacing human UI</strong>: las herramientas del agente aumentan, no reemplazan</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="en-US">
<h1 id="arquitectura-de-mcp">Arquitectura de MCP</h1>
<h2 id="los-tres-roles">Los Tres Roles</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" lang="en-US">
<h3 id="cliente-client">Cliente (Client)</h3>
<p>La aplicación de IA que quiere usar herramientas externas.</p>
<p><em>Ejemplos: Claude, ChatGPT, Cursor, Continue</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" lang="en-US">
<h3 id="servidor-server">Servidor (Server)</h3>
<p>El servicio que proporciona herramientas, recursos y prompts.</p>
<p><em>Ejemplos: Google Drive, PostgreSQL, GitHub</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" lang="en-US">
<h3 id="host">Host</h3>
<p>El entorno donde corre el cliente.</p>
<p><em>Ejemplos: IDE, navegador, aplicación desktop</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" lang="en-US">
<h1 id="diagrama-de-arquitectura">Diagrama de Arquitectura</h1>
<h2 id="c%C3%B3mo-se-conectan">Cómo se conectan</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>         ┌─────────────────┐
         │   CLIENTE IA   │
         │ (Claude, GPT)   │
         └────────┬────────┘
                  │
      ┌───────────┼───────────┐
      │           │           │
      ▼           ▼           ▼
┌─────────┐ ┌─────────┐ ┌─────────┐
│ SERVIDOR│ │ SERVIDOR│ │ SERVIDOR│
│ Drive   │ │ GitHub  │ │ Postgres│
└─────────┘ └─────────┘ └─────────┘
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" lang="en-US">
<p><strong>Cada servidor:</strong></p>
<ul>
<li>Se conecta una vez</li>
<li>Funciona con cualquier cliente compatible</li>
<li>Implementa el protocolo MCP</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="en-US">
<h1 id="m%C3%A9todos-de-transporte">Métodos de Transporte</h1>
<h2 id="c%C3%B3mo-se-comunican-cliente-y-servidor">Cómo se comunican cliente y servidor</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" lang="en-US">
<h3 id="stdio-standard-inputoutput">STDIO (Standard Input/Output)</h3>
<p>El servidor corre como proceso hijo del cliente.</p>
<ul>
<li>Comunicación por entrada/salida estándar</li>
<li>Ideal para herramientas locales</li>
<li>Más simple de implementar</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" lang="en-US">
<h3 id="http--sse-server-sent-events">HTTP + SSE (Server-Sent Events)</h3>
<p>El servidor corre como servicio HTTP.</p>
<ul>
<li>Comunicación por HTTP con eventos</li>
<li>Ideal para servicios remotos</li>
<li>Permite múltiples clientes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" lang="en-US">
<h3 id="websocket">WebSocket</h3>
<p>Comunicación bidireccional en tiempo real.</p>
<ul>
<li>Ideal para aplicaciones interactivas</li>
<li>Menor latencia</li>
<li>Más complejo de implementar</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" lang="en-US">
<h1 id="las-tres-primitivas">Las Tres Primitivas</h1>
<h2 id="bloques-de-construcci%C3%B3n-de-mcp">Bloques de construcción de MCP</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" lang="en-US">
<h3 id="1-tools-herramientas">1. Tools (Herramientas)</h3>
<p>Funciones que el modelo puede ejecutar.</p>
<ul>
<li>El modelo decide cuándo llamarlas</li>
<li>Tienen parámetros definidos</li>
<li>Retornan resultados</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" lang="en-US">
<h3 id="2-resources-recursos">2. Resources (Recursos)</h3>
<p>Datos que el modelo puede leer.</p>
<ul>
<li>Son pasivos, no se ejecutan</li>
<li>Proporcionan contexto</li>
<li>Se actualizan dinámicamente</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" lang="en-US">
<h3 id="3-prompts-plantillas">3. Prompts (Plantillas)</h3>
<p>Plantillas predefinidas para interacciones comunes.</p>
<ul>
<li>Modos de especialización</li>
<li>Flujos recurrentes</li>
<li>Contextos específicos</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" lang="en-US">
<h1 id="tools---estructura-json">Tools - Estructura JSON</h1>
<h2 id="definici%C3%B3n-de-una-herramienta">Definición de una herramienta</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;search_products&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Busca productos en el catálogo&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;inputSchema&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;object&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;properties&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;query&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;string&quot;</span> <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;category&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;string&quot;</span> <span class="hljs-punctuation">}</span>
    <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;required&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;query&quot;</span><span class="hljs-punctuation">]</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" lang="en-US">
<p><strong>El modelo lee esto y entiende:</strong></p>
<ul>
<li>Qué hace la tool</li>
<li>Qué parámetros necesita</li>
<li>Cuáles son obligatorios</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" lang="en-US">
<h1 id="resources---concepto-detallado">Resources - Concepto Detallado</h1>
<h2 id="%C2%BFqu%C3%A9-es-un-resource">¿Qué es un Resource?</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" lang="en-US">
<p><strong>Un resource es:</strong></p>
<p>Un dato que el modelo puede leer para obtener contexto.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" lang="en-US">
<p><strong>Ejemplos:</strong></p>
<ul>
<li>Contenido de un archivo</li>
<li>Registros de una base de datos</li>
<li>Respuesta de una API</li>
<li>Logs del sistema</li>
<li>Estado de una aplicación</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" lang="en-US">
<p><strong>Diferencia con Tools:</strong></p>
<ul>
<li>Tools se <strong>ejecutan</strong> (acción)</li>
<li>Resources se <strong>leen</strong> (información)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" lang="en-US">
<h1 id="resources---estructura-json">Resources - Estructura JSON</h1>
<h2 id="definici%C3%B3n-de-un-recurso">Definición de un recurso</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;uri&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;file:///proyectos/notas.md&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Notas del proyecto&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;mimeType&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;text/markdown&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Archivo de notas del proyecto actual&quot;</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" lang="en-US">
<p><strong>Campos importantes:</strong></p>
<ul>
<li><code>uri</code>: Identificador único del recurso</li>
<li><code>name</code>: Nombre legible</li>
<li><code>mimeType</code>: Tipo de contenido</li>
<li><code>description</code>: Descripción opcional</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" lang="en-US">
<h1 id="resources---tipos-de-uri">Resources - Tipos de URI</h1>
<h2 id="esquemas-comunes">Esquemas comunes</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" lang="en-US">
<p><strong>file://</strong> - Archivos locales</p>
<p><code>file:///home/user/documento.txt</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" lang="en-US">
<p><strong>http://</strong> y <strong>https://</strong> - Recursos web</p>
<p><code>https://api.example.com/data</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" lang="en-US">
<p><strong>custom://</strong> - Esquemas personalizados</p>
<p><code>postgres://localhost/mi_base/tabla</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" lang="en-US">
<h1 id="prompts---concepto-detallado">Prompts - Concepto Detallado</h1>
<h2 id="%C2%BFqu%C3%A9-es-un-prompt">¿Qué es un Prompt?</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" lang="en-US">
<p><strong>Un prompt es:</strong></p>
<p>Una plantilla predefinida que el modelo puede usar.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" lang="en-US">
<p><strong>Para qué sirve:</strong></p>
<ul>
<li>Modos de especialización (&quot;actúa como experto en X&quot;)</li>
<li>Flujos de trabajo recurrentes</li>
<li>Contextos específicos</li>
<li>Instrucciones complejas predefinidas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" lang="en-US">
<p><strong>Ventaja:</strong></p>
<p>El usuario no tiene que escribir las instrucciones cada vez.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" lang="en-US">
<h1 id="prompts---estructura-json">Prompts - Estructura JSON</h1>
<h2 id="definici%C3%B3n-de-un-prompt">Definición de un prompt</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;code-review&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Revisa código fuente buscando errores&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;arguments&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span>
    <span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;language&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Lenguaje de programación&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;required&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span>
    <span class="hljs-punctuation">}</span>
  <span class="hljs-punctuation">]</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" lang="en-US">
<p><strong>El modelo puede llamar:</strong></p>
<p><code>use_prompt(&quot;code-review&quot;, { language: &quot;python&quot; })</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" lang="en-US">
<h1 id="flujo-de-comunicaci%C3%B3n">Flujo de Comunicación</h1>
<h2 id="secuencia-de-interacci%C3%B3n">Secuencia de interacción</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" lang="en-US">
<p><strong>Paso 1: Conexión</strong></p>
<p>El cliente se conecta al servidor y negocia capacidades.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" lang="en-US">
<p><strong>Paso 2: Descubrimiento</strong></p>
<p>El cliente pregunta qué tools, resources y prompts están disponibles.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" lang="en-US">
<p><strong>Paso 3: Petición</strong></p>
<p>El modelo decide usar una tool o leer un resource.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" lang="en-US">
<p><strong>Paso 4: Ejecución</strong></p>
<p>El servidor ejecuta la acción y devuelve el resultado.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" lang="en-US">
<h1 id="diagrama-de-secuencia">Diagrama de Secuencia</h1>
<h2 id="flujo-completo">Flujo completo</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>CLIENTE                 SERVIDOR
   │                       │
   │ initialize            │
   │──────────────────────►│
   │                       │
   │ initialized           │
   │◄──────────────────────│
   │                       │
   │ tools/list            │
   │──────────────────────►│
   │                       │
   │ tools/list (response) │
   │◄──────────────────────│
   │                       │
   │ tools/call            │
   │──────────────────────►│
   │                       │
   │ tool/result           │
   │◄──────────────────────│
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" lang="en-US">
<h1 id="clientes-compatibles">Clientes Compatibles</h1>
<h2 id="%C2%BFqui%C3%A9nes-usan-mcp">¿Quiénes usan MCP?</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" lang="en-US">
<p><strong>Aplicaciones de IA:</strong></p>
<ul>
<li>Claude Desktop</li>
<li>ChatGPT</li>
<li>Cursor</li>
<li>Continue</li>
<li>Windsurf</li>
<li>Zed</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" lang="en-US">
<p><strong>IDEs:</strong></p>
<ul>
<li>VS Code (con extensión)</li>
<li>JetBrains (con plugin)</li>
<li>Neovim (con configuración)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" lang="en-US">
<p><strong>La lista crece cada mes.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" lang="en-US">
<h1 id="servidores-mcp-populares">Servidores MCP Populares</h1>
<h2 id="%C2%BFqu%C3%A9-puedes-conectar">¿Qué puedes conectar?</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" lang="en-US">
<p><strong>Fuentes de datos:</strong></p>
<ul>
<li>Google Drive</li>
<li>PostgreSQL</li>
<li>SQLite</li>
<li>Filesystem</li>
<li>Slack</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" lang="en-US">
<p><strong>Herramientas:</strong></p>
<ul>
<li>GitHub</li>
<li>Git</li>
<li>Puppeteer</li>
<li>Brave Search</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" lang="en-US">
<p><strong>Servicios:</strong></p>
<ul>
<li>Memory (memoria persistente)</li>
<li>Sequential Thinking (razonamiento)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" lang="en-US">
<h1 id="webmcp---introducci%C3%B3n">WebMCP - Introducción</h1>
<h2 id="mcp-en-el-navegador">MCP en el Navegador</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" lang="en-US">
<p><strong>WebMCP</strong> es una especificación del W3C Community Group.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" lang="en-US">
<p><strong>Propósito:</strong></p>
<p>Llevar MCP al navegador para que las páginas web actúen como servidores MCP.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" lang="en-US">
<p><strong>Idea clave:</strong></p>
<p>Registra funciones JavaScript como herramientas invocables por IA, reutilizando la lógica frontend existente sin necesidad de backend.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" lang="en-US">
<h1 id="el-problema-que-webmcp-resuelve">El Problema que WebMCP Resuelve</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" lang="en-US">
<h3 id="enfoque-1-screenshots-ui-actuation">Enfoque 1: Screenshots (UI Actuation)</h3>
<p>El agente toma capturas de pantalla y las analiza.</p>
<p><strong>Problemas:</strong></p>
<ul>
<li>~2,000 tokens por captura</li>
<li>Frágil a cambios de layout</li>
<li>El agente adivina qué hacer</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="81" lang="en-US">
<h3 id="enfoque-2-backend-only-mcp">Enfoque 2: Backend-only MCP</h3>
<p>El agente se conecta a un servidor MCP backend.</p>
<p><strong>Problemas:</strong></p>
<ul>
<li>Sin contexto compartido con el usuario</li>
<li>Auth separado</li>
<li>No puede reutilizar lógica frontend</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="82" lang="en-US">
<h3 id="la-soluci%C3%B3n-webmcp">La Solución WebMCP</h3>
<ul>
<li>Ejecuta JavaScript client-side</li>
<li>Reutiliza lógica frontend existente</li>
<li>Comparte página en vivo con usuario</li>
<li>Sesión/auth natural</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="83" lang="en-US">
<h1 id="webmcp---comparaci%C3%B3n-de-enfoques">WebMCP - Comparación de Enfoques</h1>
<h2 id="tabla-comparativa">Tabla comparativa</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="84" lang="en-US">
<table>
<thead>
<tr>
<th>Enfoque</th>
<th>Tokens</th>
<th>Precisión</th>
<th>Auth</th>
</tr>
</thead>
<tbody>
<tr>
<td>Screenshots</td>
<td>~2000</td>
<td>Baja</td>
<td>Manual</td>
</tr>
<tr>
<td>Backend MCP</td>
<td>~100</td>
<td>Alta</td>
<td>Separada</td>
</tr>
<tr>
<td>UI Scraping</td>
<td>~500</td>
<td>Media</td>
<td>Manual</td>
</tr>
<tr>
<td><strong>WebMCP</strong></td>
<td><strong>~100</strong></td>
<td><strong>Alta</strong></td>
<td><strong>Automática</strong></td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="85" lang="en-US">
<p><strong>WebMCP consume 20 veces menos tokens que screenshots.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="86" lang="en-US">
<h1 id="api-de-webmcp---navigator-extension">API de WebMCP - Navigator Extension</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="87" lang="en-US">
<p>WebMCP extiende el objeto <code>navigator</code> del navegador:</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="88" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// API de producción - usada por tu app</span>
navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;searchProducts&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Search the product catalog by keyword&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: { 
    <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>, 
    <span class="hljs-attr">properties</span>: { 
      <span class="hljs-attr">query</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span> } 
    } 
  },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; <span class="hljs-keyword">await</span> <span class="hljs-title function_">searchCatalog</span>(input.<span class="hljs-property">query</span>)
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="89" lang="en-US">
<p><strong>SecureContext:</strong> Solo disponible en páginas HTTPS.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="90" lang="en-US">
<h1 id="api---modelcontext-interface">API - ModelContext Interface</h1>
<h2 id="m%C3%A9todos-disponibles">Métodos disponibles</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="91" lang="en-US">
<h3 id="registertooltool">registerTool(tool)</h3>
<p>Registra una herramienta con el navegador.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;myTool&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Description of what the tool does&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: { <span class="hljs-comment">/* JSON Schema */</span> },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; { <span class="hljs-comment">/* logic */</span> }
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="92" lang="en-US">
<p><strong>Lanza InvalidStateError si:</strong></p>
<ul>
<li>Ya existe una tool con el mismo nombre</li>
<li>El inputSchema es inválido</li>
<li>El name o description están vacíos</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="93" lang="en-US">
<h3 id="unregistertoolname">unregisterTool(name)</h3>
<p>Elimina una herramienta por su nombre.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">unregisterTool</span>(<span class="hljs-string">&quot;myTool&quot;</span>);
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="94" lang="en-US">
<p><strong>Lanza InvalidStateError si la tool no existe.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="95" lang="en-US">
<h1 id="api---complete-idl">API - Complete IDL</h1>
<h2 id="especificaci%C3%B3n-oficial-w3c">Especificación oficial W3C</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="96" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Navigator extension</span>
partial interface <span class="hljs-title class_">Navigator</span> {
  [<span class="hljs-title class_">SecureContext</span>, <span class="hljs-title class_">SameObject</span>] 
  readonly attribute <span class="hljs-title class_">ModelContext</span> modelContext;
};

[<span class="hljs-title class_">Exposed</span>=<span class="hljs-title class_">Window</span>, <span class="hljs-title class_">SecureContext</span>]
interface <span class="hljs-title class_">ModelContext</span> {
  <span class="hljs-literal">undefined</span> <span class="hljs-title function_">registerTool</span>(<span class="hljs-title class_">ModelContextTool</span> tool);
  <span class="hljs-literal">undefined</span> <span class="hljs-title function_">unregisterTool</span>(<span class="hljs-title class_">DOMString</span> name);
};

dictionary <span class="hljs-title class_">ModelContextTool</span> {
  required <span class="hljs-title class_">DOMString</span> name;
  required <span class="hljs-title class_">DOMString</span> description;
  object inputSchema;
  required <span class="hljs-title class_">ToolExecuteCallback</span> execute;
  <span class="hljs-title class_">ToolAnnotations</span> annotations;
};

dictionary <span class="hljs-title class_">ToolAnnotations</span> {
  boolean readOnlyHint = <span class="hljs-literal">false</span>;
};

callback <span class="hljs-title class_">ToolExecuteCallback</span> = 
  <span class="hljs-title class_">Promise</span>&lt;object&gt; (object input, <span class="hljs-title class_">ModelContextClient</span> client);
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="97" lang="en-US">
<h1 id="api---modelcontextclient">API - ModelContextClient</h1>
<h2 id="interacci%C3%B3n-con-el-usuario">Interacción con el usuario</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="98" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">[<span class="hljs-title class_">Exposed</span>=<span class="hljs-title class_">Window</span>, <span class="hljs-title class_">SecureContext</span>]
interface <span class="hljs-title class_">ModelContextClient</span> {
  <span class="hljs-title class_">Promise</span>&lt;any&gt; <span class="hljs-title function_">requestUserInteraction</span>(
    <span class="hljs-title class_">UserInteractionCallback</span> callback
  );
};

callback <span class="hljs-title class_">UserInteractionCallback</span> = <span class="hljs-title class_">Promise</span>&lt;any&gt; ();
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="99" lang="en-US">
<h3 id="requestuserinteraction">requestUserInteraction</h3>
<p>Pausa la ejecución de la tool para mostrar al usuario un diálogo, confirmación, u otra interacción. El agente espera a que el usuario responda antes de que la tool continúe.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="100" lang="en-US">
<h1 id="tool-definition---todos-los-campos">Tool Definition - Todos los Campos</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="101" lang="en-US">
<table>
<thead>
<tr>
<th>Campo</th>
<th>Tipo</th>
<th>Requerido</th>
<th>Descripción</th>
</tr>
</thead>
<tbody>
<tr>
<td>name</td>
<td>DOMString</td>
<td>Sí</td>
<td>Identificador único usado por agentes</td>
</tr>
<tr>
<td>description</td>
<td>DOMString</td>
<td>Sí</td>
<td>Descripción en lenguaje natural</td>
</tr>
<tr>
<td>inputSchema</td>
<td>object</td>
<td>No</td>
<td>JSON Schema de parámetros esperados</td>
</tr>
<tr>
<td>execute</td>
<td>ToolExecuteCallback</td>
<td>Sí</td>
<td>Callback invocado cuando el agente llama la tool</td>
</tr>
<tr>
<td>annotations</td>
<td>ToolAnnotations</td>
<td>No</td>
<td>Metadatos opcionales (readOnlyHint)</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="102" lang="en-US">
<h1 id="inputschema---ejemplos-detallados">inputSchema - Ejemplos Detallados</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="103" lang="en-US">
<h3 id="par%C3%A1metro-string-simple">Parámetro string simple</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">inputSchema</span>: {
  <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
  <span class="hljs-attr">properties</span>: {
    <span class="hljs-attr">query</span>: {
      <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
      <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Search term&quot;</span>
    }
  },
  <span class="hljs-attr">required</span>: [<span class="hljs-string">&quot;query&quot;</span>]
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="104" lang="en-US">
<h3 id="m%C3%BAltiples-par%C3%A1metros-tipados">Múltiples parámetros tipados</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">inputSchema</span>: {
  <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
  <span class="hljs-attr">properties</span>: {
    <span class="hljs-attr">productId</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span> },
    <span class="hljs-attr">quantity</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;integer&quot;</span>, <span class="hljs-attr">minimum</span>: <span class="hljs-number">1</span> },
    <span class="hljs-attr">size</span>: {
      <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
      <span class="hljs-attr">enum</span>: [<span class="hljs-string">&quot;S&quot;</span>, <span class="hljs-string">&quot;M&quot;</span>, <span class="hljs-string">&quot;L&quot;</span>, <span class="hljs-string">&quot;XL&quot;</span>]
    }
  },
  <span class="hljs-attr">required</span>: [<span class="hljs-string">&quot;productId&quot;</span>, <span class="hljs-string">&quot;quantity&quot;</span>]
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="105" lang="en-US">
<h1 id="inputschema---arrays">inputSchema - Arrays</h1>
<h2 id="listas-de-valores">Listas de valores</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="106" lang="en-US">
<p><strong>Array simple:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;array&quot;</span>,
  <span class="hljs-attr">items</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span> },
  <span class="hljs-attr">minItems</span>: <span class="hljs-number">1</span>,
  <span class="hljs-attr">maxItems</span>: <span class="hljs-number">10</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="107" lang="en-US">
<p><strong>Array de objetos:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;array&quot;</span>,
  <span class="hljs-attr">items</span>: {
    <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">name</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span> },
      <span class="hljs-attr">price</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;number&quot;</span> }
    }
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="108" lang="en-US">
<h1 id="execute-y-annotations">execute y annotations</h1>
<h2 id="la-funci%C3%B3n-principal">La función principal</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="109" lang="en-US">
<h3 id="execute-callback-signature">execute callback signature</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// input = parámetros del agente (matchean inputSchema)</span>
<span class="hljs-comment">// client = ModelContextClient para interacción usuario</span>
<span class="hljs-title function_">async</span> (input, client) =&gt; {
  <span class="hljs-comment">// Hacer el trabajo...</span>
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">result</span>: <span class="hljs-string">&quot;data&quot;</span> }; <span class="hljs-comment">// debe retornar object</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="110" lang="en-US">
<h3 id="toolannotations---readonlyhint">ToolAnnotations - readOnlyHint</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">annotations</span>: { <span class="hljs-attr">readOnlyHint</span>: <span class="hljs-literal">true</span> }
</code></pre>
<p><strong>Cuando readOnlyHint: true</strong>, el agente sabe que la tool no modificará estado. El navegador/agente puede llamarla sin prompts de confirmación.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="111" lang="en-US">
<p><strong>Cuando readOnlyHint: false</strong> (omitir), la tool puede modificar estado y puede requerir confirmación del usuario.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="112" lang="en-US">
<h1 id="code-example-1-basic-tool-registration">Code Example 1: Basic Tool Registration</h1>
<h2 id="herramienta-de-solo-lectura">Herramienta de solo lectura</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="113" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Requiere HTTPS (SecureContext)</span>
navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;searchProducts&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Search the product catalog by keyword. Returns a list of matching products with name, price, and availability.&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">query</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
        <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;The search keyword or phrase&quot;</span>
      },
      <span class="hljs-attr">category</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
        <span class="hljs-attr">enum</span>: [<span class="hljs-string">&quot;all&quot;</span>, <span class="hljs-string">&quot;clothing&quot;</span>, <span class="hljs-string">&quot;electronics&quot;</span>, <span class="hljs-string">&quot;books&quot;</span>],
        <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Product category to filter by&quot;</span>
      }
    },
    <span class="hljs-attr">required</span>: [<span class="hljs-string">&quot;query&quot;</span>]
  },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
    <span class="hljs-comment">// ¡Reutiliza tu lógica de búsqueda frontend existente!</span>
    <span class="hljs-keyword">const</span> results = <span class="hljs-keyword">await</span> productStore.<span class="hljs-title function_">search</span>(input.<span class="hljs-property">query</span>, input.<span class="hljs-property">category</span>);
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">products</span>: results, <span class="hljs-attr">total</span>: results.<span class="hljs-property">length</span> };
  },
  <span class="hljs-attr">annotations</span>: { <span class="hljs-attr">readOnlyHint</span>: <span class="hljs-literal">true</span> } <span class="hljs-comment">// No modifica estado</span>
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="114" lang="en-US">
<p><strong>Explicación:</strong></p>
<ul>
<li><code>name</code>: Identificador único para el agente</li>
<li><code>description</code>: Explica QUÉ hace y QUÉ retorna</li>
<li><code>inputSchema</code>: Valida los parámetros de entrada</li>
<li><code>execute</code>: La función que se ejecuta, puede reutilizar código existente</li>
<li><code>readOnlyHint: true</code>: Indica que es segura de ejecutar sin confirmación</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="115" lang="en-US">
<h1 id="code-example-2-state-modifying-tool">Code Example 2: State-Modifying Tool</h1>
<h2 id="herramienta-que-modifica-estado">Herramienta que modifica estado</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="116" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;addToCart&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Add a product to the user&#x27;s shopping cart&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">productId</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span> },
      <span class="hljs-attr">quantity</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;integer&quot;</span>, <span class="hljs-attr">minimum</span>: <span class="hljs-number">1</span> }
    },
    <span class="hljs-attr">required</span>: [<span class="hljs-string">&quot;productId&quot;</span>, <span class="hljs-string">&quot;quantity&quot;</span>]
  },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
    <span class="hljs-keyword">await</span> cart.<span class="hljs-title function_">add</span>(input.<span class="hljs-property">productId</span>, input.<span class="hljs-property">quantity</span>);
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">cartTotal</span>: cart.<span class="hljs-property">total</span> };
  }
  <span class="hljs-comment">// readOnlyHint omitido → por defecto false</span>
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="117" lang="en-US">
<p><strong>Explicación:</strong></p>
<ul>
<li>No tiene <code>readOnlyHint</code> porque modifica el carrito</li>
<li><code>minimum: 1</code> valida que la cantidad sea al menos 1</li>
<li>Retorna información útil: estado del carrito después del cambio</li>
<li>El agente puede mostrar confirmación antes de ejecutar</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="118" lang="en-US">
<h1 id="code-example-3-user-interaction-confirmation">Code Example 3: User Interaction (Confirmation)</h1>
<h2 id="pedir-confirmaci%C3%B3n-al-usuario">Pedir confirmación al usuario</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="119" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input, client) =&gt; {
  <span class="hljs-comment">// Pausar y pedir confirmación al usuario</span>
  <span class="hljs-keyword">const</span> confirmed = <span class="hljs-keyword">await</span> client.<span class="hljs-title function_">requestUserInteraction</span>(
    <span class="hljs-title function_">async</span> () =&gt; {
      <span class="hljs-comment">// Mostrar tu diálogo de confirmación UI</span>
      <span class="hljs-keyword">return</span> <span class="hljs-keyword">await</span> <span class="hljs-title function_">showConfirmDialog</span>(
        <span class="hljs-string">`Delete <span class="hljs-subst">${input.filename}</span>?`</span>
      );
    }
  );

  <span class="hljs-keyword">if</span> (!confirmed) {
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">cancelled</span>: <span class="hljs-literal">true</span> };
  }

  <span class="hljs-keyword">await</span> <span class="hljs-title function_">deleteFile</span>(input.<span class="hljs-property">filename</span>);
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">deleted</span>: <span class="hljs-literal">true</span> };
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="120" lang="en-US">
<p><strong>Explicación:</strong></p>
<ul>
<li><code>client</code> es el segundo parámetro de <code>execute</code></li>
<li><code>requestUserInteraction</code> pausa la ejecución</li>
<li>El callback muestra UI y retorna true/false</li>
<li>Si el usuario cancela, retornamos <code>{ cancelled: true }</code></li>
<li>Solo ejecutamos la acción destructiva si confirma</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="121" lang="en-US">
<h1 id="code-example-4-dynamic-registration">Code Example 4: Dynamic Registration</h1>
<h2 id="registrar-herramientas-seg%C3%BAn-estado">Registrar herramientas según estado</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="122" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Registrar cuando el usuario hace login</span>
<span class="hljs-keyword">function</span> <span class="hljs-title function_">onUserLogin</span>(<span class="hljs-params">user</span>) {
  navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({
    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;getUserOrders&quot;</span>,
    <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Get the current user&#x27;s order history&quot;</span>,
    <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> () =&gt; ({
      <span class="hljs-attr">orders</span>: <span class="hljs-keyword">await</span> api.<span class="hljs-title function_">getOrders</span>(user.<span class="hljs-property">id</span>)
    }),
    <span class="hljs-attr">annotations</span>: { <span class="hljs-attr">readOnlyHint</span>: <span class="hljs-literal">true</span> }
  });
}

<span class="hljs-comment">// Eliminar cuando el usuario hace logout</span>
<span class="hljs-keyword">function</span> <span class="hljs-title function_">onUserLogout</span>(<span class="hljs-params"></span>) {
  navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">unregisterTool</span>(<span class="hljs-string">&quot;getUserOrders&quot;</span>);
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="123" lang="en-US">
<p><strong>Explicación:</strong></p>
<ul>
<li>Las tools se registran/eliminan dinámicamente según el contexto</li>
<li>Solo exponer herramientas relevantes al estado actual</li>
<li><code>getUserOrders</code> solo está disponible si el usuario está autenticado</li>
<li>Evita errores de &quot;usuario no autenticado&quot; proactivamente</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="124" lang="en-US">
<h1 id="code-example-5-updating-a-tool">Code Example 5: Updating a Tool</h1>
<h2 id="patr%C3%B3n-correcto-para-actualizar">Patrón correcto para actualizar</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="125" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> ERROR: Lanza InvalidStateError - nombre ya existe</span>
navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;myTool&quot;</span>, ... });
navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;myTool&quot;</span>, ... });

<span class="hljs-comment">// <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> CORRECTO: Unregister primero, luego re-register</span>
navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">unregisterTool</span>(<span class="hljs-string">&quot;myTool&quot;</span>);
navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>({ <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;myTool&quot;</span>, ...newVersion });
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="126" lang="en-US">
<p><strong>Explicación:</strong></p>
<ul>
<li>No se puede registrar una tool con el mismo nombre dos veces</li>
<li>Debes eliminar la existente antes de registrar la nueva versión</li>
<li>Esto permite actualizar la funcionalidad sin recargar la página</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="127" lang="en-US">
<h1 id="code-example-6-registering-multiple-tools">Code Example 6: Registering Multiple Tools</h1>
<h2 id="registro-masivo-al-cargar-la-p%C3%A1gina">Registro masivo al cargar la página</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="128" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">const</span> tools = [
  { 
    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;getProducts&quot;</span>, 
    <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;List all products&quot;</span>, 
    <span class="hljs-attr">execute</span>: getProducts, 
    <span class="hljs-attr">annotations</span>: { <span class="hljs-attr">readOnlyHint</span>: <span class="hljs-literal">true</span> } 
  },
  { 
    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;addToCart&quot;</span>, 
    <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Add product to cart&quot;</span>, 
    <span class="hljs-attr">execute</span>: addToCart 
  },
  { 
    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;checkout&quot;</span>, 
    <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Start checkout process&quot;</span>, 
    <span class="hljs-attr">execute</span>: startCheckout 
  },
];

tools.<span class="hljs-title function_">forEach</span>(<span class="hljs-function"><span class="hljs-params">tool</span> =&gt;</span>
  navigator.<span class="hljs-property">modelContext</span>.<span class="hljs-title function_">registerTool</span>(tool)
);
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="129" lang="en-US">
<p><strong>Explicación:</strong></p>
<ul>
<li>Definir todas las tools en un array mejora la legibilidad</li>
<li>Registrarlas de una vez al cargar la página</li>
<li>Fácil de mantener: añadir/eliminar tools del array</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="130" lang="en-US">
<h1 id="caso-de-uso---e-commerce">Caso de Uso - E-commerce</h1>
<h2 id="herramientas-para-tienda-online">Herramientas para tienda online</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="131" lang="en-US">
<p><strong>Tools de solo lectura:</strong></p>
<ul>
<li><code>searchProducts</code> - Busca productos</li>
<li><code>getProductDetails</code> - Obtiene detalles</li>
<li><code>getOrderStatus</code> - Estado del pedido</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="132" lang="en-US">
<p><strong>Tools que modifican estado:</strong></p>
<ul>
<li><code>addToCart</code> - Añade al carrito</li>
<li><code>removeFromCart</code> - Quita del carrito</li>
<li><code>checkout</code> - Inicia compra</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="133" lang="en-US">
<p><strong>Flujo típico:</strong></p>
<ol>
<li>Usuario busca productos</li>
<li>Añade al carrito</li>
<li>Confirma pedido</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="134" lang="en-US">
<h1 id="caso-de-uso---e-commerce-c%C3%B3digo">Caso de Uso - E-commerce Código</h1>
<h2 id="implementaci%C3%B3n-completa">Implementación completa</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="135" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Herramientas de solo lectura</span>

  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Añade producto al carrito&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
    <span class="hljs-attr">properties</span>: {

  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="136" lang="en-US">
<h1 id="caso-de-uso---aplicaci%C3%B3n-de-notas">Caso de Uso - Aplicación de Notas</h1>
<h2 id="herramientas-para-productividad">Herramientas para productividad</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="137" lang="en-US">
<p><strong>Tools disponibles:</strong></p>

</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="139" lang="en-US">
<h1 id="caso-de-uso---notas-c%C3%B3digo">Caso de Uso - Notas Código</h1>

  <span class="hljs-attr">annotations</span>: { <span class="hljs-attr">readOnlyHint</span>: <span class="hljs-literal">true</span> }
