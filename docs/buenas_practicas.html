<h2 id="buenas-pr%C3%A1cticas-aplicadas">Buenas prácticas aplicadas</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="224" lang="en-US">
<p><strong>Requisito:</strong></p>
<p>Servidor MCP que permite leer y escribir archivos en un directorio específico.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="225" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># file_server.py</span>
<span class="hljs-keyword">from</span> fastmcp <span class="hljs-keyword">import</span> FastMCP
<span class="hljs-keyword">from</span> pathlib <span class="hljs-keyword">import</span> Path
<span class="hljs-keyword">import</span> re

mcp = FastMCP(<span class="hljs-string">&quot;file-server&quot;</span>)
BASE_DIR = Path(<span class="hljs-string">&quot;./data&quot;</span>).resolve()

<span class="hljs-meta">@mcp.tool(<span class="hljs-params">annotations={<span class="hljs-string">&quot;readOnlyHint&quot;</span>: <span class="hljs-literal">True</span>}</span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">read_file</span>(<span class="hljs-params">
    filename: Annotated[<span class="hljs-built_in">str</span>, Field(<span class="hljs-params">
        pattern=<span class="hljs-string">r&quot;^[a-zA-Z0-9_.-]+$&quot;</span>,
        description=<span class="hljs-string">&quot;Nombre del archivo (solo alfanuméricos, _, ., -)&quot;</span>
    </span>)]
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Lee el contenido de un archivo del directorio de datos.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># Resolver ruta de forma segura</span>
    file_path = (BASE_DIR / filename).resolve()
    
    <span class="hljs-comment"># Verificar que está dentro del directorio permitido</span>
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> <span class="hljs-built_in">str</span>(file_path).startswith(<span class="hljs-built_in">str</span>(BASE_DIR)):
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;Acceso denegado&quot;</span>
            }
        }
    
    <span class="hljs-keyword">try</span>:
        content = file_path.read_text(encoding=<span class="hljs-string">&quot;utf-8&quot;</span>)
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>,
            <span class="hljs-string">&quot;data&quot;</span>: {
                <span class="hljs-string">&quot;content&quot;</span>: content,
                <span class="hljs-string">&quot;filename&quot;</span>: filename,
                <span class="hljs-string">&quot;size&quot;</span>: <span class="hljs-built_in">len</span>(content)
            }
        }
    <span class="hljs-keyword">except</span> FileNotFoundError:
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;NOT_FOUND&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">f&quot;Archivo <span class="hljs-subst">{filename}</span> no encontrado&quot;</span>
            }
        }
    <span class="hljs-keyword">except</span> PermissionError:
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;Sin permisos para leer el archivo&quot;</span>
            }
        }

<span class="hljs-meta">@mcp.tool(<span class="hljs-params">annotations={<span class="hljs-string">&quot;destructiveHint&quot;</span>: <span class="hljs-literal">False</span>}</span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">write_file</span>(<span class="hljs-params">
    filename: <span class="hljs-built_in">str</span>,
    content: <span class="hljs-built_in">str</span>,
    mode: <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;write&quot;</span>, <span class="hljs-string">&quot;append&quot;</span>] = <span class="hljs-string">&quot;write&quot;</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Escribe contenido en un archivo.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># Validar nombre</span>
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> re.<span class="hljs-keyword">match</span>(<span class="hljs-string">r&quot;^[a-zA-Z0-9_.-]+$&quot;</span>, filename):
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;INVALID_INPUT&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;Nombre de archivo inválido&quot;</span>
            }
        }
    
    <span class="hljs-comment"># Resolver ruta de forma segura</span>
    file_path = (BASE_DIR / filename).resolve()
    
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> <span class="hljs-built_in">str</span>(file_path).startswith(<span class="hljs-built_in">str</span>(BASE_DIR)):
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {<span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>, <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;Acceso denegado&quot;</span>}
        }
    
    <span class="hljs-keyword">try</span>:
        <span class="hljs-keyword">if</span> mode == <span class="hljs-string">&quot;append&quot;</span>:
            <span class="hljs-keyword">with</span> <span class="hljs-built_in">open</span>(file_path, <span class="hljs-string">&quot;a&quot;</span>, encoding=<span class="hljs-string">&quot;utf-8&quot;</span>) <span class="hljs-keyword">as</span> f:
                f.write(content)
        <span class="hljs-keyword">else</span>:
            file_path.write_text(content, encoding=<span class="hljs-string">&quot;utf-8&quot;</span>)
        
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>,
            <span class="hljs-string">&quot;data&quot;</span>: {
                <span class="hljs-string">&quot;filename&quot;</span>: filename,
                <span class="hljs-string">&quot;size&quot;</span>: <span class="hljs-built_in">len</span>(content),
                <span class="hljs-string">&quot;mode&quot;</span>: mode
            }
        }
    <span class="hljs-keyword">except</span> Exception <span class="hljs-keyword">as</span> e:
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;INTERNAL_ERROR&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">f&quot;Error al escribir: <span class="hljs-subst">{<span class="hljs-built_in">str</span>(e)}</span>&quot;</span>
            }
        }

<span class="hljs-keyword">if</span> __name__ == <span class="hljs-string">&quot;__main__&quot;</span>:
    mcp.run()
</code></pre>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="227" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># db_server.py</span>
<span class="hljs-keyword">from</span> fastmcp <span class="hljs-keyword">import</span> FastMCP
<span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> <span class="hljs-type">Literal</span>
<span class="hljs-keyword">from</span> datetime <span class="hljs-keyword">import</span> datetime

mcp = FastMCP(<span class="hljs-string">&quot;database-server&quot;</span>)

<span class="hljs-meta">@mcp.tool(<span class="hljs-params">annotations={<span class="hljs-string">&quot;readOnlyHint&quot;</span>: <span class="hljs-literal">True</span>}</span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">query_users</span>(<span class="hljs-params">
    filters: <span class="hljs-built_in">dict</span> | <span class="hljs-literal">None</span> = <span class="hljs-literal">None</span>,
    sort_by: <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;created_at&quot;</span>, <span class="hljs-string">&quot;name&quot;</span>, <span class="hljs-string">&quot;email&quot;</span>] = <span class="hljs-string">&quot;created_at&quot;</span>,
    sort_order: <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;asc&quot;</span>, <span class="hljs-string">&quot;desc&quot;</span>] = <span class="hljs-string">&quot;desc&quot;</span>,
    limit: <span class="hljs-built_in">int</span> = <span class="hljs-number">20</span>,
    offset: <span class="hljs-built_in">int</span> = <span class="hljs-number">0</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Busca usuarios con filtros y paginación.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># Construir query con filtros whitelist</span>
    query = db.query(<span class="hljs-string">&quot;users&quot;</span>)
    
    <span class="hljs-keyword">if</span> filters:
        <span class="hljs-comment"># Solo permitir campos específicos</span>
        allowed_filters = [<span class="hljs-string">&quot;status&quot;</span>, <span class="hljs-string">&quot;role&quot;</span>, <span class="hljs-string">&quot;created_after&quot;</span>, <span class="hljs-string">&quot;created_before&quot;</span>]
        
        <span class="hljs-keyword">for</span> key, value <span class="hljs-keyword">in</span> filters.items():
            <span class="hljs-keyword">if</span> key <span class="hljs-keyword">not</span> <span class="hljs-keyword">in</span> allowed_filters:
                <span class="hljs-keyword">continue</span>
            
            <span class="hljs-keyword">if</span> key == <span class="hljs-string">&quot;status&quot;</span> <span class="hljs-keyword">and</span> value <span class="hljs-keyword">in</span> [<span class="hljs-string">&quot;active&quot;</span>, <span class="hljs-string">&quot;inactive&quot;</span>, <span class="hljs-string">&quot;pending&quot;</span>]:
                query = query.where(<span class="hljs-string">&quot;status&quot;</span>, value)
            
            <span class="hljs-keyword">elif</span> key == <span class="hljs-string">&quot;role&quot;</span> <span class="hljs-keyword">and</span> value <span class="hljs-keyword">in</span> [<span class="hljs-string">&quot;admin&quot;</span>, <span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;guest&quot;</span>]:
                query = query.where(<span class="hljs-string">&quot;role&quot;</span>, value)
            
            <span class="hljs-keyword">elif</span> key == <span class="hljs-string">&quot;created_after&quot;</span>:
                query = query.where(<span class="hljs-string">&quot;created_at&quot;</span>, <span class="hljs-string">&quot;&gt;=&quot;</span>, value)
            
            <span class="hljs-keyword">elif</span> key == <span class="hljs-string">&quot;created_before&quot;</span>:
                query = query.where(<span class="hljs-string">&quot;created_at&quot;</span>, <span class="hljs-string">&quot;&lt;=&quot;</span>, value)
    
    <span class="hljs-comment"># Ordenamiento con whitelist</span>
    query = query.order_by(sort_by, sort_order)
    
    <span class="hljs-comment"># Paginación</span>
    query = query.limit(limit).offset(offset)
    
    <span class="hljs-comment"># Ejecutar</span>
    users = query.execute()
    total = db.count(<span class="hljs-string">&quot;users&quot;</span>)
    
    <span class="hljs-comment"># Devolver solo campos necesarios</span>
    <span class="hljs-keyword">return</span> {
        <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>,
        <span class="hljs-string">&quot;data&quot;</span>: {
            <span class="hljs-string">&quot;items&quot;</span>: [
                {
                    <span class="hljs-string">&quot;id&quot;</span>: u.<span class="hljs-built_in">id</span>,
                    <span class="hljs-string">&quot;name&quot;</span>: u.name,
                    <span class="hljs-string">&quot;email&quot;</span>: u.email,
                    <span class="hljs-string">&quot;status&quot;</span>: u.status,
                    <span class="hljs-string">&quot;role&quot;</span>: u.role
                }
                <span class="hljs-keyword">for</span> u <span class="hljs-keyword">in</span> users
            ],
            <span class="hljs-string">&quot;total&quot;</span>: total,
            <span class="hljs-string">&quot;limit&quot;</span>: limit,
            <span class="hljs-string">&quot;offset&quot;</span>: offset,
            <span class="hljs-string">&quot;has_more&quot;</span>: (offset + limit) &lt; total
        }
    }

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="229" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># api_gateway.py</span>
<span class="hljs-keyword">from</span> fastmcp <span class="hljs-keyword">import</span> FastMCP
<span class="hljs-keyword">import</span> httpx
<span class="hljs-keyword">import</span> asyncio

mcp = FastMCP(<span class="hljs-string">&quot;api-gateway&quot;</span>)

<span class="hljs-comment"># Cliente HTTP con timeout</span>
client = httpx.AsyncClient(timeout=<span class="hljs-number">10.0</span>)

<span class="hljs-meta">@mcp.tool(<span class="hljs-params">annotations={
    <span class="hljs-string">&quot;readOnlyHint&quot;</span>: <span class="hljs-literal">True</span>,
    <span class="hljs-string">&quot;openWorldHint&quot;</span>: <span class="hljs-literal">True</span>
}</span>)</span>
<span class="hljs-keyword">async</span> <span class="hljs-keyword">def</span> <span class="hljs-title function_">get_weather</span>(<span class="hljs-params">
    city: <span class="hljs-built_in">str</span>,
    units: <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;celsius&quot;</span>, <span class="hljs-string">&quot;fahrenheit&quot;</span>] = <span class="hljs-string">&quot;celsius&quot;</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Obtiene el clima actual para una ciudad.&quot;&quot;&quot;</span>
    
    <span class="hljs-keyword">try</span>:
        response = <span class="hljs-keyword">await</span> client.get(
            <span class="hljs-string">&quot;https://api.weather.com/current&quot;</span>,
            params={<span class="hljs-string">&quot;city&quot;</span>: city, <span class="hljs-string">&quot;units&quot;</span>: units}

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="230" lang="en-US">
<h1 id="checklist-de-buenas-pr%C3%A1cticas">Checklist de Buenas Prácticas</h1>
<h2 id="antes-de-publicar-un-servicio-mcp">Antes de publicar un servicio MCP</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="231" lang="en-US">
<h3 id="descripciones">Descripciones</h3>
<ul>
<li>[ ] Todas las tools tienen docstrings claros</li>
<li>[ ] Todos los parámetros tienen descripción con Field()</li>
<li>[ ] Los valores de enum están documentados</li>
<li>[ ] Se incluyen ejemplos para casos complejos</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="232" lang="en-US">
<h3 id="validaci%C3%B3n">Validación</h3>
<ul>
<li>[ ] Se usan tipos Annotated con Field para validación</li>
<li>[ ] Se validan rangos (ge, le)</li>
<li>[ ] Se validan formatos (pattern, email)</li>
<li>[ ] Se sanitizan strings antes de usar en consultas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="233" lang="en-US">
<h3 id="seguridad">Seguridad</h3>
<ul>
<li>[ ] No se exponen credenciales ni secrets</li>
<li>[ ] Se previene path traversal con Path.resolve()</li>
<li>[ ] Se previene SQL injection con parámetros</li>
<li>[ ] Se verifican permisos en cada operación</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="234" lang="en-US">
<h3 id="errores">Errores</h3>
<ul>
<li>[ ] Todos los errores tienen código</li>
<li>[ ] Los errores incluyen sugerencias</li>
<li>[ ] No se exponen detalles internos</li>
<li>[ ] Se genera request_id para depuración</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="235" lang="en-US">
<h3 id="rendimiento">Rendimiento</h3>
<ul>
<li>[ ] Se usa paginación para listas grandes</li>
<li>[ ] Se implementan cachés donde aplica</li>
<li>[ ] Se minimizan los tokens en respuestas</li>
<li>[ ] Se usa asyncio para operaciones paralelas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="236" lang="en-US">
<h3 id="testing">Testing</h3>
<ul>
<li>[ ] Unit tests para cada tool con pytest</li>
<li>[ ] Tests de validación de entrada</li>
<li>[ ] Tests de manejo de errores</li>
<li>[ ] Integration tests con MCP Inspector</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="237" lang="en-US">
<h1 id="resumen-final">Resumen Final</h1>
<h2 id="los-10-mandamientos-del-dise%C3%B1o-mcp">Los 10 mandamientos del diseño MCP</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="238" lang="en-US">
<h3 id="1-claridad-ante-todo">1. Claridad ante todo</h3>
<p>Las descripciones son tu API. Hazlas claras y completas.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="239" lang="en-US">
<h3 id="2-consistencia-en-patrones">2. Consistencia en patrones</h3>
<p>Usa los mismos nombres, estructuras y convenciones en todas las tools.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="240" lang="en-US">
<h3 id="3-validaci%C3%B3n-exhaustiva">3. Validación exhaustiva</h3>
<p>Nunca confíes en la entrada. Valida todo con Pydantic.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="241" lang="en-US">
<h3 id="4-errores-informativos">4. Errores informativos</h3>
<p>Los errores deben ayudar al modelo a recuperarse.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="242" lang="en-US">
<h3 id="5-seguridad-por-defecto">5. Seguridad por defecto</h3>
<p>Toda entrada es potencialmente maliciosa.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="243" lang="en-US">
<h3 id="6-tokens-m%C3%ADnimos">6. Tokens mínimos</h3>
<p>Devuelve solo lo necesario.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="244" lang="en-US">
<h3 id="7-paginaci%C3%B3n-obligatoria">7. Paginación obligatoria</h3>
<p>Las listas grandes deben paginarse.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="245" lang="en-US">
<h3 id="8-cach%C3%A9-estrat%C3%A9gico">8. Caché estratégico</h3>
<p>Cachea lo que cambia poco.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="246" lang="en-US">
<h3 id="9-logging-completo">9. Logging completo</h3>
<p>Registra todo para poder depurar.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="247" lang="en-US">
<h3 id="10-tests-exhaustivos">10. Tests exhaustivos</h3>
<p>Un servicio sin tests no está completo.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="248" lang="en-US">
<h1 id="cierre">Cierre</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="249" lang="en-US">
<h2 id="dise%C3%B1o-de-servicios-mcp-buenas-pr%C3%A1cticas-1">Diseño de Servicios MCP: Buenas Prácticas</h2>
<h3 id="de-los-fundamentos-a-la-implementaci%C3%B3n-profesional">De los fundamentos a la implementación profesional</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="250" lang="en-US">
<p><strong>Recursos:</strong></p>
<ul>
<li>Documentación MCP: <a href="https://modelcontextprotocol.io/">https://modelcontextprotocol.io/</a></li>
<li>FastMCP: <a href="https://gofastmcp.com/">https://gofastmcp.com/</a></li>
<li>SDK Python: <a href="https://github.com/modelcontextprotocol/python-sdk">https://github.com/modelcontextprotocol/python-sdk</a></li>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="251" lang="en-US">
<p><strong>Próximos pasos:</strong></p>
<ol>
<li>Diseña tu primer servicio MCP con FastMCP</li>
<li>Implementa las validaciones con Pydantic</li>
<li>Añade manejo de errores estructurado</li>
<li>Escribe tests con pytest</li>
<li>Despliega y monitorea</li>
</ol>
</section>

</section>
