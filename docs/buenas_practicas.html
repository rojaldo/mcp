</style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="1" lang="en-US">
<h1 id="dise%C3%B1o-de-servicios-mcp-buenas-pr%C3%A1cticas">Diseño de Servicios MCP: Buenas Prácticas</h1>
<h2 id="presentaci%C3%B3n-extensa-para-desarrolladores">Presentación Extensa para Desarrolladores</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="en-US">
<h1 id="portada">Portada</h1>
<h2 id="dise%C3%B1o-de-servicios-mcp">Diseño de Servicios MCP</h2>
<h3 id="buenas-pr%C3%A1cticas-y-patrones-de-arquitectura">Buenas Prácticas y Patrones de Arquitectura</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="en-US">
<p><strong>Duración estimada: 2-3 horas</strong></p>
<p><em>De los fundamentos a la implementación profesional</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="en-US">
<h1 id="agenda">Agenda</h1>
<h2 id="contenido-del-curso">Contenido del curso</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="en-US">
<ol>
<li>
<p><strong>Fundamentos</strong> (20 min) - ¿Qué hace un buen servicio MCP?</p>
</li>
<li>
<p><strong>Arquitectura</strong> (25 min) - Patrones y estructura</p>
</li>
<li>
<p><strong>Diseño de Tools</strong> (30 min) - La primitiva más importante</p>
</li>
<li>
<p><strong>Diseño de Resources</strong> (20 min) - Contexto estructurado</p>
</li>
<li>
<p><strong>Diseño de Prompts</strong> (15 min) - Plantillas efectivas</p>
</li>
<li>
<p><strong>Manejo de Errores</strong> (20 min) - Robustez ante fallos</p>
</li>
<li>
<p><strong>Seguridad</strong> (25 min) - Límites de confianza</p>
</li>
<li>
<p><strong>Rendimiento</strong> (20 min) - Optimización</p>
</li>
<li>
<p><strong>Testing</strong> (15 min) - Calidad garantizada</p>
</li>
<li>
<p><strong>Casos de Estudio</strong> (20 min) - Lecciones aprendidas</p>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="en-US">
<h1 id="parte-1-fundamentos">PARTE 1: FUNDAMENTOS</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h1 id="%C2%BFqu%C3%A9-es-un-servicio-mcp">¿Qué es un servicio MCP?</h1>
<h2 id="definici%C3%B3n">Definición</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<p>Un <strong>servicio MCP</strong> es un programa que implementa el protocolo Model Context Protocol para exponer herramientas, recursos y prompts a clientes de IA de forma estandarizada.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<p><strong>Componentes:</strong></p>
<ul>
<li>Servidor que implementa el protocolo MCP</li>
<li>Conjunto de tools, resources y prompts</li>
<li>Transporte (STDIO, HTTP, WebSocket)</li>
<li>Manejo del ciclo de vida de conexiones</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="en-US">
<h1 id="%C2%BFpor-qu%C3%A9-importa-el-dise%C3%B1o">¿Por qué importa el diseño?</h1>
<h2 id="la-calidad-del-servicio-define-la-experiencia">La calidad del servicio define la experiencia</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="en-US">
<p><strong>Un mal servicio MCP:</strong></p>
<ul>
<li>Descripciones vagas que confunden a la IA</li>
<li>Errores sin contexto que interrumpen conversaciones</li>
<li>Tools que fallan silenciosamente</li>
<li>Recursos que cambian sin aviso</li>
<li>Prompts que no se adaptan al contexto</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="en-US">
<p><strong>Un buen servicio MCP:</strong></p>
<ul>
<li>Descripciones precisas que guían al modelo</li>
<li>Errores estructurados que permiten recuperación</li>
<li>Tools robustas con validación completa</li>
<li>Recursos estables con versionado</li>
<li>Prompts que se adaptan al usuario</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="en-US">
<h1 id="principios-fundamentales">Principios Fundamentales</h1>
<h2 id="los-5-pilares-del-dise%C3%B1o-mcp">Los 5 pilares del diseño MCP</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" lang="en-US">
<h3 id="1-claridad">1. Claridad</h3>
<p>Las descripciones deben ser comprensibles para humanos y modelos.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" lang="en-US">
<h3 id="2-consistencia">2. Consistencia</h3>
<p>Todas las tools siguen los mismos patrones de diseño.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="en-US">
<h3 id="3-robustez">3. Robustez</h3>
<p>El servicio maneja errores de forma controlada.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="en-US">
<h3 id="4-seguridad">4. Seguridad</h3>
<p>El servicio respeta los límites de confianza.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" lang="en-US">
<h3 id="5-eficiencia">5. Eficiencia</h3>
<p>El servicio minimiza tokens y latencia.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="en-US">
<h1 id="claridad-en-las-descripciones">Claridad en las Descripciones</h1>
<h2 id="el-arte-de-comunicar-a-la-ia">El arte de comunicar a la IA</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" lang="en-US">
<p><strong>Principio:</strong></p>
<p>La IA no ve tu código. Solo ve el esquema JSON.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" lang="en-US">
<p><strong>Mala descripción:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;process&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Process the input&quot;</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<p><em>¿Qué hace? ¿Qué devuelve? ¿Cuándo usarla?</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" lang="en-US">
<p><strong>Buena descripción:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;processPayment&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Procesa un pago con tarjeta. Recibe los datos de la tarjeta y el importe, devuelve el resultado de la transacción con ID de confirmación o mensaje de error.&quot;</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="en-US">
<h1 id="claridad---patr%C3%B3n-de-descripci%C3%B3n">Claridad - Patrón de Descripción</h1>
<h2 id="estructura-recomendada">Estructura recomendada</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="en-US">
<p><strong>Fórmula:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[VERBO] [OBJETO]. [DETALLE DE ENTRADA]. [DETALLE DE SALIDA].
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" lang="en-US">
<p><strong>Ejemplo completo:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;searchUsers&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Busca usuarios en el sistema por nombre o email. Devuelve una lista paginada de usuarios que coinciden con el criterio de búsqueda, ordenados por relevancia.&quot;</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" lang="en-US">
<p><strong>Elementos:</strong></p>
<ul>
<li>Verbo de acción (busca, crea, elimina, actualiza)</li>
<li>Objeto afectado (usuarios, pagos, pedidos)</li>
<li>Parámetros clave (nombre o email)</li>
<li>Tipo de respuesta (lista paginada)</li>
<li>Ordenamiento (por relevancia)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" lang="en-US">
<h1 id="claridad---inputschema-descriptivo">Claridad - inputSchema Descriptivo</h1>
<h2 id="cada-campo-explicado">Cada campo explicado</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" lang="en-US">
<p><strong>Malo:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;properties&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;q&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;string&quot;</span> <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;n&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;integer&quot;</span> <span class="hljs-punctuation">}</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" lang="en-US">
<p><strong>Bueno:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;properties&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;query&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;string&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Texto a buscar. Puede ser nombre completo, email parcial o nombre de usuario.&quot;</span>
    <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;limit&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;integer&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;minimum&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">1</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;maximum&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">100</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;default&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">20</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Número máximo de resultados a devolver (1-100).&quot;</span>
    <span class="hljs-punctuation">}</span>
  <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;required&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;query&quot;</span><span class="hljs-punctuation">]</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" lang="en-US">
<h1 id="claridad---ejemplos-en-descripci%C3%B3n">Claridad - Ejemplos en Descripción</h1>
<h2 id="cuando-el-esquema-no-es-suficiente">Cuando el esquema no es suficiente</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="en-US">
<p><strong>Añadir ejemplos para casos complejos:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;scheduleTask&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Programa una tarea para ejecutarse en el futuro. El tiempo puede ser absoluto (ISO 8601) o relativo (ej: &#x27;5m&#x27;, &#x27;2h&#x27;, &#x27;1d&#x27;).&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;inputSchema&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;properties&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;time&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
        <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;string&quot;</span><span class="hljs-punctuation">,</span>
        <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Tiempo de ejecución. Ejemplos: &#x27;2026-04-18T15:00:00Z&#x27;, &#x27;30m&#x27;, &#x27;2h&#x27;, &#x27;1d&#x27;&quot;</span>
      <span class="hljs-punctuation">}</span>
    <span class="hljs-punctuation">}</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" lang="en-US">
<p><strong>Regla:</strong></p>
<p>Si el formato es complejo, incluye ejemplos en la descripción.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" lang="en-US">
<h1 id="consistencia-entre-tools">Consistencia entre Tools</h1>
<h2 id="el-principio-de-familiaridad">El principio de familiaridad</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" lang="en-US">
<p><strong>Una vez que el modelo aprende un patrón, espera que las otras tools lo sigan.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" lang="en-US">
<p><strong>Inconsistente:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-comment">// Tool 1</span>
<span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;getUser&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;inputSchema&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;properties&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;userId&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;string&quot;</span> <span class="hljs-punctuation">}</span> <span class="hljs-punctuation">}</span> <span class="hljs-punctuation">}</span>

<span class="hljs-comment">// Tool 2</span>
<span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;deleteUser&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;inputSchema&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;properties&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;id&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;string&quot;</span> <span class="hljs-punctuation">}</span> <span class="hljs-punctuation">}</span> <span class="hljs-punctuation">}</span>

<span class="hljs-comment">// Tool 3</span>
<span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;updateUser&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;inputSchema&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;properties&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;user_id&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;string&quot;</span> <span class="hljs-punctuation">}</span> <span class="hljs-punctuation">}</span> <span class="hljs-punctuation">}</span>
</code></pre>
<p><em>¿userId, id o user_id?</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" lang="en-US">
<h1 id="consistencia---patr%C3%B3n-de-nombres">Consistencia - Patrón de Nombres</h1>
<h2 id="nomenclatura-est%C3%A1ndar">Nomenclatura estándar</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" lang="en-US">
<p><strong>Convenciones recomendadas:</strong></p>
<table>
<thead>
<tr>
<th>Acción</th>
<th>Patrón</th>
<th>Ejemplo</th>
</tr>
</thead>
<tbody>
<tr>
<td>Leer uno</td>
<td><code>get&lt;Entidad&gt;</code></td>
<td><code>getUser</code>, <code>getOrder</code></td>
</tr>
<tr>
<td>Leer varios</td>
<td><code>list&lt;Entidad&gt;s</code></td>

</tr>
<tr>
<td>Crear</td>
<td><code>create&lt;Entidad&gt;</code></td>

</tr>
<tr>
<td>Actualizar</td>
<td><code>update&lt;Entidad&gt;</code></td>
<td><code>updateUser</code>, <code>updateOrder</code></td>
</tr>
<tr>
<td>Eliminar</td>
<td><code>delete&lt;Entidad&gt;</code></td>
<td><code>deleteUser</code>, <code>deleteOrder</code></td>
</tr>
<tr>

<td><code>search&lt;Entidad&gt;s</code></td>

</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" lang="en-US">

<table>

<tr>

</tr>
</thead>
<tbody>

<td><code>&lt;entidad&gt;Id</code></td>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" lang="en-US">
<h1 id="consistencia---estructura-de-respuesta">Consistencia - Estructura de Respuesta</h1>
<h2 id="respuestas-predecibles">Respuestas predecibles</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" lang="en-US">
<p><strong>Estructura estándar:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;success&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;data&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> ... <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;metadata&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;timestamp&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;2026-04-18T15:00:00Z&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;version&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;1.0&quot;</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" lang="en-US">
<p><strong>Para errores:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;success&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">false</span></span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;error&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;code&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;USER_NOT_FOUND&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;message&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Usuario no encontrado&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;details&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;userId&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;123&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;suggestion&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Verifique que el ID sea correcto&quot;</span>
    <span class="hljs-punctuation">}</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" lang="en-US">
<h1 id="consistencia---paginaci%C3%B3n">Consistencia - Paginación</h1>
<h2 id="patr%C3%B3n-est%C3%A1ndar-para-listas">Patrón estándar para listas</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" lang="en-US">
<p><strong>Entrada:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;properties&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;limit&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;integer&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;default&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">20</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;maximum&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">100</span> <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;offset&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;integer&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;default&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">0</span> <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;cursor&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;string&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;description&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Token de paginación del resultado anterior&quot;</span> <span class="hljs-punctuation">}</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" lang="en-US">
<p><strong>Salida:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;success&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;data&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;items&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span>...<span class="hljs-punctuation">]</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;total&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">150</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;hasMore&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;nextCursor&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;eyJvZmZzZXQiOjIwfQ==&quot;</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" lang="en-US">
<h1 id="robustez-ante-fallos">Robustez ante Fallos</h1>
<h2 id="el-servicio-debe-ser-resiliente">El servicio debe ser resiliente</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" lang="en-US">
<p><strong>Principio:</strong></p>
<p>Un error en una tool no debe interrumpir la sesión del usuario.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" lang="en-US">
<p><strong>Estrategias:</strong></p>
<ol>
<li>Validar la entrada antes de procesar</li>
<li>Capturar todas las excepciones</li>
<li>Devolver errores estructurados</li>
<li>Incluir sugerencias de recuperación</li>
<li>Registrar para depuración</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" lang="en-US">
<h1 id="robustez---validaci%C3%B3n-de-entrada">Robustez - Validación de Entrada</h1>
<h2 id="primera-l%C3%ADnea-de-defensa">Primera línea de defensa</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" lang="en-US">
<p><strong>Validar antes de procesar:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-comment">// Validación temprana</span>
  <span class="hljs-keyword">if</span> (!input.<span class="hljs-property">userId</span>) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;MISSING_PARAMETER&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;userId es obligatorio&quot;</span>,
        <span class="hljs-attr">field</span>: <span class="hljs-string">&quot;userId&quot;</span>
      }
    };
  }

  <span class="hljs-keyword">if</span> (!input.<span class="hljs-property">userId</span>.<span class="hljs-title function_">match</span>(<span class="hljs-regexp">/^usr_[a-zA-Z0-9]+$/</span>)) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;INVALID_FORMAT&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;userId debe tener formato usr_xxx&quot;</span>,
        <span class="hljs-attr">field</span>: <span class="hljs-string">&quot;userId&quot;</span>,
        <span class="hljs-attr">received</span>: input.<span class="hljs-property">userId</span>
      }
    };
  }

  <span class="hljs-comment">// Continuar con la lógica...</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" lang="en-US">
<h1 id="robustez---manejo-de-excepciones">Robustez - Manejo de Excepciones</h1>
<h2 id="nunca-lanzar-sin-capturar">Nunca lanzar sin capturar</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" lang="en-US">
<p><strong>Incorrecto:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getUser</span>(input.<span class="hljs-property">userId</span>);  <span class="hljs-comment">// Puede lanzar</span>
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: user };
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" lang="en-US">
<p><strong>Correcto:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">try</span> {
    <span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getUser</span>(input.<span class="hljs-property">userId</span>);
    
    <span class="hljs-keyword">if</span> (!user) {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
        <span class="hljs-attr">error</span>: {
          <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;USER_NOT_FOUND&quot;</span>,
          <span class="hljs-attr">message</span>: <span class="hljs-string">`Usuario <span class="hljs-subst">${input.userId}</span> no encontrado`</span>
        }
      };
    }
    
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: user };
    
  } <span class="hljs-keyword">catch</span> (dbError) {
    logger.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;Database error&quot;</span>, { <span class="hljs-attr">error</span>: dbError, <span class="hljs-attr">userId</span>: input.<span class="hljs-property">userId</span> });
    
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;INTERNAL_ERROR&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Error interno. Por favor, inténtelo más tarde.&quot;</span>,
        <span class="hljs-attr">requestId</span>: <span class="hljs-title function_">generateRequestId</span>()
      }
    };
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" lang="en-US">
<h1 id="robustez---errores-con-sugerencias">Robustez - Errores con Sugerencias</h1>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" lang="en-US">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" lang="en-US">

  <span class="hljs-attr">&quot;error&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" lang="en-US">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" lang="en-US">
<h1 id="parte-2-arquitectura">PARTE 2: ARQUITECTURA</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" lang="en-US">
<h1 id="arquitectura-de-un-servidor-mcp">Arquitectura de un Servidor MCP</h1>
<h2 id="componentes-principales">Componentes principales</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌─────────────────────────────────────────────────┐
│                  MCP SERVER                      │
├─────────────────────────────────────────────────┤
│                                                  │
│  ┌─────────────┐  ┌─────────────┐  ┌──────────┐ │
│  │   Router    │  │  Validator  │  │  Logger  │ │
│  └─────────────┘  └─────────────┘  └──────────┘ │
│                                                  │
│  ┌─────────────────────────────────────────────┐│
│  │              Tool Registry                   ││
│  │  ┌───────┐ ┌───────┐ ┌───────┐ ┌───────┐   ││
│  │  │ Tool  │ │ Tool  │ │ Tool  │ │ Tool  │   ││
│  │  │   A   │ │   B   │ │   C   │ │   D   │   ││
│  │  └───────┘ └───────┘ └───────┘ └───────┘   ││
│  └─────────────────────────────────────────────┘│
│                                                  │
│  ┌─────────────────────────────────────────────┐│

│                                                  │

│              Transport Layer                     │

</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" lang="en-US">
<h1 id="transport-layer">Transport Layer</h1>
<h2 id="opciones-y-consideraciones">Opciones y consideraciones</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" lang="en-US">
<h3 id="stdio">STDIO</h3>
<p><strong>Uso:</strong> Herramientas locales, CLIs</p>
<p><strong>Ventajas:</strong></p>
<ul>
<li>Simplicidad</li>
<li>Sin configuración de red</li>
<li>Ideal para desarrollo</li>
</ul>
<p><strong>Desventajas:</strong></p>
<ul>
<li>Solo un cliente por proceso</li>
<li>No apto para producción multi-cliente</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" lang="en-US">
<h3 id="http--sse">HTTP + SSE</h3>
<p><strong>Uso:</strong> Servicios remotos, producción</p>
<p><strong>Ventajas:</strong></p>
<ul>
<li>Múltiples clientes</li>
<li>Depuración sencilla</li>
<li>Compatible con proxies</li>
</ul>
<p><strong>Desventajas:</strong></p>
<ul>
<li>Requiere servidor HTTP</li>
<li>Más complejo</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" lang="en-US">
<h3 id="websocket">WebSocket</h3>
<p><strong>Uso:</strong> Tiempo real, bidireccional</p>
<p><strong>Ventajas:</strong></p>
<ul>
<li>Comunicación bidireccional</li>
<li>Menor latencia</li>
<li>Ideal para notificaciones</li>
</ul>
<p><strong>Desventajas:</strong></p>
<ul>
<li>Más complejo de implementar</li>
<li>Requiere keepalive</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" lang="en-US">
<h1 id="patr%C3%B3n-de-registro">Patrón de Registro</h1>
<h2 id="c%C3%B3mo-organizar-las-tools">Cómo organizar las tools</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" lang="en-US">
<p><strong>Opción 1: Registro directo</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">server.<span class="hljs-title function_">addTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;getUser&quot;</span>,
  <span class="hljs-comment">// ... definición</span>
});

server.<span class="hljs-title function_">addTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;createUser&quot;</span>,
  <span class="hljs-comment">// ... definición</span>
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" lang="en-US">
<p><strong>Opción 2: Módulos organizados</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// tools/users.js</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> userTools = [
  { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;getUser&quot;</span>, ... },
  { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;createUser&quot;</span>, ... },
  { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;updateUser&quot;</span>, ... },
  { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;deleteUser&quot;</span>, ... },
  { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;listUsers&quot;</span>, ... }
];

<span class="hljs-comment">// tools/orders.js</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> orderTools = [
  { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;getOrder&quot;</span>, ... },
  { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;createOrder&quot;</span>, ... },
  <span class="hljs-comment">// ...</span>
];

<span class="hljs-comment">// server.js</span>
<span class="hljs-keyword">import</span> { userTools } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;./tools/users.js&quot;</span>;
<span class="hljs-keyword">import</span> { orderTools } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;./tools/orders.js&quot;</span>;

[...userTools, ...orderTools].<span class="hljs-title function_">forEach</span>(<span class="hljs-function"><span class="hljs-params">tool</span> =&gt;</span> server.<span class="hljs-title function_">addTool</span>(tool));
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" lang="en-US">
<h1 id="patr%C3%B3n-de-validaci%C3%B3n">Patrón de Validación</h1>
<h2 id="centralizar-la-l%C3%B3gica-de-validaci%C3%B3n">Centralizar la lógica de validación</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" lang="en-US">
<p><strong>Validador reutilizable:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// validators/common.js</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> validators = {
  <span class="hljs-attr">required</span>: <span class="hljs-function">(<span class="hljs-params">field, value</span>) =&gt;</span> {
    <span class="hljs-keyword">if</span> (!value) {
      <span class="hljs-keyword">return</span> { <span class="hljs-attr">valid</span>: <span class="hljs-literal">false</span>, <span class="hljs-attr">error</span>: <span class="hljs-string">`<span class="hljs-subst">${field}</span> es obligatorio`</span> };
    }
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">valid</span>: <span class="hljs-literal">true</span> };
  },
  
  <span class="hljs-attr">pattern</span>: <span class="hljs-function">(<span class="hljs-params">field, value, regex, message</span>) =&gt;</span> {
    <span class="hljs-keyword">if</span> (!regex.<span class="hljs-title function_">test</span>(value)) {
      <span class="hljs-keyword">return</span> { <span class="hljs-attr">valid</span>: <span class="hljs-literal">false</span>, <span class="hljs-attr">error</span>: message };
    }
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">valid</span>: <span class="hljs-literal">true</span> };
  },
  
  <span class="hljs-attr">range</span>: <span class="hljs-function">(<span class="hljs-params">field, value, min, max</span>) =&gt;</span> {
    <span class="hljs-keyword">if</span> (value &lt; min || value &gt; max) {
      <span class="hljs-keyword">return</span> { <span class="hljs-attr">valid</span>: <span class="hljs-literal">false</span>, <span class="hljs-attr">error</span>: <span class="hljs-string">`<span class="hljs-subst">${field}</span> debe estar entre <span class="hljs-subst">${min}</span> y <span class="hljs-subst">${max}</span>`</span> };
    }
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">valid</span>: <span class="hljs-literal">true</span> };
  }
};
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" lang="en-US">
<p><strong>Uso en tool:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">import</span> { validators } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;./validators/common.js&quot;</span>;

<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-comment">// Validación</span>
  <span class="hljs-keyword">const</span> validations = [
    validators.<span class="hljs-title function_">required</span>(<span class="hljs-string">&quot;userId&quot;</span>, input.<span class="hljs-property">userId</span>),
    validators.<span class="hljs-title function_">pattern</span>(<span class="hljs-string">&quot;userId&quot;</span>, input.<span class="hljs-property">userId</span>, <span class="hljs-regexp">/^usr_/</span>, <span class="hljs-string">&quot;userId debe empezar por usr_&quot;</span>),
    validators.<span class="hljs-title function_">range</span>(<span class="hljs-string">&quot;limit&quot;</span>, input.<span class="hljs-property">limit</span>, <span class="hljs-number">1</span>, <span class="hljs-number">100</span>)
  ];
  
  <span class="hljs-keyword">for</span> (<span class="hljs-keyword">const</span> v <span class="hljs-keyword">of</span> validations) {
    <span class="hljs-keyword">if</span> (!v.<span class="hljs-property">valid</span>) {
      <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>, <span class="hljs-attr">error</span>: { <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;VALIDATION_ERROR&quot;</span>, <span class="hljs-attr">message</span>: v.<span class="hljs-property">error</span> } };
    }
  }
  
  <span class="hljs-comment">// Procesar...</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" lang="en-US">
<h1 id="patr%C3%B3n-de-error-handler">Patrón de Error Handler</h1>
<h2 id="centralizar-manejo-de-errores">Centralizar manejo de errores</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// errors/index.js</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">class</span> <span class="hljs-title class_">MCPError</span> <span class="hljs-keyword">extends</span> <span class="hljs-title class_ inherited__">Error</span> {
  <span class="hljs-title function_">constructor</span>(<span class="hljs-params">code, message, details = {}</span>) {
    <span class="hljs-variable language_">super</span>(message);
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">code</span> = code;
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">details</span> = details;
  }
}

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title class_">Errors</span> = {
  <span class="hljs-attr">NOT_FOUND</span>: <span class="hljs-function">(<span class="hljs-params">resource, id</span>) =&gt;</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">MCPError</span>(
    <span class="hljs-string">&quot;NOT_FOUND&quot;</span>,
    <span class="hljs-string">`<span class="hljs-subst">${resource}</span> no encontrado`</span>,
    { resource, id }
  ),
  
  <span class="hljs-attr">INVALID_INPUT</span>: <span class="hljs-function">(<span class="hljs-params">field, reason</span>) =&gt;</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">MCPError</span>(
    <span class="hljs-string">&quot;INVALID_INPUT&quot;</span>,
    <span class="hljs-string">`Campo <span class="hljs-subst">${field}</span> inválido: <span class="hljs-subst">${reason}</span>`</span>,
    { field, reason }
  ),
  
  <span class="hljs-attr">UNAUTHORIZED</span>: <span class="hljs-function">(<span class="hljs-params">action</span>) =&gt;</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">MCPError</span>(
    <span class="hljs-string">&quot;UNAUTHORIZED&quot;</span>,
    <span class="hljs-string">`No autorizado para <span class="hljs-subst">${action}</span>`</span>,
    { action }
  ),
  
  <span class="hljs-attr">INTERNAL</span>: <span class="hljs-function">(<span class="hljs-params">requestId</span>) =&gt;</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">MCPError</span>(
    <span class="hljs-string">&quot;INTERNAL_ERROR&quot;</span>,
    <span class="hljs-string">&quot;Error interno&quot;</span>,
    { requestId }
  )
};

<span class="hljs-comment">// Helper para convertir a respuesta</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">toErrorResponse</span> = (<span class="hljs-params">error</span>) =&gt; {
  <span class="hljs-keyword">if</span> (error <span class="hljs-keyword">instanceof</span> <span class="hljs-title class_">MCPError</span>) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: error.<span class="hljs-property">code</span>,
        <span class="hljs-attr">message</span>: error.<span class="hljs-property">message</span>,
        <span class="hljs-attr">details</span>: error.<span class="hljs-property">details</span>
      }
    };
  }
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
    <span class="hljs-attr">error</span>: {
      <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;INTERNAL_ERROR&quot;</span>,
      <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Error inesperado&quot;</span>
    }
  };
};
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" lang="en-US">
<h1 id="patr%C3%B3n-de-error-handler---uso">Patrón de Error Handler - Uso</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">import</span> { <span class="hljs-title class_">Errors</span>, toErrorResponse } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;./errors/index.js&quot;</span>;

<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">try</span> {
    <span class="hljs-comment">// Validar</span>
    <span class="hljs-keyword">if</span> (!input.<span class="hljs-property">userId</span>) {
      <span class="hljs-keyword">throw</span> <span class="hljs-title class_">Errors</span>.<span class="hljs-title function_">INVALID_INPUT</span>(<span class="hljs-string">&quot;userId&quot;</span>, <span class="hljs-string">&quot;es obligatorio&quot;</span>);
    }
    
    <span class="hljs-comment">// Buscar</span>
    <span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getUser</span>(input.<span class="hljs-property">userId</span>);
    <span class="hljs-keyword">if</span> (!user) {
      <span class="hljs-keyword">throw</span> <span class="hljs-title class_">Errors</span>.<span class="hljs-title function_">NOT_FOUND</span>(<span class="hljs-string">&quot;Usuario&quot;</span>, input.<span class="hljs-property">userId</span>);
    }
    
    <span class="hljs-comment">// Autorizar</span>
    <span class="hljs-keyword">if</span> (!user.<span class="hljs-title function_">canAccess</span>(input.<span class="hljs-property">resource</span>)) {
      <span class="hljs-keyword">throw</span> <span class="hljs-title class_">Errors</span>.<span class="hljs-title function_">UNAUTHORIZED</span>(<span class="hljs-string">&quot;acceder a este recurso&quot;</span>);
    }
    
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: user };
    
  } <span class="hljs-keyword">catch</span> (error) {
    logger.<span class="hljs-title function_">error</span>(<span class="hljs-string">&quot;Tool execution failed&quot;</span>, { error, input });
    <span class="hljs-keyword">return</span> <span class="hljs-title function_">toErrorResponse</span>(error);
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" lang="en-US">
<h1 id="patr%C3%B3n-de-cach%C3%A9">Patrón de Caché</h1>
<h2 id="optimizar-lecturas-frecuentes">Optimizar lecturas frecuentes</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// cache/index.js</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">class</span> <span class="hljs-title class_">SimpleCache</span> {
  <span class="hljs-title function_">constructor</span>(<span class="hljs-params">ttlMs = <span class="hljs-number">60000</span></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">cache</span> = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Map</span>();
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">ttl</span> = ttlMs;
  }
  
  <span class="hljs-title function_">get</span>(<span class="hljs-params">key</span>) {
    <span class="hljs-keyword">const</span> entry = <span class="hljs-variable language_">this</span>.<span class="hljs-property">cache</span>.<span class="hljs-title function_">get</span>(key);
    <span class="hljs-keyword">if</span> (!entry) <span class="hljs-keyword">return</span> <span class="hljs-literal">null</span>;
    
    <span class="hljs-keyword">if</span> (<span class="hljs-title class_">Date</span>.<span class="hljs-title function_">now</span>() &gt; entry.<span class="hljs-property">expires</span>) {
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">cache</span>.<span class="hljs-title function_">delete</span>(key);
      <span class="hljs-keyword">return</span> <span class="hljs-literal">null</span>;
    }
    
    <span class="hljs-keyword">return</span> entry.<span class="hljs-property">value</span>;
  }
  
  <span class="hljs-title function_">set</span>(<span class="hljs-params">key, value</span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">cache</span>.<span class="hljs-title function_">set</span>(key, {
      value,
      <span class="hljs-attr">expires</span>: <span class="hljs-title class_">Date</span>.<span class="hljs-title function_">now</span>() + <span class="hljs-variable language_">this</span>.<span class="hljs-property">ttl</span>
    });
  }
  
  <span class="hljs-title function_">invalidate</span>(<span class="hljs-params">pattern</span>) {
    <span class="hljs-keyword">for</span> (<span class="hljs-keyword">const</span> key <span class="hljs-keyword">of</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">cache</span>.<span class="hljs-title function_">keys</span>()) {
      <span class="hljs-keyword">if</span> (key.<span class="hljs-title function_">includes</span>(pattern)) {
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">cache</span>.<span class="hljs-title function_">delete</span>(key);
      }
    }
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" lang="en-US">
<h1 id="patr%C3%B3n-de-cach%C3%A9---uso">Patrón de Caché - Uso</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">const</span> cache = <span class="hljs-keyword">new</span> <span class="hljs-title class_">SimpleCache</span>(<span class="hljs-number">5</span> * <span class="hljs-number">60</span> * <span class="hljs-number">1000</span>); <span class="hljs-comment">// 5 minutos</span>

<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">const</span> cacheKey = <span class="hljs-string">`user:<span class="hljs-subst">${input.userId}</span>`</span>;
  
  <span class="hljs-comment">// Intentar caché</span>
  <span class="hljs-keyword">const</span> cached = cache.<span class="hljs-title function_">get</span>(cacheKey);
  <span class="hljs-keyword">if</span> (cached) {
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: cached, <span class="hljs-attr">fromCache</span>: <span class="hljs-literal">true</span> };
  }
  
  <span class="hljs-comment">// Buscar en DB</span>
  <span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getUser</span>(input.<span class="hljs-property">userId</span>);
  
  <span class="hljs-keyword">if</span> (!user) {
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>, <span class="hljs-attr">error</span>: { <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;NOT_FOUND&quot;</span> } };
  }
  
  <span class="hljs-comment">// Guardar en caché</span>
  cache.<span class="hljs-title function_">set</span>(cacheKey, user);
  
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: user, <span class="hljs-attr">fromCache</span>: <span class="hljs-literal">false</span> };
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" lang="en-US">
<h1 id="patr%C3%B3n-de-rate-limiting">Patrón de Rate Limiting</h1>
<h2 id="proteger-el-servicio">Proteger el servicio</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// ratelimit/index.js</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">class</span> <span class="hljs-title class_">RateLimiter</span> {
  <span class="hljs-title function_">constructor</span>(<span class="hljs-params">maxRequests = <span class="hljs-number">100</span>, windowMs = <span class="hljs-number">60000</span></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">limits</span> = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Map</span>();
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">max</span> = maxRequests;
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">window</span> = windowMs;
  }
  
  <span class="hljs-title function_">check</span>(<span class="hljs-params">identifier</span>) {
    <span class="hljs-keyword">const</span> now = <span class="hljs-title class_">Date</span>.<span class="hljs-title function_">now</span>();
    <span class="hljs-keyword">const</span> entry = <span class="hljs-variable language_">this</span>.<span class="hljs-property">limits</span>.<span class="hljs-title function_">get</span>(identifier);
    
    <span class="hljs-keyword">if</span> (!entry) {
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">limits</span>.<span class="hljs-title function_">set</span>(identifier, { <span class="hljs-attr">count</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">resetAt</span>: now + <span class="hljs-variable language_">this</span>.<span class="hljs-property">window</span> });
      <span class="hljs-keyword">return</span> { <span class="hljs-attr">allowed</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">remaining</span>: <span class="hljs-variable language_">this</span>.<span class="hljs-property">max</span> - <span class="hljs-number">1</span> };
    }
    
    <span class="hljs-keyword">if</span> (now &gt; entry.<span class="hljs-property">resetAt</span>) {
      entry.<span class="hljs-property">count</span> = <span class="hljs-number">1</span>;
      entry.<span class="hljs-property">resetAt</span> = now + <span class="hljs-variable language_">this</span>.<span class="hljs-property">window</span>;
      <span class="hljs-keyword">return</span> { <span class="hljs-attr">allowed</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">remaining</span>: <span class="hljs-variable language_">this</span>.<span class="hljs-property">max</span> - <span class="hljs-number">1</span> };
    }
    
    <span class="hljs-keyword">if</span> (entry.<span class="hljs-property">count</span> &gt;= <span class="hljs-variable language_">this</span>.<span class="hljs-property">max</span>) {
      <span class="hljs-keyword">return</span> { 
        <span class="hljs-attr">allowed</span>: <span class="hljs-literal">false</span>, 
        <span class="hljs-attr">remaining</span>: <span class="hljs-number">0</span>,
        <span class="hljs-attr">resetAt</span>: entry.<span class="hljs-property">resetAt</span> 
      };
    }
    
    entry.<span class="hljs-property">count</span>++;
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">allowed</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">remaining</span>: <span class="hljs-variable language_">this</span>.<span class="hljs-property">max</span> - entry.<span class="hljs-property">count</span> };
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" lang="en-US">
<h1 id="patr%C3%B3n-de-rate-limiting---uso">Patrón de Rate Limiting - Uso</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="81" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">const</span> limiter = <span class="hljs-keyword">new</span> <span class="hljs-title class_">RateLimiter</span>(<span class="hljs-number">50</span>, <span class="hljs-number">60000</span>); <span class="hljs-comment">// 50 peticiones/min</span>

server.<span class="hljs-title function_">addTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;searchUsers&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: { ... },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input, context) =&gt; {
    <span class="hljs-comment">// Obtener identificador (usuario o IP)</span>
    <span class="hljs-keyword">const</span> identifier = context.<span class="hljs-property">user</span>?.<span class="hljs-property">id</span> || context.<span class="hljs-property">clientIp</span>;
    
    <span class="hljs-comment">// Verificar rate limit</span>
    <span class="hljs-keyword">const</span> limit = limiter.<span class="hljs-title function_">check</span>(identifier);
    
    <span class="hljs-keyword">if</span> (!limit.<span class="hljs-property">allowed</span>) {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
        <span class="hljs-attr">error</span>: {
          <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;RATE_LIMIT_EXCEEDED&quot;</span>,
          <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Demasiadas peticiones. Inténtelo más tarde.&quot;</span>,
          <span class="hljs-attr">retryAfter</span>: <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">ceil</span>((limit.<span class="hljs-property">resetAt</span> - <span class="hljs-title class_">Date</span>.<span class="hljs-title function_">now</span>()) / <span class="hljs-number">1000</span>)
        }
      };
    }
    
    <span class="hljs-comment">// Procesar normalmente</span>
    <span class="hljs-keyword">const</span> users = <span class="hljs-keyword">await</span> <span class="hljs-title function_">searchUsers</span>(input);
    
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>,
      <span class="hljs-attr">data</span>: users,
      <span class="hljs-attr">rateLimit</span>: { <span class="hljs-attr">remaining</span>: limit.<span class="hljs-property">remaining</span> }
    };
  }
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="82" lang="en-US">

    }

}

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="96" lang="en-US">

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="98" lang="en-US">
<h1 id="inputschema---condicionales">inputSchema - Condicionales</h1>
<h2 id="l%C3%B3gica-compleja-con-json-schema">Lógica compleja con JSON Schema</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="99" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;object&quot;</span>,
  <span class="hljs-string">&quot;properties&quot;</span>: {
    <span class="hljs-string">&quot;type&quot;</span>: {
      <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;string&quot;</span>,
      <span class="hljs-string">&quot;enum&quot;</span>: [<span class="hljs-string">&quot;email&quot;</span>, <span class="hljs-string">&quot;sms&quot;</span>, <span class="hljs-string">&quot;push&quot;</span>]
    },

  },
  <span class="hljs-string">&quot;required&quot;</span>: [<span class="hljs-string">&quot;type&quot;</span>, <span class="hljs-string">&quot;recipient&quot;</span>, <span class="hljs-string">&quot;message&quot;</span>],

        }

    {
