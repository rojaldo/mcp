</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="190" lang="en-US">
<h1 id="principios-de-seguridad">Principios de Seguridad</h1>
<h2 id="l%C3%ADmites-de-confianza">Límites de confianza</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="191" lang="en-US">
<p><strong>Principio fundamental:</strong></p>
<p>Todo input que viene del modelo es potencialmente malicioso.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="192" lang="en-US">
<p><strong>Reglas:</strong></p>
<ol>
<li>Nunca confíes en el modelo para validación de seguridad</li>
<li>Siempre valida en el servidor</li>
<li>Nunca expongas credenciales</li>
<li>Minimiza los privilegios de cada tool</li>
<li>Registra todas las operaciones sensibles</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="193" lang="en-US">
<h1 id="validaci%C3%B3n-de-entrada">Validación de Entrada</h1>
<h2 id="primera-l%C3%ADnea-de-defensa-1">Primera línea de defensa</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="194" lang="en-US">
<p><strong>Problema:</strong></p>
<p>El modelo puede enviar datos maliciosos o inesperados.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="195" lang="en-US">
<p><strong>Solución:</strong></p>
<p>Validación exhaustiva en cada tool.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="196" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Nunca confiar en el modelo</span>
<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-comment">// <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Malo: usar directamente</span>
  <span class="hljs-comment">// const user = await db.query(`SELECT * FROM users WHERE id = &#x27;${input.userId}&#x27;`);</span>
  
  <span class="hljs-comment">// <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Bueno: validar primero</span>
  <span class="hljs-keyword">if</span> (!input.<span class="hljs-property">userId</span>.<span class="hljs-title function_">match</span>(<span class="hljs-regexp">/^usr_[a-zA-Z0-9]+$/</span>)) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;INVALID_INPUT&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;userId tiene un formato inválido&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Mejor: usar parámetros</span>
  <span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">query</span>(
    <span class="hljs-string">&quot;SELECT * FROM users WHERE id = $1&quot;</span>,
    [input.<span class="hljs-property">userId</span>]
  );
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="197" lang="en-US">
<h1 id="sql-injection">SQL Injection</h1>
<h2 id="peligro-cl%C3%A1sico">Peligro clásico</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="198" lang="en-US">
<p><strong>Entrada maliciosa:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;userId&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;usr_123&#x27; OR &#x27;1&#x27;=&#x27;1&quot;</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="199" lang="en-US">
<p><strong>Consulta vulnerable:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">const</span> query = <span class="hljs-string">`SELECT * FROM users WHERE id = &#x27;<span class="hljs-subst">${input.userId}</span>&#x27;`</span>;
<span class="hljs-comment">// SELECT * FROM users WHERE id = &#x27;usr_123&#x27; OR &#x27;1&#x27;=&#x27;1&#x27;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="200" lang="en-US">
<p><strong>Consulta segura:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">const</span> query = <span class="hljs-string">&quot;SELECT * FROM users WHERE id = $1&quot;</span>;
<span class="hljs-keyword">const</span> result = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">query</span>(query, [input.<span class="hljs-property">userId</span>]);
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="201" lang="en-US">
<h1 id="path-traversal">Path Traversal</h1>
<h2 id="acceso-a-archivos-no-autorizados">Acceso a archivos no autorizados</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="202" lang="en-US">
<p><strong>Entrada maliciosa:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;filename&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;../../../etc/passwd&quot;</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="203" lang="en-US">
<p><strong>Código vulnerable:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">const</span> content = <span class="hljs-keyword">await</span> fs.<span class="hljs-title function_">readFile</span>(<span class="hljs-string">`./files/<span class="hljs-subst">${input.filename}</span>`</span>);
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: content };
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="204" lang="en-US">
<p><strong>Código seguro:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">import</span> path <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;path&#x27;</span>;

<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-comment">// Normalizar ruta</span>
  <span class="hljs-keyword">const</span> basePath = path.<span class="hljs-title function_">resolve</span>(<span class="hljs-string">&#x27;./files&#x27;</span>);
  <span class="hljs-keyword">const</span> filePath = path.<span class="hljs-title function_">resolve</span>(<span class="hljs-string">&#x27;./files&#x27;</span>, input.<span class="hljs-property">filename</span>);
  
  <span class="hljs-comment">// Verificar que está dentro del directorio permitido</span>
  <span class="hljs-keyword">if</span> (!filePath.<span class="hljs-title function_">startsWith</span>(basePath)) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Acceso denegado al archivo&quot;</span>
      }
    };
  }
  
  <span class="hljs-keyword">const</span> content = <span class="hljs-keyword">await</span> fs.<span class="hljs-title function_">readFile</span>(filePath);
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: content };
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="205" lang="en-US">
<h1 id="command-injection">Command Injection</h1>
<h2 id="ejecuci%C3%B3n-de-comandos">Ejecución de comandos</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="206" lang="en-US">
<p><strong>Entrada maliciosa:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;file; rm -rf /&quot;</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="207" lang="en-US">
<p><strong>Código vulnerable:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">const</span> result = <span class="hljs-title function_">execSync</span>(<span class="hljs-string">`process-file <span class="hljs-subst">${input.name}</span>`</span>);
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: result };
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="208" lang="en-US">
<p><strong>Código seguro:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">import</span> { execFile } <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;child_process&#x27;</span>;
<span class="hljs-keyword">import</span> { promisify } <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;util&#x27;</span>;

<span class="hljs-keyword">const</span> execFileAsync = <span class="hljs-title function_">promisify</span>(execFile);

<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-comment">// Validar entrada</span>
  <span class="hljs-keyword">if</span> (!input.<span class="hljs-property">name</span>.<span class="hljs-title function_">match</span>(<span class="hljs-regexp">/^[a-zA-Z0-9_-]+$/</span>)) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;INVALID_INPUT&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;name solo puede contener caracteres alfanuméricos&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// Usar execFile en lugar de exec</span>
  <span class="hljs-keyword">const</span> result = <span class="hljs-keyword">await</span> <span class="hljs-title function_">execFileAsync</span>(<span class="hljs-string">&#x27;process-file&#x27;</span>, [input.<span class="hljs-property">name</span>]);
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: result.<span class="hljs-property">stdout</span> };
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="209" lang="en-US">
<h1 id="autorizaci%C3%B3n">Autorización</h1>
<h2 id="verificar-permisos">Verificar permisos</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="210" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input, context</span>) {
  <span class="hljs-comment">// 1. Verificar autenticación</span>
  <span class="hljs-keyword">if</span> (!context.<span class="hljs-property">user</span>) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;UNAUTHORIZED&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Requiere autenticación&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// 2. Verificar permisos</span>
  <span class="hljs-keyword">if</span> (!<span class="hljs-title function_">hasPermission</span>(context.<span class="hljs-property">user</span>, <span class="hljs-string">&quot;users:read&quot;</span>)) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;No tiene permisos para leer usuarios&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// 3. Verificar ownership (si aplica)</span>
  <span class="hljs-keyword">if</span> (!<span class="hljs-title function_">canAccessResource</span>(context.<span class="hljs-property">user</span>, input.<span class="hljs-property">resourceId</span>)) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;No tiene acceso a este recurso&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// 4. Registrar acceso</span>
  logger.<span class="hljs-title function_">info</span>(<span class="hljs-string">&quot;Resource accessed&quot;</span>, {
    <span class="hljs-attr">user</span>: context.<span class="hljs-property">user</span>.<span class="hljs-property">id</span>,
    <span class="hljs-attr">resource</span>: input.<span class="hljs-property">resourceId</span>,
    <span class="hljs-attr">action</span>: <span class="hljs-string">&quot;read&quot;</span>
  });
  
  <span class="hljs-comment">// Procesar...</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="211" lang="en-US">
<h1 id="auditor%C3%ADa-y-logging">Auditoría y Logging</h1>
<h2 id="trazabilidad">Trazabilidad</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="212" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">const</span> auditLogger = {
  <span class="hljs-attr">log</span>: <span class="hljs-function">(<span class="hljs-params">action, context, details</span>) =&gt;</span> {
    logger.<span class="hljs-title function_">info</span>(<span class="hljs-string">&quot;AUDIT&quot;</span>, {
      <span class="hljs-attr">timestamp</span>: <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>().<span class="hljs-title function_">toISOString</span>(),
      action,
      <span class="hljs-attr">user</span>: context.<span class="hljs-property">user</span>?.<span class="hljs-property">id</span> || <span class="hljs-string">&quot;anonymous&quot;</span>,
      <span class="hljs-attr">ip</span>: context.<span class="hljs-property">ip</span>,
      <span class="hljs-attr">userAgent</span>: context.<span class="hljs-property">userAgent</span>,
      ...details
    });
  }
};

<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input, context</span>) {
  <span class="hljs-comment">// Registrar intento</span>
  auditLogger.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;DELETE_USER_ATTEMPT&quot;</span>, context, {
    <span class="hljs-attr">targetUser</span>: input.<span class="hljs-property">userId</span>
  });
  
  <span class="hljs-comment">// Verificar permisos</span>
  <span class="hljs-keyword">if</span> (!context.<span class="hljs-property">user</span>.<span class="hljs-property">isAdmin</span>) {
    auditLogger.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;DELETE_USER_DENIED&quot;</span>, context, {
      <span class="hljs-attr">targetUser</span>: input.<span class="hljs-property">userId</span>,
      <span class="hljs-attr">reason</span>: <span class="hljs-string">&quot;INSUFFICIENT_PERMISSIONS&quot;</span>
    });
    
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Solo administradores pueden eliminar usuarios&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// Ejecutar</span>
  <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">deleteUser</span>(input.<span class="hljs-property">userId</span>);
  
  <span class="hljs-comment">// Registrar éxito</span>
  auditLogger.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;DELETE_USER_SUCCESS&quot;</span>, context, {
    <span class="hljs-attr">targetUser</span>: input.<span class="hljs-property">userId</span>
  });
  
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span> };
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="213" lang="en-US">
<h1 id="secrets-y-credenciales">Secrets y Credenciales</h1>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="214" lang="en-US">

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{

<p><strong><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Correcto:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="216" lang="en-US">
<h1 id="parte-8-rendimiento">PARTE 8: RENDIMIENTO</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="217" lang="en-US">
<h1 id="optimizaci%C3%B3n">Optimización</h1>
<h2 id="minimizar-tokens-y-latencia">Minimizar tokens y latencia</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="218" lang="en-US">
<p><strong>Principio:</strong></p>

<h1 id="cach%C3%A9-estrat%C3%A9gico">Caché Estratégico</h1>
<h2 id="qu%C3%A9-cachear">Qué cachear</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="226" lang="en-US">
<p><strong>Cacheable:</strong></p>
<ul>
<li>Datos estáticos (configuración)</li>
<li>Datos que cambian poco (perfiles de usuario)</li>
<li>Resultados de cálculos costosos</li>
<li>Listas con baja frecuencia de actualización</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="227" lang="en-US">
<p><strong>No cacheable:</strong></p>
<ul>
<li>Datos sensibles (tokens, sesiones)</li>
<li>Datos que cambian frecuentemente (logs, métricas)</li>
<li>Resultados de operaciones de escritura</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="228" lang="en-US">
<p><strong>TTL recomendados:</strong></p>
<table>
<thead>
<tr>
<th>Tipo de dato</th>
<th>TTL</th>
</tr>
</thead>
<tbody>
<tr>
<td>Configuración</td>
<td>5-15 min</td>
</tr>
<tr>
<td>Perfil de usuario</td>
<td>1-5 min</td>
</tr>
<tr>
<td>Listas</td>
<td>30s - 2 min</td>
</tr>
<tr>
<td>Búsquedas</td>
<td>30s - 1 min</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="229" lang="en-US">
<h1 id="cach%C3%A9---implementaci%C3%B3n">Caché - Implementación</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="230" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">import</span> <span class="hljs-title class_">NodeCache</span> <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;node-cache&#x27;</span>;

<span class="hljs-keyword">const</span> cache = <span class="hljs-keyword">new</span> <span class="hljs-title class_">NodeCache</span>({ <span class="hljs-attr">stdTTL</span>: <span class="hljs-number">60</span>, <span class="hljs-attr">checkperiod</span>: <span class="hljs-number">120</span> });

<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">const</span> cacheKey = <span class="hljs-string">`user:<span class="hljs-subst">${input.userId}</span>:<span class="hljs-subst">${input.fields?.join(<span class="hljs-string">&#x27;,&#x27;</span>) || <span class="hljs-string">&#x27;default&#x27;</span>}</span>`</span>;
  
  <span class="hljs-comment">// Intentar caché</span>
  <span class="hljs-keyword">const</span> cached = cache.<span class="hljs-title function_">get</span>(cacheKey);
  <span class="hljs-keyword">if</span> (cached) {
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: cached, <span class="hljs-attr">cached</span>: <span class="hljs-literal">true</span> };
  }
  
  <span class="hljs-comment">// Obtener de DB</span>
  <span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getUser</span>(input.<span class="hljs-property">userId</span>);
  
  <span class="hljs-comment">// Filtrar campos</span>
  <span class="hljs-keyword">const</span> fields = input.<span class="hljs-property">fields</span> || [<span class="hljs-string">&quot;id&quot;</span>, <span class="hljs-string">&quot;name&quot;</span>, <span class="hljs-string">&quot;email&quot;</span>];
  <span class="hljs-keyword">const</span> result = {};
  <span class="hljs-keyword">for</span> (<span class="hljs-keyword">const</span> field <span class="hljs-keyword">of</span> fields) {
    <span class="hljs-keyword">if</span> (user[field] !== <span class="hljs-literal">undefined</span>) {
      result[field] = user[field];
    }
  }
  
  <span class="hljs-comment">// Guardar en caché</span>
  cache.<span class="hljs-title function_">set</span>(cacheKey, result);
  
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: result, <span class="hljs-attr">cached</span>: <span class="hljs-literal">false</span> };
}

<span class="hljs-comment">// Invalidar caché cuando el usuario cambia</span>
<span class="hljs-keyword">function</span> <span class="hljs-title function_">invalidateUserCache</span>(<span class="hljs-params">userId</span>) {
  cache.<span class="hljs-title function_">delByPattern</span>(<span class="hljs-string">`user:<span class="hljs-subst">${userId}</span>:*`</span>);
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="231" lang="en-US">
<h1 id="paralelizaci%C3%B3n">Paralelización</h1>
<h2 id="ejecutar-en-paralelo-cuando-sea-posible">Ejecutar en paralelo cuando sea posible</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="232" lang="en-US">
<p><strong>Secuencial (lento):</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getUser</span>(input.<span class="hljs-property">userId</span>);
  <span class="hljs-keyword">const</span> orders = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getOrders</span>(input.<span class="hljs-property">userId</span>);
  <span class="hljs-keyword">const</span> payments = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getPayments</span>(input.<span class="hljs-property">userId</span>);
  
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>,
    <span class="hljs-attr">data</span>: { user, orders, payments }
  };
}
<span class="hljs-comment">// Tiempo: t1 + t2 + t3</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="233" lang="en-US">
<p><strong>Paralelo (rápido):</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">const</span> [user, orders, payments] = <span class="hljs-keyword">await</span> <span class="hljs-title class_">Promise</span>.<span class="hljs-title function_">all</span>([
    db.<span class="hljs-title function_">getUser</span>(input.<span class="hljs-property">userId</span>),
    db.<span class="hljs-title function_">getOrders</span>(input.<span class="hljs-property">userId</span>),
    db.<span class="hljs-title function_">getPayments</span>(input.<span class="hljs-property">userId</span>)
  ]);
  
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>,
    <span class="hljs-attr">data</span>: { user, orders, payments }
  };
}
<span class="hljs-comment">// Tiempo: max(t1, t2, t3)</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="234" lang="en-US">
<h1 id="batching">Batching</h1>
<h2 id="reducir-llamadas">Reducir llamadas</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="235" lang="en-US">
<p><strong>Sin batching:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">const</span> results = [];
  <span class="hljs-keyword">for</span> (<span class="hljs-keyword">const</span> id <span class="hljs-keyword">of</span> input.<span class="hljs-property">userIds</span>) {
    <span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getUser</span>(id);  <span class="hljs-comment">// N llamadas</span>
    results.<span class="hljs-title function_">push</span>(user);
  }
  <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: results };
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="236" lang="en-US">

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="255" lang="en-US">
<h1 id="caso-1-servidor-de-archivos">Caso 1: Servidor de Archivos</h1>
<h2 id="buenas-pr%C3%A1cticas-aplicadas">Buenas prácticas aplicadas</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="256" lang="en-US">
<p><strong>Requisito:</strong></p>
<p>Servidor MCP que permite leer y escribir archivos en un directorio específico.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="257" lang="en-US">
<p><strong>Decisiones de diseño:</strong></p>
<ol>
<li><strong>Seguridad:</strong> Prevención de path traversal</li>
<li><strong>Validación:</strong> Nombres de archivo seguros</li>
<li><strong>Autorización:</strong> Directorio base restringido</li>
<li><strong>Errores:</strong> Mensajes claros pero sin exponer rutas internas</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="258" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">import</span> path <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;path&#x27;</span>;
<span class="hljs-keyword">import</span> fs <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;fs/promises&#x27;</span>;

<span class="hljs-keyword">const</span> <span class="hljs-variable constant_">BASE_DIR</span> = path.<span class="hljs-title function_">resolve</span>(<span class="hljs-string">&#x27;./data&#x27;</span>);

server.<span class="hljs-title function_">addTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;readFile&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Lee el contenido de un archivo del directorio de datos&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">filename</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
        <span class="hljs-attr">pattern</span>: <span class="hljs-string">&quot;^[a-zA-Z0-9_.-]+$&quot;</span>,
        <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Nombre del archivo (solo alfanuméricos, _, ., -)&quot;</span>
      }
    },
    <span class="hljs-attr">required</span>: [<span class="hljs-string">&quot;filename&quot;</span>]
  },
  <span class="hljs-attr">annotations</span>: { <span class="hljs-attr">readOnlyHint</span>: <span class="hljs-literal">true</span> },
  
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
    <span class="hljs-comment">// Validar nombre</span>
    <span class="hljs-keyword">if</span> (!input.<span class="hljs-property">filename</span>.<span class="hljs-title function_">match</span>(<span class="hljs-regexp">/^[a-zA-Z0-9_.-]+$/</span>)) {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
        <span class="hljs-attr">error</span>: {
          <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;INVALID_INPUT&quot;</span>,
          <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Nombre de archivo inválido&quot;</span>
        }
      };
    }
    
    <span class="hljs-comment">// Resolver ruta de forma segura</span>
    <span class="hljs-keyword">const</span> filePath = path.<span class="hljs-title function_">resolve</span>(<span class="hljs-variable constant_">BASE_DIR</span>, input.<span class="hljs-property">filename</span>);
    
    <span class="hljs-comment">// Verificar que está dentro del directorio permitido</span>
    <span class="hljs-keyword">if</span> (!filePath.<span class="hljs-title function_">startsWith</span>(<span class="hljs-variable constant_">BASE_DIR</span>)) {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
        <span class="hljs-attr">error</span>: {
          <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
          <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Acceso denegado&quot;</span>
        }
      };
    }
    
    <span class="hljs-keyword">try</span> {
      <span class="hljs-keyword">const</span> content = <span class="hljs-keyword">await</span> fs.<span class="hljs-title function_">readFile</span>(filePath, <span class="hljs-string">&#x27;utf-8&#x27;</span>);
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>,
        <span class="hljs-attr">data</span>: { content, <span class="hljs-attr">filename</span>: input.<span class="hljs-property">filename</span> }
      };
    } <span class="hljs-keyword">catch</span> (error) {
      <span class="hljs-keyword">if</span> (error.<span class="hljs-property">code</span> === <span class="hljs-string">&#x27;ENOENT&#x27;</span>) {
        <span class="hljs-keyword">return</span> {
          <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
          <span class="hljs-attr">error</span>: {
            <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;NOT_FOUND&quot;</span>,
            <span class="hljs-attr">message</span>: <span class="hljs-string">`Archivo <span class="hljs-subst">${input.filename}</span> no encontrado`</span>
          }

      }
      
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
        <span class="hljs-attr">error</span>: {
          <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;INTERNAL_ERROR&quot;</span>,
          <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Error al leer el archivo&quot;</span>
        }
      };
    }
  }
});

<h1 id="caso-2-servidor-de-base-de-datos">Caso 2: Servidor de Base de Datos</h1>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="260" lang="en-US">
<p><strong>Requisito:</strong></p>
<p>Permitir consultas a base de datos con validación y paginación.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="261" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">server.<span class="hljs-title function_">addTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;queryUsers&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Busca usuarios con filtros y paginación&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">filters</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
        <span class="hljs-attr">properties</span>: {
          <span class="hljs-attr">status</span>: { <span class="hljs-string">&quot;enum&quot;</span>: [<span class="hljs-string">&quot;active&quot;</span>, <span class="hljs-string">&quot;inactive&quot;</span>, <span class="hljs-string">&quot;pending&quot;</span>] },
          <span class="hljs-attr">role</span>: { <span class="hljs-string">&quot;enum&quot;</span>: [<span class="hljs-string">&quot;admin&quot;</span>, <span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;guest&quot;</span>] },
          <span class="hljs-attr">createdAfter</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>, <span class="hljs-attr">format</span>: <span class="hljs-string">&quot;date-time&quot;</span> },
          <span class="hljs-attr">createdBefore</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>, <span class="hljs-attr">format</span>: <span class="hljs-string">&quot;date-time&quot;</span> }
        }
      },
      <span class="hljs-attr">sort</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;object&quot;</span>,
        <span class="hljs-attr">properties</span>: {
          <span class="hljs-attr">field</span>: { <span class="hljs-string">&quot;enum&quot;</span>: [<span class="hljs-string">&quot;createdAt&quot;</span>, <span class="hljs-string">&quot;name&quot;</span>, <span class="hljs-string">&quot;email&quot;</span>] },
          <span class="hljs-attr">order</span>: { <span class="hljs-string">&quot;enum&quot;</span>: [<span class="hljs-string">&quot;asc&quot;</span>, <span class="hljs-string">&quot;desc&quot;</span>] }
        }
      },
      <span class="hljs-attr">limit</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;integer&quot;</span>, <span class="hljs-attr">minimum</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">maximum</span>: <span class="hljs-number">100</span>, <span class="hljs-attr">default</span>: <span class="hljs-number">20</span> },
      <span class="hljs-attr">offset</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;integer&quot;</span>, <span class="hljs-attr">minimum</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">default</span>: <span class="hljs-number">0</span> }
    }
  },
  <span class="hljs-attr">annotations</span>: { <span class="hljs-attr">readOnlyHint</span>: <span class="hljs-literal">true</span> },
  
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
    <span class="hljs-comment">// Construir consulta segura</span>
    <span class="hljs-keyword">const</span> query = <span class="hljs-title function_">db</span>(<span class="hljs-string">&#x27;users&#x27;</span>);
    
    <span class="hljs-comment">// Aplicar filtros con whitelist</span>
    <span class="hljs-keyword">if</span> (input.<span class="hljs-property">filters</span>?.<span class="hljs-property">status</span>) {
      query.<span class="hljs-title function_">where</span>(<span class="hljs-string">&#x27;status&#x27;</span>, input.<span class="hljs-property">filters</span>.<span class="hljs-property">status</span>);
    }
    <span class="hljs-keyword">if</span> (input.<span class="hljs-property">filters</span>?.<span class="hljs-property">role</span>) {
      query.<span class="hljs-title function_">where</span>(<span class="hljs-string">&#x27;role&#x27;</span>, input.<span class="hljs-property">filters</span>.<span class="hljs-property">role</span>);
    }
    <span class="hljs-keyword">if</span> (input.<span class="hljs-property">filters</span>?.<span class="hljs-property">createdAfter</span>) {
      query.<span class="hljs-title function_">where</span>(<span class="hljs-string">&#x27;createdAt&#x27;</span>, <span class="hljs-string">&#x27;&gt;=&#x27;</span>, <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>(input.<span class="hljs-property">filters</span>.<span class="hljs-property">createdAfter</span>));
    }
    
    <span class="hljs-comment">// Aplicar ordenamiento con whitelist</span>
    <span class="hljs-keyword">if</span> (input.<span class="hljs-property">sort</span>) {
      query.<span class="hljs-title function_">orderBy</span>(input.<span class="hljs-property">sort</span>.<span class="hljs-property">field</span>, input.<span class="hljs-property">sort</span>.<span class="hljs-property">order</span> || <span class="hljs-string">&#x27;asc&#x27;</span>);
    }
    
    <span class="hljs-comment">// Aplicar paginación</span>
    query.<span class="hljs-title function_">limit</span>(input.<span class="hljs-property">limit</span>).<span class="hljs-title function_">offset</span>(input.<span class="hljs-property">offset</span>);
    
    <span class="hljs-comment">// Ejecutar</span>
    <span class="hljs-keyword">const</span> users = <span class="hljs-keyword">await</span> query;
    <span class="hljs-keyword">const</span> total = <span class="hljs-keyword">await</span> <span class="hljs-title function_">db</span>(<span class="hljs-string">&#x27;users&#x27;</span>).<span class="hljs-title function_">count</span>(<span class="hljs-string">&#x27;* as count&#x27;</span>).<span class="hljs-title function_">first</span>();
    
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>,
      <span class="hljs-attr">data</span>: {
        <span class="hljs-attr">items</span>: users.<span class="hljs-title function_">map</span>(<span class="hljs-function"><span class="hljs-params">u</span> =&gt;</span> ({
          <span class="hljs-attr">id</span>: u.<span class="hljs-property">id</span>,
          <span class="hljs-attr">name</span>: u.<span class="hljs-property">name</span>,
          <span class="hljs-attr">email</span>: u.<span class="hljs-property">email</span>,
          <span class="hljs-attr">status</span>: u.<span class="hljs-property">status</span>,
          <span class="hljs-attr">role</span>: u.<span class="hljs-property">role</span>
        })),
        <span class="hljs-attr">total</span>: total.<span class="hljs-property">count</span>,
        <span class="hljs-attr">hasMore</span>: (input.<span class="hljs-property">offset</span> + input.<span class="hljs-property">limit</span>) &lt; total.<span class="hljs-property">count</span>
      }
    };
  }
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="262" lang="en-US">
<h1 id="caso-3-api-gateway">Caso 3: API Gateway</h1>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="263" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">import</span> axios <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;axios&#x27;</span>;

<span class="hljs-keyword">const</span> api = axios.<span class="hljs-title function_">create</span>({
  <span class="hljs-attr">baseURL</span>: <span class="hljs-string">&#x27;https://api.example.com&#x27;</span>,
  <span class="hljs-attr">timeout</span>: <span class="hljs-number">10000</span>
});

server.<span class="hljs-title function_">addTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;getWeather&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Obtiene el clima actual para una ciudad&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">city</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
        <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Nombre de la ciudad&quot;</span>
      },
      <span class="hljs-attr">units</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
        <span class="hljs-string">&quot;enum&quot;</span>: [<span class="hljs-string">&quot;celsius&quot;</span>, <span class="hljs-string">&quot;fahrenheit&quot;</span>],
        <span class="hljs-attr">default</span>: <span class="hljs-string">&quot;celsius&quot;</span>
      }
    },
    <span class="hljs-attr">required</span>: [<span class="hljs-string">&quot;city&quot;</span>]
  },
  <span class="hljs-attr">annotations</span>: { <span class="hljs-attr">readOnlyHint</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">openWorldHint</span>: <span class="hljs-literal">true</span> },
  
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input, context) =&gt; {
    <span class="hljs-keyword">try</span> {
      <span class="hljs-keyword">const</span> response = <span class="hljs-keyword">await</span> api.<span class="hljs-title function_">get</span>(<span class="hljs-string">&#x27;/weather&#x27;</span>, {
        <span class="hljs-attr">params</span>: {
          <span class="hljs-attr">city</span>: input.<span class="hljs-property">city</span>,
          <span class="hljs-attr">units</span>: input.<span class="hljs-property">units</span>
        }
      });
      
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>,
        <span class="hljs-attr">data</span>: {
          <span class="hljs-attr">temperature</span>: response.<span class="hljs-property">data</span>.<span class="hljs-property">temp</span>,
          <span class="hljs-attr">conditions</span>: response.<span class="hljs-property">data</span>.<span class="hljs-property">conditions</span>,
          <span class="hljs-attr">humidity</span>: response.<span class="hljs-property">data</span>.<span class="hljs-property">humidity</span>
        }
      };
      
    } <span class="hljs-keyword">catch</span> (error) {
      <span class="hljs-keyword">if</span> (error.<span class="hljs-property">response</span>?.<span class="hljs-property">status</span> === <span class="hljs-number">404</span>) {
        <span class="hljs-keyword">return</span> {
          <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
          <span class="hljs-attr">error</span>: {
            <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;NOT_FOUND&quot;</span>,
            <span class="hljs-attr">message</span>: <span class="hljs-string">`Ciudad &quot;<span class="hljs-subst">${input.city}</span>&quot; no encontrada`</span>
          }

      }
      
      <span class="hljs-keyword">if</span> (error.<span class="hljs-property">response</span>?.<span class="hljs-property">status</span> === <span class="hljs-number">429</span>) {
        <span class="hljs-keyword">return</span> {
          <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,

            <span class="hljs-attr">retryAfter</span>: error.<span class="hljs-property">response</span>.<span class="hljs-property">headers</span>[<span class="hljs-string">&#x27;retry-after&#x27;</span>]
          }
        };
      }
      
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
        <span class="hljs-attr">error</span>: {

        }
      };
    }
  }
});

<h1 id="checklist-de-buenas-pr%C3%A1cticas">Checklist de Buenas Prácticas</h1>
<h2 id="antes-de-publicar-un-servicio-mcp">Antes de publicar un servicio MCP</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="265" lang="en-US">
<h3 id="descripciones">Descripciones</h3>
<ul>
<li>[ ] Todas las tools tienen descripciones claras</li>
<li>[ ] Todos los parámetros tienen descripción</li>
<li>[ ] Los valores de enum están documentados</li>
<li>[ ] Se incluyen ejemplos para casos complejos</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="266" lang="en-US">
<h3 id="validaci%C3%B3n">Validación</h3>
<ul>
<li>[ ] Todas las entradas se validan contra el esquema</li>
<li>[ ] Se validan rangos (min/max)</li>
<li>[ ] Se validan formatos (email, fecha, etc.)</li>
<li>[ ] Se sanitizan strings antes de usar en consultas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="267" lang="en-US">
<h3 id="seguridad">Seguridad</h3>
<ul>
<li>[ ] No se exponen credenciales</li>
<li>[ ] Se previene path traversal</li>
<li>[ ] Se previene SQL injection</li>
<li>[ ] Se verifican permisos en cada operación</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="268" lang="en-US">
<h3 id="errores">Errores</h3>
<ul>
<li>[ ] Todos los errores tienen código</li>
<li>[ ] Los errores incluyen sugerencias</li>
<li>[ ] No se exponen detalles internos</li>
<li>[ ] Se genera requestId para depuración</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="269" lang="en-US">
<h3 id="rendimiento">Rendimiento</h3>
<ul>
<li>[ ] Se usa paginación para listas grandes</li>
<li>[ ] Se implementan cachés donde aplica</li>
<li>[ ] Se minimizan los tokens en respuestas</li>
<li>[ ] Se paralelizan operaciones independientes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="270" lang="en-US">
<h3 id="testing">Testing</h3>
<ul>
<li>[ ] Unit tests para cada tool</li>
<li>[ ] Tests de validación de entrada</li>
<li>[ ] Tests de manejo de errores</li>
<li>[ ] Integration tests con el protocolo</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="271" lang="en-US">
<h1 id="resumen-final">Resumen Final</h1>
<h2 id="los-10-mandamientos-del-dise%C3%B1o-mcp">Los 10 mandamientos del diseño MCP</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="272" lang="en-US">
<h3 id="1-claridad-ante-todo">1. Claridad ante todo</h3>
<p>Las descripciones son tu API. Hazlas claras y completas.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="273" lang="en-US">
<h3 id="2-consistencia-en-patrones">2. Consistencia en patrones</h3>
<p>Usa los mismos nombres, estructuras y convenciones en todas las tools.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="274" lang="en-US">
<h3 id="3-validaci%C3%B3n-exhaustiva">3. Validación exhaustiva</h3>
<p>Nunca confíes en la entrada. Valida todo.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="275" lang="en-US">
<h3 id="4-errores-informativos">4. Errores informativos</h3>
<p>Los errores deben ayudar al modelo a recuperarse.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="276" lang="en-US">
<h3 id="5-seguridad-por-defecto">5. Seguridad por defecto</h3>
<p>Toda entrada es potencialmente maliciosa.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="277" lang="en-US">
<h3 id="6-tokens-m%C3%ADnimos">6. Tokens mínimos</h3>
<p>Devuelve solo lo necesario.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="278" lang="en-US">
<h3 id="7-paginaci%C3%B3n-obligatoria">7. Paginación obligatoria</h3>
<p>Las listas grandes deben paginarse.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="279" lang="en-US">
<h3 id="8-cach%C3%A9-estrat%C3%A9gico">8. Caché estratégico</h3>
<p>Cachea lo que cambia poco.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="280" lang="en-US">
<h3 id="9-logging-completo">9. Logging completo</h3>
<p>Registra todo para poder depurar.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="281" lang="en-US">
<h3 id="10-tests-exhaustivos">10. Tests exhaustivos</h3>
<p>Un servicio sin tests no está completo.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="282" lang="en-US">
<h1 id="cierre">Cierre</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="283" lang="en-US">
<h2 id="dise%C3%B1o-de-servicios-mcp-buenas-pr%C3%A1cticas-1">Diseño de Servicios MCP: Buenas Prácticas</h2>
<h3 id="de-los-fundamentos-a-la-implementaci%C3%B3n-profesional">De los fundamentos a la implementación profesional</h3>
