<h3 id="paginaci%C3%B3n-por-desplazamiento">Paginación por Desplazamiento</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-meta">@mcp.tool(<span class="hljs-params">annotations={<span class="hljs-string">&quot;readOnlyHint&quot;</span>: <span class="hljs-literal">True</span>}</span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">list_users</span>(<span class="hljs-params">
    limit: Annotated[<span class="hljs-built_in">int</span>, Field(<span class="hljs-params">ge=<span class="hljs-number">1</span>, le=<span class="hljs-number">100</span></span>)] = <span class="hljs-number">20</span>,
    offset: Annotated[<span class="hljs-built_in">int</span>, Field(<span class="hljs-params">ge=<span class="hljs-number">0</span></span>)] = <span class="hljs-number">0</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Lista usuarios con paginación por desplazamiento.&quot;&quot;&quot;</span>
    users = db.get_users(limit=limit, offset=offset)
    total = db.count_users()
    
    <span class="hljs-keyword">return</span> {
        <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>,
        <span class="hljs-string">&quot;data&quot;</span>: {
            <span class="hljs-string">&quot;items&quot;</span>: users,
            <span class="hljs-string">&quot;total&quot;</span>: total,
            <span class="hljs-string">&quot;limit&quot;</span>: limit,
            <span class="hljs-string">&quot;offset&quot;</span>: offset,
            <span class="hljs-string">&quot;has_more&quot;</span>: (offset + limit) &lt; total
        }
    }
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="105" lang="en-US">
<h3 id="paginaci%C3%B3n-por-cursor">Paginación por Cursor</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> base64
<span class="hljs-keyword">import</span> json

<span class="hljs-meta">@mcp.tool(<span class="hljs-params">annotations={<span class="hljs-string">&quot;readOnlyHint&quot;</span>: <span class="hljs-literal">True</span>}</span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">list_users_cursor</span>(<span class="hljs-params">
    limit: Annotated[<span class="hljs-built_in">int</span>, Field(<span class="hljs-params">ge=<span class="hljs-number">1</span>, le=<span class="hljs-number">100</span></span>)] = <span class="hljs-number">20</span>,
    cursor: Annotated[<span class="hljs-built_in">str</span> | <span class="hljs-literal">None</span>, Field(<span class="hljs-params">
        description=<span class="hljs-string">&quot;Token de la página anterior&quot;</span>
    </span>)] = <span class="hljs-literal">None</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Lista usuarios con paginación por cursor.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># Decodificar cursor</span>
    <span class="hljs-keyword">if</span> cursor:
        decoded = json.loads(base64.b64decode(cursor).decode())
        last_id = decoded.get(<span class="hljs-string">&quot;last_id&quot;</span>)
    <span class="hljs-keyword">else</span>:
        last_id = <span class="hljs-literal">None</span>
    
    <span class="hljs-comment"># Obtener usuarios</span>
    users = db.get_users_after(last_id, limit)
    
    <span class="hljs-comment"># Generar siguiente cursor</span>
    next_cursor = <span class="hljs-literal">None</span>
    <span class="hljs-keyword">if</span> <span class="hljs-built_in">len</span>(users) == limit:
        next_cursor = base64.b64encode(
            json.dumps({<span class="hljs-string">&quot;last_id&quot;</span>: users[-<span class="hljs-number">1</span>][<span class="hljs-string">&quot;id&quot;</span>]}).encode()
        ).decode()
    
    <span class="hljs-keyword">return</span> {
        <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>,
        <span class="hljs-string">&quot;data&quot;</span>: {
            <span class="hljs-string">&quot;items&quot;</span>: users,
            <span class="hljs-string">&quot;next_cursor&quot;</span>: next_cursor,
            <span class="hljs-string">&quot;has_more&quot;</span>: next_cursor <span class="hljs-keyword">is</span> <span class="hljs-keyword">not</span> <span class="hljs-literal">None</span>
        }
    }
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="106" lang="en-US">
<h1 id="filtrado-y-b%C3%BAsqueda">Filtrado y Búsqueda</h1>
<h2 id="encontrar-lo-que-se-necesita">Encontrar lo que se necesita</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="107" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> datetime <span class="hljs-keyword">import</span> datetime
<span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> <span class="hljs-type">Literal</span>

<span class="hljs-meta">@mcp.tool(<span class="hljs-params">annotations={<span class="hljs-string">&quot;readOnlyHint&quot;</span>: <span class="hljs-literal">True</span>}</span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">search_orders</span>(<span class="hljs-params">
    query: Annotated[<span class="hljs-built_in">str</span> | <span class="hljs-literal">None</span>, Field(<span class="hljs-params">
        description=<span class="hljs-string">&quot;Texto a buscar&quot;</span>
    </span>)] = <span class="hljs-literal">None</span>,
    status: Annotated[<span class="hljs-built_in">list</span>[<span class="hljs-type">Literal</span>[
        <span class="hljs-string">&quot;pending&quot;</span>, <span class="hljs-string">&quot;processing&quot;</span>, <span class="hljs-string">&quot;shipped&quot;</span>, <span class="hljs-string">&quot;delivered&quot;</span>, <span class="hljs-string">&quot;cancelled&quot;</span>
    ]] | <span class="hljs-literal">None</span>, Field(<span class="hljs-params">
        description=<span class="hljs-string">&quot;Filtrar por estados (puede ser múltiple)&quot;</span>
    </span>)] = <span class="hljs-literal">None</span>,
    date_from: Annotated[<span class="hljs-built_in">str</span> | <span class="hljs-literal">None</span>, Field(<span class="hljs-params">
        description=<span class="hljs-string">&quot;Fecha mínima (ISO 8601)&quot;</span>
    </span>)] = <span class="hljs-literal">None</span>,
    date_to: Annotated[<span class="hljs-built_in">str</span> | <span class="hljs-literal">None</span>, Field(<span class="hljs-params">
        description=<span class="hljs-string">&quot;Fecha máxima (ISO 8601)&quot;</span>
    </span>)] = <span class="hljs-literal">None</span>,
    min_amount: Annotated[<span class="hljs-built_in">float</span> | <span class="hljs-literal">None</span>, Field(<span class="hljs-params">ge=<span class="hljs-number">0</span></span>)] = <span class="hljs-literal">None</span>,
    max_amount: Annotated[<span class="hljs-built_in">float</span> | <span class="hljs-literal">None</span>, Field(<span class="hljs-params">ge=<span class="hljs-number">0</span></span>)] = <span class="hljs-literal">None</span>,
    sort_by: <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;date&quot;</span>, <span class="hljs-string">&quot;amount&quot;</span>, <span class="hljs-string">&quot;status&quot;</span>] = <span class="hljs-string">&quot;date&quot;</span>,
    sort_order: <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;asc&quot;</span>, <span class="hljs-string">&quot;desc&quot;</span>] = <span class="hljs-string">&quot;desc&quot;</span>,
    limit: <span class="hljs-built_in">int</span> = <span class="hljs-number">20</span>,
    offset: <span class="hljs-built_in">int</span> = <span class="hljs-number">0</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Busca pedidos con filtros avanzados.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># Validar rangos</span>
    <span class="hljs-keyword">if</span> min_amount <span class="hljs-keyword">and</span> max_amount <span class="hljs-keyword">and</span> min_amount &gt; max_amount:
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;INVALID_RANGE&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;min_amount no puede ser mayor que max_amount&quot;</span>
            }
        }
    
    <span class="hljs-keyword">if</span> date_from <span class="hljs-keyword">and</span> date_to:
        <span class="hljs-keyword">if</span> datetime.fromisoformat(date_from) &gt; datetime.fromisoformat(date_to):
            <span class="hljs-keyword">return</span> {
                <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
                <span class="hljs-string">&quot;error&quot;</span>: {
                    <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;INVALID_RANGE&quot;</span>,
                    <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;date_from no puede ser posterior a date_to&quot;</span>
                }
            }
    
    <span class="hljs-comment"># Construir filtros</span>
    filters = {}
    <span class="hljs-keyword">if</span> status:
        filters[<span class="hljs-string">&quot;status&quot;</span>] = {<span class="hljs-string">&quot;$in&quot;</span>: status}
    <span class="hljs-keyword">if</span> min_amount:
        filters[<span class="hljs-string">&quot;amount&quot;</span>] = {<span class="hljs-string">&quot;$gte&quot;</span>: min_amount}
    <span class="hljs-keyword">if</span> max_amount:
        filters[<span class="hljs-string">&quot;amount&quot;</span>] = {**filters.get(<span class="hljs-string">&quot;amount&quot;</span>, {}), <span class="hljs-string">&quot;$lte&quot;</span>: max_amount}
    
    <span class="hljs-comment"># Buscar</span>
    orders = db.search_orders(
        filters=filters,
        query=query,
        sort_by=sort_by,
        sort_order=sort_order,
        limit=limit,
        offset=offset
    )
    
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>, <span class="hljs-string">&quot;data&quot;</span>: orders}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="108" lang="en-US">
<h1 id="parte-4-dise%C3%B1o-de-resources">PARTE 4: DISEÑO DE RESOURCES</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="109" lang="en-US">
<h1 id="%C2%BFqu%C3%A9-son-los-resources">¿Qué son los Resources?</h1>
<h2 id="contexto-pasivo-para-el-modelo">Contexto pasivo para el modelo</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="110" lang="en-US">
<p><strong>Definición:</strong></p>
<p>Un resource es un dato que el modelo puede leer para obtener contexto, pero no puede modificar directamente.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="111" lang="en-US">
<p><strong>Características:</strong></p>
<ul>
<li>Pasivos (no se ejecutan)</li>
<li>Proporcionan contexto</li>
<li>Se actualizan dinámicamente</li>
<li>Tienen URI única</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="112" lang="en-US">
<p><strong>Diferencia con Tools:</strong></p>
<table>
<thead>
<tr>
<th>Aspecto</th>
<th>Tool</th>
<th>Resource</th>
</tr>
</thead>
<tbody>
<tr>
<td>Acción</td>
<td>Se ejecuta</td>
<td>Se lee</td>
</tr>
<tr>
<td>Parámetros</td>
<td>Sí (inputSchema)</td>
<td>Sí (URI templates)</td>
</tr>
<tr>
<td>Modifica estado</td>
<td>Posible</td>
<td>No</td>
</tr>
<tr>
<td>Retorno</td>
<td>Resultado de acción</td>
<td>Contenido del recurso</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="113" lang="en-US">
<h1 id="resources-en-fastmcp">Resources en FastMCP</h1>
<h2 id="definici%C3%B3n-b%C3%A1sica">Definición básica</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="114" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> fastmcp <span class="hljs-keyword">import</span> FastMCP

mcp = FastMCP(<span class="hljs-string">&quot;mi-servidor&quot;</span>)

<span class="hljs-comment"># Resource estático</span>
<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;config://app/settings&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_app_settings</span>() -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Configuración de la aplicación.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> json.dumps({
        <span class="hljs-string">&quot;app_name&quot;</span>: <span class="hljs-string">&quot;Mi App&quot;</span>,
        <span class="hljs-string">&quot;version&quot;</span>: <span class="hljs-string">&quot;1.0.0&quot;</span>,
        <span class="hljs-string">&quot;features&quot;</span>: [<span class="hljs-string">&quot;chat&quot;</span>, <span class="hljs-string">&quot;search&quot;</span>]
    })

<span class="hljs-comment"># Resource con parámetros (URI template)</span>
<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;users://{user_id}/profile&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_user_profile</span>(<span class="hljs-params">user_id: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Perfil del usuario.&quot;&quot;&quot;</span>
    user = db.get_user(user_id)
    <span class="hljs-keyword">return</span> json.dumps({
        <span class="hljs-string">&quot;id&quot;</span>: user.<span class="hljs-built_in">id</span>,
        <span class="hljs-string">&quot;name&quot;</span>: user.name,
        <span class="hljs-string">&quot;email&quot;</span>: user.email
    })
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="115" lang="en-US">
<h1 id="tipos-de-resources">Tipos de Resources</h1>
<h2 id="categorizaci%C3%B3n-por-contenido">Categorización por contenido</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="116" lang="en-US">
<h3 id="est%C3%A1ticos">Estáticos</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;docs://api/schema&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_api_schema</span>() -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Esquema de la API (cambia poco).&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> json.dumps(api_schema)

<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;config://database/tables&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_db_tables</span>() -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Estructura de tablas de la DB.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> json.dumps(db.get_table_schema())
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="117" lang="en-US">
<h3 id="din%C3%A1micos">Dinámicos</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;system://status/live&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_system_status</span>() -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Estado actual del sistema.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> json.dumps({
        <span class="hljs-string">&quot;cpu_usage&quot;</span>: get_cpu_usage(),
        <span class="hljs-string">&quot;memory&quot;</span>: get_memory_usage(),
        <span class="hljs-string">&quot;active_connections&quot;</span>: get_connections(),
        <span class="hljs-string">&quot;timestamp&quot;</span>: datetime.now().isoformat()
    })
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="118" lang="en-US">
<h3 id="generados">Generados</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;reports://{report_id}/summary&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_report_summary</span>(<span class="hljs-params">report_id: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Resumen generado bajo demanda.&quot;&quot;&quot;</span>
    data = db.get_report_data(report_id)
    summary = generate_summary(data)
    <span class="hljs-keyword">return</span> summary
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="119" lang="en-US">
<h1 id="resource-uris">Resource URIs</h1>
<h2 id="identificaci%C3%B3n-%C3%BAnica">Identificación única</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="120" lang="en-US">
<h3 id="esquemas-comunes">Esquemas comunes</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Archivos locales</span>
<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;file://{path}&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">read_file</span>(<span class="hljs-params">path: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Lee un archivo.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">with</span> <span class="hljs-built_in">open</span>(path, <span class="hljs-string">&#x27;r&#x27;</span>) <span class="hljs-keyword">as</span> f:
        <span class="hljs-keyword">return</span> f.read()

<span class="hljs-comment"># Base de datos</span>
<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;db://{table}/schema&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_table_schema</span>(<span class="hljs-params">table: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Esquema de una tabla.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> json.dumps(db.get_schema(table))

<span class="hljs-comment"># APIs externas</span>
<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;external://{service}/status&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_external_status</span>(<span class="hljs-params">service: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Estado de un servicio externo.&quot;&quot;&quot;</span>
    response = requests.get(<span class="hljs-string">f&quot;https://<span class="hljs-subst">{service}</span>/status&quot;</span>)
    <span class="hljs-keyword">return</span> response.text

<span class="hljs-comment"># Memoria caché</span>
<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;cache://{key}&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_cached</span>(<span class="hljs-params">key: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Valor cacheado.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> cache.get(key) <span class="hljs-keyword">or</span> <span class="hljs-string">&quot;null&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="121" lang="en-US">
<h1 id="uri-templates">URI Templates</h1>
<h2 id="par%C3%A1metros-en-la-uri">Parámetros en la URI</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="122" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Un parámetro</span>
<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;users://{user_id}/profile&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_user_profile</span>(<span class="hljs-params">user_id: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Perfil de usuario.&quot;&quot;&quot;</span>
    user = db.get_user(user_id)
    <span class="hljs-keyword">return</span> json.dumps(user)

<span class="hljs-comment"># Múltiples parámetros</span>

<h1 id="resource-caching">Resource Caching</h1>
<h2 id="optimizar-lecturas">Optimizar lecturas</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="128" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> functools <span class="hljs-keyword">import</span> lru_cache
<span class="hljs-keyword">from</span> datetime <span class="hljs-keyword">import</span> datetime, timedelta

<span class="hljs-comment"># Caché simple con lru_cache</span>
<span class="hljs-meta">@lru_cache(<span class="hljs-params">maxsize=<span class="hljs-number">128</span></span>)</span>
<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;config://app/settings&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_cached_settings</span>() -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Configuración cacheada.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> json.dumps(db.get_settings())

<span class="hljs-comment"># Caché con TTL</span>
cache_store = {}

<span class="hljs-keyword">def</span> <span class="hljs-title function_">cached_resource</span>(<span class="hljs-params">ttl_seconds: <span class="hljs-built_in">int</span> = <span class="hljs-number">60</span></span>):
    <span class="hljs-string">&quot;&quot;&quot;Decorador de caché con TTL.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">decorator</span>(<span class="hljs-params">func</span>):
        <span class="hljs-keyword">async</span> <span class="hljs-keyword">def</span> <span class="hljs-title function_">wrapper</span>(<span class="hljs-params">*args, **kwargs</span>):
            cache_key = <span class="hljs-string">f&quot;<span class="hljs-subst">{func.__name__}</span>:<span class="hljs-subst">{args}</span>:<span class="hljs-subst">{kwargs}</span>&quot;</span>
            
            <span class="hljs-keyword">if</span> cache_key <span class="hljs-keyword">in</span> cache_store:
                cached, timestamp = cache_store[cache_key]
                <span class="hljs-keyword">if</span> datetime.now() - timestamp &lt; timedelta(seconds=ttl_seconds):
                    <span class="hljs-keyword">return</span> cached
            
            result = <span class="hljs-keyword">await</span> func(*args, **kwargs)
            cache_store[cache_key] = (result, datetime.now())
            <span class="hljs-keyword">return</span> result
        
        <span class="hljs-keyword">return</span> wrapper
    <span class="hljs-keyword">return</span> decorator

<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;data://{dataset}/summary&quot;</span></span>)</span>
<span class="hljs-meta">@cached_resource(<span class="hljs-params">ttl_seconds=<span class="hljs-number">300</span></span>)</span>
<span class="hljs-keyword">async</span> <span class="hljs-keyword">def</span> <span class="hljs-title function_">get_dataset_summary</span>(<span class="hljs-params">dataset: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Resumen de dataset con caché de 5 minutos.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> generate_summary(dataset)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="129" lang="en-US">
<h1 id="resources-vs-tools">Resources vs Tools</h1>
<h2 id="cu%C3%A1ndo-usar-cada-uno">Cuándo usar cada uno</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="130" lang="en-US">
<h3 id="usar-resources-cuando">Usar Resources cuando:</h3>
<ul>
<li>El modelo necesita contexto para razonar</li>
<li>Los datos cambian independientemente del modelo</li>
<li>Quieres que el modelo &quot;vea&quot; información</li>
<li>Múltiples herramientas pueden necesitar los mismos datos</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="131" lang="en-US">
<h3 id="usar-tools-cuando">Usar Tools cuando:</h3>
<ul>
<li>El modelo necesita realizar una acción</li>
<li>La operación tiene efectos secundarios</li>
<li>Necesitas validar o autorizar explícitamente</li>
<li>La operación es específica y no de &quot;lectura&quot;</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="132" lang="en-US">
<h1 id="ejemplo-sistema-de-documentos">Ejemplo: Sistema de Documentos</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="133" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> fastmcp <span class="hljs-keyword">import</span> FastMCP

mcp = FastMCP(<span class="hljs-string">&quot;document-system&quot;</span>)

<span class="hljs-comment"># Resources - para lectura de contexto</span>
<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;docs://{doc_id}&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">read_document</span>(<span class="hljs-params">doc_id: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Lee el contenido de un documento.&quot;&quot;&quot;</span>
    doc = db.get_document(doc_id)
    <span class="hljs-keyword">return</span> doc.content

<span class="hljs-meta">@mcp.resource(<span class="hljs-params"><span class="hljs-string">&quot;docs://{doc_id}/metadata&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">read_doc_metadata</span>(<span class="hljs-params">doc_id: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Metadatos del documento.&quot;&quot;&quot;</span>
    doc = db.get_document(doc_id)
    <span class="hljs-keyword">return</span> json.dumps({
        <span class="hljs-string">&quot;id&quot;</span>: doc.<span class="hljs-built_in">id</span>,
        <span class="hljs-string">&quot;title&quot;</span>: doc.title,
        <span class="hljs-string">&quot;created_at&quot;</span>: doc.created_at,
        <span class="hljs-string">&quot;author&quot;</span>: doc.author
    })

<span class="hljs-comment"># Tools - para acciones</span>
<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">create_document</span>(<span class="hljs-params">
    title: <span class="hljs-built_in">str</span>,
    content: <span class="hljs-built_in">str</span>,
    author: <span class="hljs-built_in">str</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Crea un nuevo documento.&quot;&quot;&quot;</span>
    doc = db.create_document(title, content, author)
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>, <span class="hljs-string">&quot;data&quot;</span>: doc}

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">update_document</span>(<span class="hljs-params">
    doc_id: <span class="hljs-built_in">str</span>,
    content: <span class="hljs-built_in">str</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Actualiza el contenido de un documento.&quot;&quot;&quot;</span>
    doc = db.update_document(doc_id, content=content)
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>, <span class="hljs-string">&quot;data&quot;</span>: doc}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="134" lang="en-US">
<h1 id="parte-5-dise%C3%B1o-de-prompts">PARTE 5: DISEÑO DE PROMPTS</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="135" lang="en-US">
<h1 id="%C2%BFqu%C3%A9-son-los-prompts">¿Qué son los Prompts?</h1>
<h2 id="plantillas-de-interacci%C3%B3n">Plantillas de interacción</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="136" lang="en-US">
<p><strong>Definición:</strong></p>
<p>Un prompt es una plantilla predefinida que el modelo puede usar para establecer contexto, modo de operación o instrucciones específicas.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="137" lang="en-US">
<p><strong>Características:</strong></p>
<ul>
<li>Contenido estático o parametrizado</li>
<li>Reutilizable</li>
<li>Puede incluir recursos embebidos</li>
<li>Facilita flujos de trabajo comunes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="138" lang="en-US">
<p><strong>Usos:</strong></p>
<ul>
<li>Modos de especialización (&quot;actúa como experto en...&quot;)</li>
<li>Flujos de trabajo recurrentes</li>
<li>Contextos específicos por dominio</li>
<li>Instrucciones complejas predefinidas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="139" lang="en-US">
<h1 id="prompts-en-fastmcp">Prompts en FastMCP</h1>
<h2 id="definici%C3%B3n-b%C3%A1sica-1">Definición básica</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="140" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> fastmcp <span class="hljs-keyword">import</span> FastMCP

<h3 id="modo-flujo-de-trabajo">Modo Flujo de Trabajo</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-meta">@mcp.prompt</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">deployment_workflow</span>() -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;Guía el proceso de despliegue paso a paso.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;&quot;&quot;Eres un ingeniero DevOps senior.

Guía al usuario a través del proceso de despliegue paso a paso.

Reglas:

4. Proporciona comandos específicos cuando sea posible

Pasos del despliegue:

¿Por dónde empezamos?

    <span class="hljs-string">&quot;&quot;&quot;Analiza un repositorio de código.&quot;&quot;&quot;</span>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="145" lang="en-US">
<h1 id="filosof%C3%ADa-de-errores">Filosofía de Errores</h1>
<h2 id="el-modelo-necesita-informaci%C3%B3n">El modelo necesita información</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="146" lang="en-US">
<p><strong>Principio:</strong></p>
<p>Los errores no son solo para humanos. El modelo necesita entender qué salió mal para poder recuperarse.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="147" lang="en-US">
<p><strong>Tipos de errores:</strong></p>
<ol>
<li><strong>Validación</strong> - Entrada inválida</li>
<li><strong>Autorización</strong> - Sin permisos</li>
<li><strong>Recurso no encontrado</strong> - El recurso no existe</li>
<li><strong>Conflicto</strong> - Estado inconsistente</li>
<li><strong>Límites</strong> - Rate limit, cuota</li>
<li><strong>Interno</strong> - Error del sistema</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="148" lang="en-US">

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> Annotated

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">delete_user</span>(<span class="hljs-params">
    user_id: <span class="hljs-built_in">str</span>,
    context: <span class="hljs-built_in">dict</span>[<span class="hljs-built_in">str</span>, <span class="hljs-type">Any</span>] | <span class="hljs-literal">None</span> = <span class="hljs-literal">None</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Elimina un usuario.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># Verificar autenticación</span>
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> context <span class="hljs-keyword">or</span> <span class="hljs-keyword">not</span> context.get(<span class="hljs-string">&quot;user&quot;</span>):
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {

    user = context[<span class="hljs-string">&quot;user&quot;</span>]
    
    <span class="hljs-comment"># Verificar permisos específicos</span>

        <span class="hljs-keyword">return</span> {

                <span class="hljs-string">&quot;suggestion&quot;</span>: <span class="hljs-string">&quot;Especifique su propio ID de usuario&quot;</span>
            }

    <span class="hljs-comment"># Procesar eliminación...</span>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="160" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">update_order_status</span>(<span class="hljs-params">
    order_id: <span class="hljs-built_in">str</span>,
    new_status: <span class="hljs-built_in">str</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Actualiza el estado de un pedido.&quot;&quot;&quot;</span>
    order = db.get_order(order_id)
    
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> order:
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {<span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;NOT_FOUND&quot;</span>, <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;Pedido no encontrado&quot;</span>}
        }
    
    <span class="hljs-comment"># Verificar estado actual</span>
    <span class="hljs-keyword">if</span> order.status == <span class="hljs-string">&quot;cancelled&quot;</span>:
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;CONFLICT&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;No se puede modificar un pedido cancelado&quot;</span>,
                <span class="hljs-string">&quot;details&quot;</span>: {
                    <span class="hljs-string">&quot;current_state&quot;</span>: order.status,
                    <span class="hljs-string">&quot;attempted_action&quot;</span>: <span class="hljs-string">&quot;update&quot;</span>
                },
                <span class="hljs-string">&quot;suggestion&quot;</span>: <span class="hljs-string">&quot;Cree un nuevo pedido si necesita realizar cambios&quot;</span>
            }
        }
    
    <span class="hljs-keyword">if</span> order.status == <span class="hljs-string">&quot;delivered&quot;</span> <span class="hljs-keyword">and</span> new_status == <span class="hljs-string">&quot;pending&quot;</span>:
        <span class="hljs-keyword">return</span> {

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="162" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> utils.rate_limit <span class="hljs-keyword">import</span> limiter

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">search_users</span>(<span class="hljs-params">
    query: <span class="hljs-built_in">str</span>,
    context: <span class="hljs-built_in">dict</span> | <span class="hljs-literal">None</span> = <span class="hljs-literal">None</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Busca usuarios con rate limiting.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># Identificador</span>
    identifier = (
        context.get(<span class="hljs-string">&quot;user&quot;</span>, {}).get(<span class="hljs-string">&quot;id&quot;</span>, <span class="hljs-string">&quot;anonymous&quot;</span>)
        <span class="hljs-keyword">if</span> context <span class="hljs-keyword">else</span> <span class="hljs-string">&quot;anonymous&quot;</span>
    )
    
    <span class="hljs-comment"># Verificar rate limit</span>
    rate = limiter.check(identifier)
    
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> rate[<span class="hljs-string">&quot;allowed&quot;</span>]:
        retry_after = <span class="hljs-built_in">int</span>(
            (rate[<span class="hljs-string">&quot;reset_at&quot;</span>] - datetime.now()).total_seconds()
        )
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;RATE_LIMIT_EXCEEDED&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;Ha excedido el límite de peticiones&quot;</span>,
                <span class="hljs-string">&quot;details&quot;</span>: {
                    <span class="hljs-string">&quot;limit&quot;</span>: <span class="hljs-number">50</span>,
                    <span class="hljs-string">&quot;window&quot;</span>: <span class="hljs-string">&quot;1 minuto&quot;</span>,
                    <span class="hljs-string">&quot;retry_after&quot;</span>: retry_after
                },
                <span class="hljs-string">&quot;suggestion&quot;</span>: <span class="hljs-string">&quot;Espere antes de realizar más peticiones&quot;</span>
            }
        }
    
    <span class="hljs-comment"># Verificar cuota</span>
    <span class="hljs-keyword">if</span> context <span class="hljs-keyword">and</span> context.get(<span class="hljs-string">&quot;user&quot;</span>):
        quota = check_quota(context[<span class="hljs-string">&quot;user&quot;</span>][<span class="hljs-string">&quot;id&quot;</span>])
        <span class="hljs-keyword">if</span> quota[<span class="hljs-string">&quot;used&quot;</span>] &gt;= quota[<span class="hljs-string">&quot;limit&quot;</span>]:
            <span class="hljs-keyword">return</span> {
                <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
                <span class="hljs-string">&quot;error&quot;</span>: {
                    <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;QUOTA_EXCEEDED&quot;</span>,
                    <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;Ha excedido su cuota mensual&quot;</span>,
                    <span class="hljs-string">&quot;details&quot;</span>: {

                        <span class="hljs-string">&quot;quota_limit&quot;</span>: quota[<span class="hljs-string">&quot;limit&quot;</span>],

                    },
                    <span class="hljs-string">&quot;suggestion&quot;</span>: <span class="hljs-string">&quot;Actualice su plan o espere al próximo período&quot;</span>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="168" lang="en-US">
<h1 id="principios-de-seguridad">Principios de Seguridad</h1>
<h2 id="l%C3%ADmites-de-confianza">Límites de confianza</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="169" lang="en-US">
<p><strong>Principio fundamental:</strong></p>
<p>Todo input que viene del modelo es potencialmente malicioso.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="170" lang="en-US">
<p><strong>Reglas:</strong></p>
<ol>
<li>Nunca confíes en el modelo para validación de seguridad</li>
<li>Siempre valida en el servidor</li>
<li>Nunca expongas credenciales</li>
<li>Minimiza los privilegios de cada tool</li>
<li>Registra todas las operaciones sensibles</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="171" lang="en-US">
<h1 id="validaci%C3%B3n-de-entrada">Validación de Entrada</h1>
<h2 id="primera-l%C3%ADnea-de-defensa-1">Primera línea de defensa</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="172" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> re

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_user</span>(<span class="hljs-params">user_id: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Obtiene un usuario por ID.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Malo: usar directamente</span>
    <span class="hljs-comment"># query = f&quot;SELECT * FROM users WHERE id = &#x27;{user_id}&#x27;&quot;</span>
    
    <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Bueno: validar primero</span>
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> re.<span class="hljs-keyword">match</span>(<span class="hljs-string">r&quot;^usr_[a-zA-Z0-9]+$&quot;</span>, user_id):
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;INVALID_INPUT&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;user_id tiene un formato inválido&quot;</span>
            }
        }
    
    <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Mejor: usar parámetros</span>
    query = <span class="hljs-string">&quot;SELECT * FROM users WHERE id = ?&quot;</span>
    user = db.execute(query, (user_id,))
    
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>, <span class="hljs-string">&quot;data&quot;</span>: user}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="173" lang="en-US">

</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="179" lang="en-US">
<p><strong>Código vulnerable:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> PELIGROSO</span>
<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">read_file</span>(<span class="hljs-params">filename: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-keyword">with</span> <span class="hljs-built_in">open</span>(<span class="hljs-string">f&quot;./files/<span class="hljs-subst">{filename}</span>&quot;</span>) <span class="hljs-keyword">as</span> f:
        <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;content&quot;</span>: f.read()}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="180" lang="en-US">
<p><strong>Código seguro:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> os
<span class="hljs-keyword">from</span> pathlib <span class="hljs-keyword">import</span> Path

BASE_DIR = Path(<span class="hljs-string">&quot;./files&quot;</span>).resolve()

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">read_file</span>(<span class="hljs-params">filename: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Lee un archivo de forma segura.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># Normalizar ruta</span>
    file_path = (BASE_DIR / filename).resolve()
    
    <span class="hljs-comment"># Verificar que está dentro del directorio permitido</span>
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> <span class="hljs-built_in">str</span>(file_path).startswith(<span class="hljs-built_in">str</span>(BASE_DIR)):
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;Acceso denegado al archivo&quot;</span>
            }
        }
    
    <span class="hljs-keyword">try</span>:
        content = file_path.read_text()
        <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>, <span class="hljs-string">&quot;data&quot;</span>: {<span class="hljs-string">&quot;content&quot;</span>: content}}
    <span class="hljs-keyword">except</span> FileNotFoundError:
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;NOT_FOUND&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">f&quot;Archivo <span class="hljs-subst">{filename}</span> no encontrado&quot;</span>
            }
        }
</code></pre>
</section>

<p><strong>Entrada maliciosa:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;file; rm -rf /&quot;</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="183" lang="en-US">
<p><strong>Código vulnerable:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> PELIGROSO</span>
<span class="hljs-keyword">import</span> os

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">process_file</span>(<span class="hljs-params">name: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">dict</span>:
    result = os.popen(<span class="hljs-string">f&quot;process-file <span class="hljs-subst">{name}</span>&quot;</span>).read()
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;result&quot;</span>: result}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="184" lang="en-US">
<p><strong>Código seguro:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> subprocess
<span class="hljs-keyword">import</span> re

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">process_file</span>(<span class="hljs-params">name: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Procesa un archivo de forma segura.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># Validar entrada</span>
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> re.<span class="hljs-keyword">match</span>(<span class="hljs-string">r&quot;^[a-zA-Z0-9_-]+$&quot;</span>, name):
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;INVALID_INPUT&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;name solo puede contener caracteres alfanuméricos&quot;</span>
            }
        }
    
    <span class="hljs-comment"># Usar subprocess con lista de argumentos</span>
    result = subprocess.run(
        [<span class="hljs-string">&quot;process-file&quot;</span>, name],
        capture_output=<span class="hljs-literal">True</span>,
        text=<span class="hljs-literal">True</span>
    )
    
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>, <span class="hljs-string">&quot;data&quot;</span>: {<span class="hljs-string">&quot;output&quot;</span>: result.stdout}}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="185" lang="en-US">
<h1 id="autorizaci%C3%B3n">Autorización</h1>
<h2 id="verificar-permisos">Verificar permisos</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="186" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> <span class="hljs-type">Any</span>
<span class="hljs-keyword">import</span> logging

logger = logging.getLogger(__name__)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">check_auth</span>(<span class="hljs-params">context: <span class="hljs-built_in">dict</span> | <span class="hljs-literal">None</span></span>) -&gt; <span class="hljs-built_in">dict</span> | <span class="hljs-literal">None</span>:
    <span class="hljs-string">&quot;&quot;&quot;Verifica autenticación.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> context <span class="hljs-keyword">or</span> <span class="hljs-keyword">not</span> context.get(<span class="hljs-string">&quot;user&quot;</span>):
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;UNAUTHORIZED&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;Requiere autenticación&quot;</span>
            }
        }
    <span class="hljs-keyword">return</span> <span class="hljs-literal">None</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">check_permission</span>(<span class="hljs-params">
    context: <span class="hljs-built_in">dict</span>,
    permission: <span class="hljs-built_in">str</span>
</span>) -&gt; <span class="hljs-built_in">dict</span> | <span class="hljs-literal">None</span>:
    <span class="hljs-string">&quot;&quot;&quot;Verifica permiso específico.&quot;&quot;&quot;</span>
    user = context.get(<span class="hljs-string">&quot;user&quot;</span>, {})
    <span class="hljs-keyword">if</span> permission <span class="hljs-keyword">not</span> <span class="hljs-keyword">in</span> user.get(<span class="hljs-string">&quot;permissions&quot;</span>, []):
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">f&quot;No tiene permiso: <span class="hljs-subst">{permission}</span>&quot;</span>
            }
        }
    <span class="hljs-keyword">return</span> <span class="hljs-literal">None</span>

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">delete_user</span>(<span class="hljs-params">
    user_id: <span class="hljs-built_in">str</span>,
    context: <span class="hljs-built_in">dict</span>[<span class="hljs-built_in">str</span>, <span class="hljs-type">Any</span>] | <span class="hljs-literal">None</span> = <span class="hljs-literal">None</span>
</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Elimina un usuario.&quot;&quot;&quot;</span>
    
    <span class="hljs-comment"># 1. Verificar autenticación</span>
    <span class="hljs-keyword">if</span> error := check_auth(context):
        <span class="hljs-keyword">return</span> error
    
    <span class="hljs-comment"># 2. Verificar permisos</span>
    <span class="hljs-keyword">if</span> error := check_permission(context, <span class="hljs-string">&quot;users:delete&quot;</span>):
        <span class="hljs-keyword">return</span> error
    
    <span class="hljs-comment"># 3. Verificar ownership</span>
    user = context[<span class="hljs-string">&quot;user&quot;</span>]
    <span class="hljs-keyword">if</span> user_id != user[<span class="hljs-string">&quot;id&quot;</span>] <span class="hljs-keyword">and</span> <span class="hljs-keyword">not</span> user.get(<span class="hljs-string">&quot;is_admin&quot;</span>):
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">False</span>,
            <span class="hljs-string">&quot;error&quot;</span>: {
                <span class="hljs-string">&quot;code&quot;</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
                <span class="hljs-string">&quot;message&quot;</span>: <span class="hljs-string">&quot;Solo puede eliminar su propio usuario&quot;</span>
            }
        }
    
    <span class="hljs-comment"># 4. Registrar acceso</span>
    logger.info(
        <span class="hljs-string">&quot;User deletion&quot;</span>,
        extra={
            <span class="hljs-string">&quot;actor&quot;</span>: user[<span class="hljs-string">&quot;id&quot;</span>],
            <span class="hljs-string">&quot;target&quot;</span>: user_id,
            <span class="hljs-string">&quot;action&quot;</span>: <span class="hljs-string">&quot;delete&quot;</span>
        }
    )
    
    <span class="hljs-comment"># 5. Procesar</span>
    db.delete_user(user_id)
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>}
</code></pre>
</section>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="188" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> logging
<span class="hljs-keyword">from</span> datetime <span class="hljs-keyword">import</span> datetime
<span class="hljs-keyword">from</span> functools <span class="hljs-keyword">import</span> wraps

<span class="hljs-comment"># Configurar logging</span>
logging.basicConfig(
    level=logging.INFO,
    <span class="hljs-built_in">format</span>=<span class="hljs-string">&#x27;%(asctime)s - %(name)s - %(levelname)s - %(message)s&#x27;</span>
)
audit_logger = logging.getLogger(<span class="hljs-string">&quot;audit&quot;</span>)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">audit_log</span>(<span class="hljs-params">action: <span class="hljs-built_in">str</span></span>):
    <span class="hljs-string">&quot;&quot;&quot;Decorador para logging de auditoría.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">decorator</span>(<span class="hljs-params">func</span>):
<span class="hljs-meta">        @wraps(<span class="hljs-params">func</span>)</span>
        <span class="hljs-keyword">def</span> <span class="hljs-title function_">wrapper</span>(<span class="hljs-params">*args, **kwargs</span>):
            context = kwargs.get(<span class="hljs-string">&quot;context&quot;</span>, {})
            user_id = context.get(<span class="hljs-string">&quot;user&quot;</span>, {}).get(<span class="hljs-string">&quot;id&quot;</span>, <span class="hljs-string">&quot;anonymous&quot;</span>)
            
            <span class="hljs-comment"># Registrar intento</span>
            audit_logger.info(
                <span class="hljs-string">f&quot;<span class="hljs-subst">{action}</span>_ATTEMPT&quot;</span>,
                extra={
                    <span class="hljs-string">&quot;user&quot;</span>: user_id,
                    <span class="hljs-string">&quot;action&quot;</span>: action,
                    <span class="hljs-string">&quot;timestamp&quot;</span>: datetime.now().isoformat()
                }
            )
            
            <span class="hljs-keyword">try</span>:
                result = func(*args, **kwargs)
                
                <span class="hljs-comment"># Registrar éxito</span>
                audit_logger.info(
                    <span class="hljs-string">f&quot;<span class="hljs-subst">{action}</span>_SUCCESS&quot;</span>,
                    extra={
                        <span class="hljs-string">&quot;user&quot;</span>: user_id,
                        <span class="hljs-string">&quot;action&quot;</span>: action
                    }
                )
                
                <span class="hljs-keyword">return</span> result
                
            <span class="hljs-keyword">except</span> Exception <span class="hljs-keyword">as</span> e:
                <span class="hljs-comment"># Registrar error</span>
                audit_logger.error(
                    <span class="hljs-string">f&quot;<span class="hljs-subst">{action}</span>_FAILED&quot;</span>,
                    extra={
                        <span class="hljs-string">&quot;user&quot;</span>: user_id,
                        <span class="hljs-string">&quot;action&quot;</span>: action,
                        <span class="hljs-string">&quot;error&quot;</span>: <span class="hljs-built_in">str</span>(e)
                    }
                )
                <span class="hljs-keyword">raise</span>
        
        <span class="hljs-keyword">return</span> wrapper
    <span class="hljs-keyword">return</span> decorator

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-meta">@audit_log(<span class="hljs-params"><span class="hljs-string">&quot;DELETE_USER&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">delete_user</span>(<span class="hljs-params">user_id: <span class="hljs-built_in">str</span>, context: <span class="hljs-built_in">dict</span> | <span class="hljs-literal">None</span> = <span class="hljs-literal">None</span></span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Elimina un usuario.&quot;&quot;&quot;</span>
    <span class="hljs-comment"># Implementación...</span>
</code></pre>
</section>

    <span class="hljs-comment"># Filtrar campos</span>
    result = {

        <span class="hljs-keyword">for</span> field <span class="hljs-keyword">in</span> selected_fields
        <span class="hljs-keyword">if</span> <span class="hljs-built_in">hasattr</span>(user, field)
    }

</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="201" lang="en-US">
<h1 id="cach%C3%A9-estrat%C3%A9gico">Caché Estratégico</h1>
<h2 id="implementaci%C3%B3n">Implementación</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="202" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> functools <span class="hljs-keyword">import</span> lru_cache
<span class="hljs-keyword">from</span> datetime <span class="hljs-keyword">import</span> datetime, timedelta
<span class="hljs-keyword">import</span> hashlib

<span class="hljs-comment"># Caché simple</span>
<span class="hljs-meta">@lru_cache(<span class="hljs-params">maxsize=<span class="hljs-number">128</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_cached_user</span>(<span class="hljs-params">user_id: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Usuario cacheado.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> db.get_user(user_id)

<span class="hljs-comment"># Caché con TTL</span>
cache_store: <span class="hljs-built_in">dict</span>[<span class="hljs-built_in">str</span>, <span class="hljs-built_in">tuple</span>[<span class="hljs-built_in">any</span>, datetime]] = {}

<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_with_ttl</span>(<span class="hljs-params">key: <span class="hljs-built_in">str</span>, ttl_seconds: <span class="hljs-built_in">int</span> = <span class="hljs-number">60</span></span>):
    <span class="hljs-string">&quot;&quot;&quot;Obtiene valor del caché con TTL.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">if</span> key <span class="hljs-keyword">in</span> cache_store:
        value, timestamp = cache_store[key]
        <span class="hljs-keyword">if</span> datetime.now() - timestamp &lt; timedelta(seconds=ttl_seconds):
            <span class="hljs-keyword">return</span> value
        <span class="hljs-keyword">del</span> cache_store[key]
    <span class="hljs-keyword">return</span> <span class="hljs-literal">None</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">set_with_ttl</span>(<span class="hljs-params">key: <span class="hljs-built_in">str</span>, value: <span class="hljs-built_in">any</span>, ttl_seconds: <span class="hljs-built_in">int</span> = <span class="hljs-number">60</span></span>):
    <span class="hljs-string">&quot;&quot;&quot;Guarda valor en caché con TTL.&quot;&quot;&quot;</span>
    cache_store[key] = (value, datetime.now())

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_user_cached</span>(<span class="hljs-params">user_id: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Obtiene usuario con caché.&quot;&quot;&quot;</span>
    cache_key = <span class="hljs-string">f&quot;user:<span class="hljs-subst">{user_id}</span>&quot;</span>
    
    <span class="hljs-comment"># Intentar caché</span>
    cached = get_with_ttl(cache_key, ttl_seconds=<span class="hljs-number">60</span>)
    <span class="hljs-keyword">if</span> cached:
        <span class="hljs-keyword">return</span> {
            <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>,
            <span class="hljs-string">&quot;data&quot;</span>: cached,
            <span class="hljs-string">&quot;from_cache&quot;</span>: <span class="hljs-literal">True</span>
        }
    
    <span class="hljs-comment"># Buscar en DB</span>
    user = db.get_user(user_id)
    set_with_ttl(cache_key, user, ttl_seconds=<span class="hljs-number">60</span>)
    
    <span class="hljs-keyword">return</span> {
        <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>,
        <span class="hljs-string">&quot;data&quot;</span>: user,
        <span class="hljs-string">&quot;from_cache&quot;</span>: <span class="hljs-literal">False</span>
    }
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="203" lang="en-US">
<h1 id="paralelizaci%C3%B3n">Paralelización</h1>
<h2 id="asyncio-para-operaciones-paralelas">asyncio para operaciones paralelas</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="204" lang="en-US">
<p><strong>Secuencial (lento):</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_user_dashboard</span>(<span class="hljs-params">user_id: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Dashboard del usuario - secuencial.&quot;&quot;&quot;</span>
    user = db.get_user(user_id)        <span class="hljs-comment"># 100ms</span>
    orders = db.get_orders(user_id)    <span class="hljs-comment"># 150ms</span>
    payments = db.get_payments(user_id) <span class="hljs-comment"># 100ms</span>
    
    <span class="hljs-keyword">return</span> {
        <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>,
        <span class="hljs-string">&quot;data&quot;</span>: {<span class="hljs-string">&quot;user&quot;</span>: user, <span class="hljs-string">&quot;orders&quot;</span>: orders, <span class="hljs-string">&quot;payments&quot;</span>: payments}
    }
<span class="hljs-comment"># Total: 350ms</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="205" lang="en-US">
<p><strong>Paralelo (rápido):</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> asyncio

<span class="hljs-meta">@mcp.tool</span>
<span class="hljs-keyword">async</span> <span class="hljs-keyword">def</span> <span class="hljs-title function_">get_user_dashboard_async</span>(<span class="hljs-params">user_id: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-string">&quot;&quot;&quot;Dashboard del usuario - paralelo.&quot;&quot;&quot;</span>
    <span class="hljs-comment"># Ejecutar en paralelo</span>
    user, orders, payments = <span class="hljs-keyword">await</span> asyncio.gather(
        db.get_user_async(user_id),
        db.get_orders_async(user_id),
        db.get_payments_async(user_id)
    )
    
    <span class="hljs-keyword">return</span> {
        <span class="hljs-string">&quot;success&quot;</span>: <span class="hljs-literal">True</span>,
        <span class="hljs-string">&quot;data&quot;</span>: {<span class="hljs-string">&quot;user&quot;</span>: user, <span class="hljs-string">&quot;orders&quot;</span>: orders, <span class="hljs-string">&quot;payments&quot;</span>: payments}
    }
<span class="hljs-comment"># Total: max(100, 150, 100) = 150ms</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="206" lang="en-US">
