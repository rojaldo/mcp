</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="100" lang="en-US">
<h1 id="outputschema">outputSchema</h1>
<h2 id="documentar-lo-que-devuelve">Documentar lo que devuelve</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="101" lang="en-US">
<p><strong>¿Por qué outputSchema?</strong></p>
<ul>
<li>Permite al modelo entender la estructura de respuesta</li>
<li>Facilita testing automatizado</li>
<li>Mejora la depuración</li>
<li>Herramientas pueden generar interfaces</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="102" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-string">&quot;name&quot;</span>: <span class="hljs-string">&quot;getUser&quot;</span>,
  <span class="hljs-string">&quot;inputSchema&quot;</span>: { ... },
  <span class="hljs-string">&quot;outputSchema&quot;</span>: {
    <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;object&quot;</span>,
    <span class="hljs-string">&quot;properties&quot;</span>: {
      <span class="hljs-string">&quot;success&quot;</span>: { <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;boolean&quot;</span> },
      <span class="hljs-string">&quot;data&quot;</span>: {
        <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;object&quot;</span>,
        <span class="hljs-string">&quot;properties&quot;</span>: {
          <span class="hljs-string">&quot;id&quot;</span>: { <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;string&quot;</span> },
          <span class="hljs-string">&quot;name&quot;</span>: { <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;string&quot;</span> },
          <span class="hljs-string">&quot;email&quot;</span>: { <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;string&quot;</span> },
          <span class="hljs-string">&quot;createdAt&quot;</span>: { <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;string&quot;</span>, <span class="hljs-string">&quot;format&quot;</span>: <span class="hljs-string">&quot;date-time&quot;</span> }
        }
      },
      <span class="hljs-string">&quot;error&quot;</span>: {
        <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;object&quot;</span>,
        <span class="hljs-string">&quot;properties&quot;</span>: {
          <span class="hljs-string">&quot;code&quot;</span>: { <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;string&quot;</span> },
          <span class="hljs-string">&quot;message&quot;</span>: { <span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;string&quot;</span> }
        }
      }
    }
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="103" lang="en-US">
<h1 id="annotations">Annotations</h1>
<h2 id="metadatos-importantes">Metadatos importantes</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="104" lang="en-US">
<h3 id="readonlyhint">readOnlyHint</h3>
<p><code>true</code> si la tool no modifica estado.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;getUser&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;annotations&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;readOnlyHint&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span> <span class="hljs-punctuation">}</span> <span class="hljs-punctuation">}</span>
</code></pre>
<p><strong>Uso:</strong> Los clientes pueden ejecutar tools de solo lectura sin confirmación.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="105" lang="en-US">
<h3 id="destructivehint">destructiveHint</h3>
<p><code>true</code> si la tool tiene efectos destructivos irreversibles.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;deleteUser&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;annotations&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;destructiveHint&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span> <span class="hljs-punctuation">}</span> <span class="hljs-punctuation">}</span>
</code></pre>
<p><strong>Uso:</strong> Los clientes deben mostrar confirmación explícita.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="106" lang="en-US">
<h3 id="idempotenthint">idempotentHint</h3>
<p><code>true</code> si llamar múltiples veces tiene el mismo efecto que una vez.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;setConfig&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;annotations&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;idempotentHint&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span> <span class="hljs-punctuation">}</span> <span class="hljs-punctuation">}</span>
</code></pre>
<p><strong>Uso:</strong> Los clientes pueden reintentar automáticamente.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="107" lang="en-US">
<h3 id="openworldhint">openWorldHint</h3>
<p><code>true</code> si la tool interactúa con sistemas externos.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;name&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;sendEmail&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;annotations&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;openWorldHint&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span> <span class="hljs-punctuation">}</span> <span class="hljs-punctuation">}</span>
</code></pre>
<p><strong>Uso:</strong> Los clientes deben considerar implicaciones de privacidad.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="108" lang="en-US">
<h1 id="tool-lectura-vs-escritura">Tool: Lectura vs Escritura</h1>
<h2 id="diferencias-de-dise%C3%B1o">Diferencias de diseño</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="109" lang="en-US">
<h3 id="read-tools-readonlyhint-true">Read Tools (readOnlyHint: true)</h3>
<p><strong>Características:</strong></p>
<ul>
<li>No modifican datos</li>
<li>Seguras de ejecutar sin confirmación</li>
<li>Pueden ser cacheadas</li>
<li>Pueden ser paralelizadas</li>
</ul>
<p><strong>Consideraciones:</strong></p>
<ul>
<li>Incluir paginación para listas grandes</li>
<li>Documentar filtros disponibles</li>
<li>Devolver solo datos necesarios (minimizar tokens)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="110" lang="en-US">
<h3 id="write-tools-readonlyhint-false">Write Tools (readOnlyHint: false)</h3>
<p><strong>Características:</strong></p>
<ul>
<li>Modifican estado</li>
<li>Requieren consideración del usuario</li>
<li>No cacheables</li>
<li>Deben ser serializadas si dependientes</li>
</ul>
<p><strong>Consideraciones:</strong></p>
<ul>
<li>Incluir validación completa</li>
<li>Devolver el estado resultante</li>
<li>Documentar efectos secundarios</li>
<li>Considerar idempotencia</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="111" lang="en-US">
<h1 id="idempotencia">Idempotencia</h1>
<h2 id="dise%C3%B1ar-para-reintentos">Diseñar para reintentos</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="112" lang="en-US">
<p><strong>Principio:</strong></p>
<p>Una operación es idempotente si ejecutarla múltiples veces tiene el mismo efecto que ejecutarla una vez.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="113" lang="en-US">
<p><strong>¿Por qué importa?</strong></p>
<ul>
<li>Los clientes pueden reintentar errores de red</li>
<li>El usuario puede hacer clic dos veces</li>
<li>Sistemas distribuidos pueden duplicar mensajes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="114" lang="en-US">
<h1 id="idempotencia---patr%C3%B3n-con-id">Idempotencia - Patrón con ID</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="115" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;createOrder&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">idempotencyKey</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
        <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Clave única para evitar duplicados. Genere un UUID para cada operación nueva.&quot;</span>
      },
      <span class="hljs-attr">items</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;array&quot;</span>,
        <span class="hljs-attr">items</span>: { ... }
      }
    },
    <span class="hljs-attr">required</span>: [<span class="hljs-string">&quot;idempotencyKey&quot;</span>, <span class="hljs-string">&quot;items&quot;</span>]
  },
  <span class="hljs-attr">annotations</span>: { <span class="hljs-string">&quot;idempotentHint&quot;</span>: <span class="hljs-literal">true</span> },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
    <span class="hljs-comment">// Verificar si ya existe</span>
    <span class="hljs-keyword">const</span> existing = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getOrderByKey</span>(input.<span class="hljs-property">idempotencyKey</span>);
    <span class="hljs-keyword">if</span> (existing) {
      <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: existing, <span class="hljs-attr">idempotent</span>: <span class="hljs-literal">true</span> };
    }
    
    <span class="hljs-comment">// Crear nuevo</span>
    <span class="hljs-keyword">const</span> order = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">createOrder</span>(input);
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: order, <span class="hljs-attr">idempotent</span>: <span class="hljs-literal">false</span> };
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="116" lang="en-US">
<h1 id="paginaci%C3%B3n">Paginación</h1>
<h2 id="manejar-grandes-conjuntos-de-datos">Manejar grandes conjuntos de datos</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="117" lang="en-US">
<p><strong>Problema:</strong></p>
<p>Devolver 10.000 usuarios consume demasiados tokens y tiempo.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="118" lang="en-US">
<p><strong>Solución:</strong></p>
<p>Paginación con cursor o desplazamiento.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="119" lang="en-US">
<h3 id="paginaci%C3%B3n-por-desplazamiento">Paginación por Desplazamiento</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;listUsers&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">limit</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;integer&quot;</span>, <span class="hljs-attr">minimum</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">maximum</span>: <span class="hljs-number">100</span>, <span class="hljs-attr">default</span>: <span class="hljs-number">20</span> },
      <span class="hljs-attr">offset</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;integer&quot;</span>, <span class="hljs-attr">minimum</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">default</span>: <span class="hljs-number">0</span> }
    }
  },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
    <span class="hljs-keyword">const</span> users = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getUsers</span>(input.<span class="hljs-property">limit</span>, input.<span class="hljs-property">offset</span>);
    <span class="hljs-keyword">const</span> total = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">countUsers</span>();
    
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>,
      <span class="hljs-attr">data</span>: {
        <span class="hljs-attr">items</span>: users,
        total,
        <span class="hljs-attr">hasMore</span>: (input.<span class="hljs-property">offset</span> + input.<span class="hljs-property">limit</span>) &lt; total
      }
    };
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="120" lang="en-US">
<h3 id="paginaci%C3%B3n-por-cursor">Paginación por Cursor</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;listUsers&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">limit</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;integer&quot;</span>, <span class="hljs-attr">default</span>: <span class="hljs-number">20</span> },
      <span class="hljs-attr">cursor</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>, <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Token de la página anterior&quot;</span> }
    }
  },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
    <span class="hljs-keyword">const</span> decodedCursor = input.<span class="hljs-property">cursor</span> 
      ? <span class="hljs-title class_">JSON</span>.<span class="hljs-title function_">parse</span>(<span class="hljs-title class_">Buffer</span>.<span class="hljs-title function_">from</span>(input.<span class="hljs-property">cursor</span>, <span class="hljs-string">&#x27;base64&#x27;</span>).<span class="hljs-title function_">toString</span>())
      : { <span class="hljs-attr">lastId</span>: <span class="hljs-literal">null</span> };
    
    <span class="hljs-keyword">const</span> users = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getUsersAfter</span>(decodedCursor.<span class="hljs-property">lastId</span>, input.<span class="hljs-property">limit</span>);
    
    <span class="hljs-keyword">const</span> nextCursor = users.<span class="hljs-property">length</span> === input.<span class="hljs-property">limit</span>
      ? <span class="hljs-title class_">Buffer</span>.<span class="hljs-title function_">from</span>(<span class="hljs-title class_">JSON</span>.<span class="hljs-title function_">stringify</span>({ <span class="hljs-attr">lastId</span>: users[users.<span class="hljs-property">length</span> - <span class="hljs-number">1</span>].<span class="hljs-property">id</span> })).<span class="hljs-title function_">toString</span>(<span class="hljs-string">&#x27;base64&#x27;</span>)
      : <span class="hljs-literal">null</span>;
    
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>,
      <span class="hljs-attr">data</span>: {
        <span class="hljs-attr">items</span>: users,
        nextCursor
      }
    };
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="121" lang="en-US">
<h1 id="filtrado-y-b%C3%BAsqueda">Filtrado y Búsqueda</h1>
<h2 id="encontrar-lo-que-se-necesita">Encontrar lo que se necesita</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="122" lang="en-US">
<h3 id="patr%C3%B3n-de-filtros">Patrón de Filtros</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;searchOrders&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: {
    <span class="hljs-attr">properties</span>: {
      <span class="hljs-attr">query</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>, <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Texto a buscar&quot;</span> },
      <span class="hljs-attr">status</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;array&quot;</span>,
        <span class="hljs-attr">items</span>: { <span class="hljs-string">&quot;enum&quot;</span>: [<span class="hljs-string">&quot;pending&quot;</span>, <span class="hljs-string">&quot;processing&quot;</span>, <span class="hljs-string">&quot;shipped&quot;</span>, <span class="hljs-string">&quot;delivered&quot;</span>, <span class="hljs-string">&quot;cancelled&quot;</span>] },
        <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Filtrar por estados (puede ser múltiple)&quot;</span>
      },
      <span class="hljs-attr">dateFrom</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>, <span class="hljs-string">&quot;format&quot;</span>: <span class="hljs-string">&quot;date-time&quot;</span> },
      <span class="hljs-attr">dateTo</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>, <span class="hljs-string">&quot;format&quot;</span>: <span class="hljs-string">&quot;date-time&quot;</span> },
      <span class="hljs-attr">minAmount</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;number&quot;</span>, <span class="hljs-attr">minimum</span>: <span class="hljs-number">0</span> },
      <span class="hljs-attr">maxAmount</span>: { <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;number&quot;</span>, <span class="hljs-attr">minimum</span>: <span class="hljs-number">0</span> },
      <span class="hljs-attr">sortBy</span>: { <span class="hljs-string">&quot;enum&quot;</span>: [<span class="hljs-string">&quot;date&quot;</span>, <span class="hljs-string">&quot;amount&quot;</span>, <span class="hljs-string">&quot;status&quot;</span>] },
      <span class="hljs-attr">sortOrder</span>: { <span class="hljs-string">&quot;enum&quot;</span>: [<span class="hljs-string">&quot;asc&quot;</span>, <span class="hljs-string">&quot;desc&quot;</span>] }
    }
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="123" lang="en-US">
<h3 id="validaci%C3%B3n-de-filtros">Validación de Filtros</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
  <span class="hljs-comment">// Validar rangos</span>
  <span class="hljs-keyword">if</span> (input.<span class="hljs-property">minAmount</span> &amp;&amp; input.<span class="hljs-property">maxAmount</span> &amp;&amp; input.<span class="hljs-property">minAmount</span> &gt; input.<span class="hljs-property">maxAmount</span>) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;INVALID_RANGE&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;minAmount no puede ser mayor que maxAmount&quot;</span>
      }
    };
  }
  
  <span class="hljs-keyword">if</span> (input.<span class="hljs-property">dateFrom</span> &amp;&amp; input.<span class="hljs-property">dateTo</span> &amp;&amp; <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>(input.<span class="hljs-property">dateFrom</span>) &gt; <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>(input.<span class="hljs-property">dateTo</span>)) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;INVALID_RANGE&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;dateFrom no puede ser posterior a dateTo&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// Construir query</span>
  <span class="hljs-keyword">const</span> filters = {};
  <span class="hljs-keyword">if</span> (input.<span class="hljs-property">status</span>) filters.<span class="hljs-property">status</span> = { <span class="hljs-attr">$in</span>: input.<span class="hljs-property">status</span> };
  <span class="hljs-keyword">if</span> (input.<span class="hljs-property">minAmount</span>) filters.<span class="hljs-property">amount</span> = { <span class="hljs-attr">$gte</span>: input.<span class="hljs-property">minAmount</span> };
  <span class="hljs-comment">// ...</span>
  
  <span class="hljs-keyword">return</span> <span class="hljs-keyword">await</span> <span class="hljs-title function_">searchOrders</span>(filters, input);
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="124" lang="en-US">
<h1 id="parte-4-dise%C3%B1o-de-resources">PARTE 4: DISEÑO DE RESOURCES</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="125" lang="en-US">
<h1 id="%C2%BFqu%C3%A9-son-los-resources">¿Qué son los Resources?</h1>
<h2 id="contexto-pasivo-para-el-modelo">Contexto pasivo para el modelo</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="126" lang="en-US">
<p><strong>Definición:</strong></p>
<p>Un resource es un dato que el modelo puede leer para obtener contexto, pero no puede modificar directamente.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="127" lang="en-US">
<p><strong>Características:</strong></p>
<ul>
<li>Pasivos (no se ejecutan)</li>
<li>Proporcionan contexto</li>
<li>Se actualizan dinámicamente</li>
<li>Tienen URI única</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="128" lang="en-US">
<p><strong>Diferencia con Tools:</strong></p>
<table>
<thead>
<tr>
<th>Aspecto</th>
<th>Tool</th>
<th>Resource</th>
</tr>
</thead>
<tbody>
<tr>
<td>Acción</td>
<td>Se ejecuta</td>
<td>Se lee</td>
</tr>
<tr>
<td>Parámetros</td>
<td>Sí (inputSchema)</td>
<td>Sí (URI templates)</td>
</tr>
<tr>
<td>Modifica estado</td>
<td>Posible</td>
<td>No</td>
</tr>
<tr>
<td>Retorno</td>
<td>Resultado de acción</td>
<td>Contenido del recurso</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="129" lang="en-US">
<h1 id="tipos-de-resources">Tipos de Resources</h1>
<h2 id="categorizaci%C3%B3n-por-contenido">Categorización por contenido</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="130" lang="en-US">
<h3 id="est%C3%A1ticos">Estáticos</h3>
<p>Contenido que no cambia frecuentemente.</p>
<ul>
<li>Documentación</li>
<li>Configuración del sistema</li>
<li>Esquemas de base de datos</li>
<li>Versiones de API</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="131" lang="en-US">
<h3 id="din%C3%A1micos">Dinámicos</h3>
<p>Contenido que cambia con el tiempo.</p>
<ul>
<li>Estado actual del sistema</li>
<li>Logs recientes</li>
<li>Métricas en vivo</li>
<li>Contenido del usuario</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="132" lang="en-US">
<h3 id="generados">Generados</h3>
<p>Contenido creado bajo demanda.</p>
<ul>
<li>Informes</li>
<li>Resúmenes</li>
<li>Análisis</li>
<li>Consultas complejas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="133" lang="en-US">
<h1 id="resource-uris">Resource URIs</h1>
<h2 id="identificaci%C3%B3n-%C3%BAnica">Identificación única</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="134" lang="en-US">
<h3 id="esquemas-comunes">Esquemas comunes</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>file:///path/to/file           - Archivos locales
postgres://host/db/table       - Tablas de base de datos
https://api.example.com/data   - APIs externas
memory://cache/key            - Memoria caché
app://internal/resource       - Recursos internos
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="135" lang="en-US">
<h3 id="uri-templates">URI Templates</h3>
<p>Permiten parámetros en la URI.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>users://{userId}/profile
repos://{owner}/{repo}/issues
logs://{service}/{date}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="136" lang="en-US">
<h1 id="definici%C3%B3n-de-resource">Definición de Resource</h1>
<h2 id="estructura-completa-1">Estructura completa</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="137" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">uri</span>: <span class="hljs-string">&quot;users://{userId}/profile&quot;</span>,
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Perfil de Usuario&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Información del perfil del usuario solicitado&quot;</span>,
  <span class="hljs-attr">mimeType</span>: <span class="hljs-string">&quot;application/json&quot;</span>,
  <span class="hljs-attr">template</span>: {
    <span class="hljs-attr">parameters</span>: {
      <span class="hljs-attr">userId</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;string&quot;</span>,
        <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;ID del usuario&quot;</span>,
        <span class="hljs-attr">pattern</span>: <span class="hljs-string">&quot;^usr_[a-zA-Z0-9]+$&quot;</span>
      }
    }
  }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="138" lang="en-US">
<h1 id="resource-handlers">Resource Handlers</h1>
<h2 id="lectura-de-recursos">Lectura de recursos</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="139" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">server.<span class="hljs-title function_">addResource</span>({
  <span class="hljs-attr">uri</span>: <span class="hljs-string">&quot;users://{userId}/profile&quot;</span>,
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Perfil de Usuario&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Información del perfil del usuario&quot;</span>,
  <span class="hljs-attr">mimeType</span>: <span class="hljs-string">&quot;application/json&quot;</span>,
  
  <span class="hljs-attr">read</span>: <span class="hljs-title function_">async</span> (uri, params, context) =&gt; {
    <span class="hljs-keyword">const</span> { userId } = params;
    
    <span class="hljs-comment">// Validar acceso</span>
    <span class="hljs-keyword">if</span> (!context.<span class="hljs-property">user</span> || context.<span class="hljs-property">user</span>.<span class="hljs-property">id</span> !== userId) {
      <span class="hljs-keyword">throw</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Error</span>(<span class="hljs-string">&quot;UNAUTHORIZED&quot;</span>);
    }
    
    <span class="hljs-comment">// Obtener datos</span>
    <span class="hljs-keyword">const</span> user = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getUser</span>(userId);
    
    <span class="hljs-keyword">if</span> (!user) {
      <span class="hljs-keyword">throw</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Error</span>(<span class="hljs-string">&quot;NOT_FOUND&quot;</span>);
    }
    
    <span class="hljs-comment">// Devolver contenido</span>
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">contents</span>: [{
        <span class="hljs-attr">uri</span>: <span class="hljs-string">`users://<span class="hljs-subst">${userId}</span>/profile`</span>,
        <span class="hljs-attr">mimeType</span>: <span class="hljs-string">&quot;application/json&quot;</span>,
        <span class="hljs-attr">text</span>: <span class="hljs-title class_">JSON</span>.<span class="hljs-title function_">stringify</span>({
          <span class="hljs-attr">id</span>: user.<span class="hljs-property">id</span>,
          <span class="hljs-attr">name</span>: user.<span class="hljs-property">name</span>,
          <span class="hljs-attr">email</span>: user.<span class="hljs-property">email</span>,
          <span class="hljs-attr">createdAt</span>: user.<span class="hljs-property">createdAt</span>
        })
      }]
    };
  }
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="140" lang="en-US">
<h1 id="resource-subscriptions">Resource Subscriptions</h1>
<h2 id="actualizaciones-en-tiempo-real">Actualizaciones en tiempo real</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="141" lang="en-US">
<p><strong>Problema:</strong></p>
<p>El modelo lee un resource pero los datos pueden cambiar.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="142" lang="en-US">
<p><strong>Solución:</strong></p>
<p>Permitir suscripciones a cambios.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="143" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">server.<span class="hljs-title function_">addResource</span>({
  <span class="hljs-attr">uri</span>: <span class="hljs-string">&quot;logs://system/live&quot;</span>,
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Logs del Sistema&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Logs en tiempo real&quot;</span>,
  <span class="hljs-attr">mimeType</span>: <span class="hljs-string">&quot;text/plain&quot;</span>,
  
  <span class="hljs-attr">read</span>: <span class="hljs-title function_">async</span> (uri) =&gt; {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">contents</span>: [{
        uri,
        <span class="hljs-attr">mimeType</span>: <span class="hljs-string">&quot;text/plain&quot;</span>,
        <span class="hljs-attr">text</span>: <span class="hljs-keyword">await</span> <span class="hljs-title function_">getRecentLogs</span>(<span class="hljs-number">100</span>)
      }]
    };
  },
  
  <span class="hljs-attr">subscribe</span>: <span class="hljs-title function_">async</span> (uri, context) =&gt; {
    <span class="hljs-comment">// Enviar actualizaciones cuando hay nuevos logs</span>
    <span class="hljs-keyword">const</span> interval = <span class="hljs-built_in">setInterval</span>(<span class="hljs-title function_">async</span> () =&gt; {
      <span class="hljs-keyword">const</span> newLogs = <span class="hljs-keyword">await</span> <span class="hljs-title function_">getNewLogs</span>();
      <span class="hljs-keyword">if</span> (newLogs.<span class="hljs-property">length</span> &gt; <span class="hljs-number">0</span>) {
        context.<span class="hljs-title function_">send</span>({
          uri,
          <span class="hljs-attr">contents</span>: [{
            uri,
            <span class="hljs-attr">mimeType</span>: <span class="hljs-string">&quot;text/plain&quot;</span>,
            <span class="hljs-attr">text</span>: newLogs.<span class="hljs-title function_">join</span>(<span class="hljs-string">&#x27;\n&#x27;</span>)
          }]
        });
      }
    }, <span class="hljs-number">1000</span>);
    
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">unsubscribe</span>: <span class="hljs-function">() =&gt;</span> <span class="hljs-built_in">clearInterval</span>(interval) };
  }
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="144" lang="en-US">
<h1 id="resource-caching">Resource Caching</h1>
<h2 id="optimizar-lecturas-frecuentes-1">Optimizar lecturas frecuentes</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="145" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">const</span> resourceCache = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Map</span>();

server.<span class="hljs-title function_">addResource</span>({
  <span class="hljs-attr">uri</span>: <span class="hljs-string">&quot;config://app/settings&quot;</span>,
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Configuración de la Aplicación&quot;</span>,
  
  <span class="hljs-attr">read</span>: <span class="hljs-title function_">async</span> (uri) =&gt; {
    <span class="hljs-comment">// Verificar caché</span>
    <span class="hljs-keyword">const</span> cached = resourceCache.<span class="hljs-title function_">get</span>(uri);
    <span class="hljs-keyword">if</span> (cached &amp;&amp; <span class="hljs-title class_">Date</span>.<span class="hljs-title function_">now</span>() - cached.<span class="hljs-property">timestamp</span> &lt; <span class="hljs-number">60000</span>) {
      <span class="hljs-keyword">return</span> cached.<span class="hljs-property">data</span>;
    }
    
    <span class="hljs-comment">// Obtener fresco</span>
    <span class="hljs-keyword">const</span> settings = <span class="hljs-keyword">await</span> db.<span class="hljs-title function_">getSettings</span>();
    <span class="hljs-keyword">const</span> data = {
      <span class="hljs-attr">contents</span>: [{
        uri,
        <span class="hljs-attr">mimeType</span>: <span class="hljs-string">&quot;application/json&quot;</span>,
        <span class="hljs-attr">text</span>: <span class="hljs-title class_">JSON</span>.<span class="hljs-title function_">stringify</span>(settings)
      }]
    };
    
    <span class="hljs-comment">// Guardar en caché</span>
    resourceCache.<span class="hljs-title function_">set</span>(uri, {
      data,
      <span class="hljs-attr">timestamp</span>: <span class="hljs-title class_">Date</span>.<span class="hljs-title function_">now</span>()
    });
    
    <span class="hljs-keyword">return</span> data;
  }
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="146" lang="en-US">
<h1 id="resources-vs-tools">Resources vs Tools</h1>
<h2 id="cu%C3%A1ndo-usar-cada-uno">Cuándo usar cada uno</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="147" lang="en-US">
<h3 id="usar-resources-cuando">Usar Resources cuando:</h3>
<ul>
<li>El modelo necesita contexto para razonar</li>
<li>Los datos cambian independientemente del modelo</li>
<li>Quieres que el modelo &quot;vea&quot; información</li>
<li>Múltiples herramientas pueden necesitar los mismos datos</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="148" lang="en-US">
<h3 id="usar-tools-cuando">Usar Tools cuando:</h3>
<ul>
<li>El modelo necesita realizar una acción</li>
<li>La operación tiene efectos secundarios</li>
<li>Necesitas validar o autorizar explícitamente</li>
<li>La operación es específica y no de &quot;lectura&quot;</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="149" lang="en-US">
<h1 id="ejemplo-sistema-de-documentos">Ejemplo: Sistema de Documentos</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="150" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-comment">// Resources - para lectura de contexto</span>
server.<span class="hljs-title function_">addResource</span>({
  <span class="hljs-attr">uri</span>: <span class="hljs-string">&quot;docs://{docId}&quot;</span>,
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Documento&quot;</span>,
  <span class="hljs-attr">read</span>: <span class="hljs-title function_">async</span> (uri, params) =&gt; {
    <span class="hljs-keyword">const</span> doc = <span class="hljs-keyword">await</span> <span class="hljs-title function_">getDocument</span>(params.<span class="hljs-property">docId</span>);
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">contents</span>: [{ uri, <span class="hljs-attr">text</span>: doc.<span class="hljs-property">content</span> }] };
  }
});

<span class="hljs-comment">// Tools - para acciones</span>
server.<span class="hljs-title function_">addTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;createDocument&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: { ... },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
    <span class="hljs-keyword">const</span> doc = <span class="hljs-keyword">await</span> <span class="hljs-title function_">createDocument</span>(input);
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: doc };
  }
});

server.<span class="hljs-title function_">addTool</span>({
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;updateDocument&quot;</span>,
  <span class="hljs-attr">inputSchema</span>: { ... },
  <span class="hljs-attr">execute</span>: <span class="hljs-title function_">async</span> (input) =&gt; {
    <span class="hljs-keyword">const</span> doc = <span class="hljs-keyword">await</span> <span class="hljs-title function_">updateDocument</span>(input);
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">success</span>: <span class="hljs-literal">true</span>, <span class="hljs-attr">data</span>: doc };
  }
});
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="151" lang="en-US">
<h1 id="parte-5-dise%C3%B1o-de-prompts">PARTE 5: DISEÑO DE PROMPTS</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="152" lang="en-US">
<h1 id="%C2%BFqu%C3%A9-son-los-prompts">¿Qué son los Prompts?</h1>
<h2 id="plantillas-de-interacci%C3%B3n">Plantillas de interacción</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="153" lang="en-US">
<p><strong>Definición:</strong></p>
<p>Un prompt es una plantilla predefinida que el modelo puede usar para establecer contexto, modo de operación o instrucciones específicas.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="154" lang="en-US">
<p><strong>Características:</strong></p>
<ul>
<li>Contenido estático o parametrizado</li>
<li>Reutilizable</li>
<li>Puede incluir recursos embebidos</li>
<li>Facilita flujos de trabajo comunes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="155" lang="en-US">
<p><strong>Usos:</strong></p>
<ul>
<li>Modos de especialización (&quot;actúa como experto en...&quot;)</li>
<li>Flujos de trabajo recurrentes</li>
<li>Contextos específicos por dominio</li>
<li>Instrucciones complejas predefinidas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="156" lang="en-US">
<h1 id="definici%C3%B3n-de-prompt">Definición de Prompt</h1>
<h2 id="estructura-completa-2">Estructura completa</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="157" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;code-review&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Revisa código fuente buscando errores y mejoras&quot;</span>,
  <span class="hljs-attr">arguments</span>: [
    {
      <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;language&quot;</span>,
      <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Lenguaje de programación&quot;</span>,
      <span class="hljs-attr">required</span>: <span class="hljs-literal">true</span>
    },
    {
      <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;focus&quot;</span>,
      <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Área de enfoque (security, performance, style)&quot;</span>,
      <span class="hljs-attr">required</span>: <span class="hljs-literal">false</span>
    }
  ],
  <span class="hljs-attr">messages</span>: [
    {
      <span class="hljs-attr">role</span>: <span class="hljs-string">&quot;user&quot;</span>,
      <span class="hljs-attr">content</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;text&quot;</span>,
        <span class="hljs-attr">text</span>: <span class="hljs-string">&quot;Por favor, revisa el siguiente código {{language}}:\n\n{{code}}&quot;</span>
      }
    }
  ]
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="158" lang="en-US">
<h1 id="prompt-templates">Prompt Templates</h1>
<h2 id="parametrizaci%C3%B3n">Parametrización</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="159" lang="en-US">
<h3 id="sintaxis-de-template">Sintaxis de Template</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>{{parametro}}       - Valor del argumento
{{?parametro}}      - Condicional (solo si existe)
{{param:default}}    - Con valor por defecto
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="160" lang="en-US">
<h3 id="ejemplo-completo">Ejemplo Completo</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;analyze-data&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Analiza datos y genera insights&quot;</span>,
  <span class="hljs-attr">arguments</span>: [
    { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;dataType&quot;</span>, <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Tipo de datos&quot;</span>, <span class="hljs-attr">required</span>: <span class="hljs-literal">true</span> },
    { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;depth&quot;</span>, <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Profundidad del análisis (basic, detailed)&quot;</span>, <span class="hljs-attr">required</span>: <span class="hljs-literal">false</span> },
    { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;format&quot;</span>, <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Formato de salida&quot;</span>, <span class="hljs-attr">required</span>: <span class="hljs-literal">false</span> }
  ],
  <span class="hljs-attr">messages</span>: [
    {
      <span class="hljs-attr">role</span>: <span class="hljs-string">&quot;system&quot;</span>,
      <span class="hljs-attr">content</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;text&quot;</span>,
        <span class="hljs-attr">text</span>: <span class="hljs-string">&quot;Eres un analista de datos experto. Tu especialidad es {{dataType}}.&quot;</span>
      }
    },
    {
      <span class="hljs-attr">role</span>: <span class="hljs-string">&quot;user&quot;</span>,
      <span class="hljs-attr">content</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;text&quot;</span>,
        <span class="hljs-attr">text</span>: <span class="hljs-string">&quot;Analiza los siguientes datos con profundidad {{depth:basic}}.{{?format}} Presenta los resultados en formato {{format}}.{{/format}}\n\n{{data}}&quot;</span>
      }
    }
  ]
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="161" lang="en-US">
<h1 id="prompts-con-resources">Prompts con Resources</h1>
<h2 id="composici%C3%B3n">Composición</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="162" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;analyze-repository&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Analiza un repositorio de código&quot;</span>,
  <span class="hljs-attr">arguments</span>: [
    { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;repo&quot;</span>, <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;URL del repositorio&quot;</span>, <span class="hljs-attr">required</span>: <span class="hljs-literal">true</span> },
    { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;branch&quot;</span>, <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Rama a analizar&quot;</span>, <span class="hljs-attr">required</span>: <span class="hljs-literal">false</span> }
  ],
  <span class="hljs-attr">resources</span>: [
    {
      <span class="hljs-attr">uri</span>: <span class="hljs-string">&quot;repo://{{repo}}/structure&quot;</span>,
      <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Estructura del repositorio&quot;</span>
    },
    {
      <span class="hljs-attr">uri</span>: <span class="hljs-string">&quot;repo://{{repo}}/{{branch:main}}/readme&quot;</span>,
      <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;README del repositorio&quot;</span>
    }
  ],
  <span class="hljs-attr">messages</span>: [
    {
      <span class="hljs-attr">role</span>: <span class="hljs-string">&quot;system&quot;</span>,
      <span class="hljs-attr">content</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;text&quot;</span>,
        <span class="hljs-attr">text</span>: <span class="hljs-string">&quot;Eres un arquitecto de software. Analiza el repositorio y proporciona recomendaciones.&quot;</span>
      }
    },
    {
      <span class="hljs-attr">role</span>: <span class="hljs-string">&quot;user&quot;</span>,
      <span class="hljs-attr">content</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;text&quot;</span>,
        <span class="hljs-attr">text</span>: <span class="hljs-string">&quot;Analiza el repositorio {{repo}} y proporciona:\n1. Resumen de arquitectura\n2. Tecnologías utilizadas\n3. Calidad del código\n4. Recomendaciones&quot;</span>
      }
    }
  ]
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="163" lang="en-US">
<h1 id="prompts-especializados">Prompts Especializados</h1>
<h2 id="modos-de-operaci%C3%B3n">Modos de operación</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="164" lang="en-US">
<h3 id="modo-experto">Modo Experto</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;security-audit&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Auditoría de seguridad de código&quot;</span>,
  <span class="hljs-attr">arguments</span>: [
    { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;severity&quot;</span>, <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Nivel mínimo de severidad (low, medium, high, critical)&quot;</span>, <span class="hljs-attr">required</span>: <span class="hljs-literal">false</span> }
  ],
  <span class="hljs-attr">messages</span>: [
    {
      <span class="hljs-attr">role</span>: <span class="hljs-string">&quot;system&quot;</span>,
      <span class="hljs-attr">content</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;text&quot;</span>,
        <span class="hljs-attr">text</span>: <span class="hljs-string">&quot;Eres un experto en seguridad informática con 20 años de experiencia. Tu especialidad es identificar vulnerabilidades en código. Para cada problema encontrado, indica:\n- Tipo de vulnerabilidad (OWASP Top 10)\n- Severidad (low, medium, high, critical)\n- Ubicación exacta\n- Recomendación de corrección\n- Referencias a CVEs si aplica&quot;</span>
      }
    }
  ]
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="165" lang="en-US">
<h3 id="modo-flujo-de-trabajo">Modo Flujo de Trabajo</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript">{
  <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;deployment-workflow&quot;</span>,
  <span class="hljs-attr">description</span>: <span class="hljs-string">&quot;Guía el proceso de despliegue&quot;</span>,
  <span class="hljs-attr">arguments</span>: [],
  <span class="hljs-attr">messages</span>: [
    {
      <span class="hljs-attr">role</span>: <span class="hljs-string">&quot;system&quot;</span>,

        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;text&quot;</span>,

      }
    },
    {
      <span class="hljs-attr">role</span>: <span class="hljs-string">&quot;user&quot;</span>,
      <span class="hljs-attr">content</span>: {
        <span class="hljs-attr">type</span>: <span class="hljs-string">&quot;text&quot;</span>,

  ]
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="166" lang="en-US">
<h1 id="parte-6-manejo-de-errores">PARTE 6: MANEJO DE ERRORES</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="167" lang="en-US">
<h1 id="filosof%C3%ADa-de-errores">Filosofía de Errores</h1>
<h2 id="el-modelo-necesita-informaci%C3%B3n">El modelo necesita información</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="168" lang="en-US">
<p><strong>Principio:</strong></p>
<p>Los errores no son solo para humanos. El modelo necesita entender qué salió mal para poder recuperarse.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="169" lang="en-US">
<p><strong>Tipos de errores:</strong></p>
<ol>
<li><strong>Validación</strong> - Entrada inválida</li>
<li><strong>Autorización</strong> - Sin permisos</li>
<li><strong>Recurso no encontrado</strong> - El recurso no existe</li>
<li><strong>Conflicto</strong> - Estado inconsistente</li>
<li><strong>Límites</strong> - Rate limit, cuota</li>
<li><strong>Interno</strong> - Error del sistema</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="170" lang="en-US">
<h1 id="estructura-de-error">Estructura de Error</h1>
<h2 id="formato-est%C3%A1ndar">Formato estándar</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="171" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;success&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">false</span></span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;error&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;code&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;VALIDATION_ERROR&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;message&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;El campo &#x27;email&#x27; no tiene un formato válido&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;details&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;field&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;email&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;value&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;not-an-email&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;expected&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Formato: usuario@dominio.com&quot;</span>
    <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;suggestion&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Verifique el formato del email e inténtelo de nuevo&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;requestId&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;req_abc123&quot;</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="172" lang="en-US">
<h1 id="c%C3%B3digos-de-error">Códigos de Error</h1>
<h2 id="taxonom%C3%ADa-est%C3%A1ndar">Taxonomía estándar</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="173" lang="en-US">

<thead>
<tr>

</tr>

</tr>
<tr>

</tbody>

<h2 id="entrada-incorrecta">Entrada incorrecta</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="175" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {
  <span class="hljs-keyword">const</span> errors = [];
  
  <span class="hljs-comment">// Validar campos obligatorios</span>
  <span class="hljs-keyword">if</span> (!input.<span class="hljs-property">email</span>) {
    errors.<span class="hljs-title function_">push</span>({
      <span class="hljs-attr">field</span>: <span class="hljs-string">&quot;email&quot;</span>,
      <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;MISSING_PARAMETER&quot;</span>,
      <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;email es obligatorio&quot;</span>
    });
  }
  
  <span class="hljs-comment">// Validar formato</span>
  <span class="hljs-keyword">if</span> (input.<span class="hljs-property">email</span> &amp;&amp; !<span class="hljs-title function_">isValidEmail</span>(input.<span class="hljs-property">email</span>)) {
    errors.<span class="hljs-title function_">push</span>({
      <span class="hljs-attr">field</span>: <span class="hljs-string">&quot;email&quot;</span>,
      <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;INVALID_FORMAT&quot;</span>,
      <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;email no tiene un formato válido&quot;</span>,
      <span class="hljs-attr">value</span>: input.<span class="hljs-property">email</span>,
      <span class="hljs-attr">expected</span>: <span class="hljs-string">&quot;usuario@dominio.com&quot;</span>
    });
  }
  
  <span class="hljs-comment">// Validar rango</span>
  <span class="hljs-keyword">if</span> (input.<span class="hljs-property">age</span> &amp;&amp; (input.<span class="hljs-property">age</span> &lt; <span class="hljs-number">0</span> || input.<span class="hljs-property">age</span> &gt; <span class="hljs-number">150</span>)) {
    errors.<span class="hljs-title function_">push</span>({
      <span class="hljs-attr">field</span>: <span class="hljs-string">&quot;age&quot;</span>,
      <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;OUT_OF_RANGE&quot;</span>,
      <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;age debe estar entre 0 y 150&quot;</span>,
      <span class="hljs-attr">value</span>: input.<span class="hljs-property">age</span>,
      <span class="hljs-attr">min</span>: <span class="hljs-number">0</span>,
      <span class="hljs-attr">max</span>: <span class="hljs-number">150</span>
    });
  }
  
  <span class="hljs-keyword">if</span> (errors.<span class="hljs-property">length</span> &gt; <span class="hljs-number">0</span>) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;VALIDATION_ERROR&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Se encontraron errores de validación&quot;</span>,
        <span class="hljs-attr">details</span>: errors
      }
    };
  }
  
  <span class="hljs-comment">// Procesar...</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="176" lang="en-US">

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="177" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input, context</span>) {
  <span class="hljs-comment">// Verificar autenticación</span>
  <span class="hljs-keyword">if</span> (!context.<span class="hljs-property">user</span>) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;UNAUTHORIZED&quot;</span>,

        <span class="hljs-attr">suggestion</span>: <span class="hljs-string">&quot;Inicie sesión y vuelva a intentarlo&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// Verificar permisos específicos</span>
  <span class="hljs-keyword">if</span> (!context.<span class="hljs-property">user</span>.<span class="hljs-property">permissions</span>.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&quot;users:delete&quot;</span>)) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;No tiene permisos para eliminar usuarios&quot;</span>,
        <span class="hljs-attr">requiredPermission</span>: <span class="hljs-string">&quot;users:delete&quot;</span>,
        <span class="hljs-attr">currentPermissions</span>: context.<span class="hljs-property">user</span>.<span class="hljs-property">permissions</span>,
        <span class="hljs-attr">suggestion</span>: <span class="hljs-string">&quot;Contacte con el administrador para obtener el permiso necesario&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// Verificar ownership</span>
  <span class="hljs-keyword">if</span> (input.<span class="hljs-property">userId</span> !== context.<span class="hljs-property">user</span>.<span class="hljs-property">id</span> &amp;&amp; !context.<span class="hljs-property">user</span>.<span class="hljs-property">isAdmin</span>) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;FORBIDDEN&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Solo puede eliminar su propio usuario&quot;</span>,
        <span class="hljs-attr">suggestion</span>: <span class="hljs-string">&quot;Especifique su propio ID de usuario&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// Procesar...</span>
}
</code></pre>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="182" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input</span>) {

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="183" lang="en-US">

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="184" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">const</span> rateLimiter = <span class="hljs-keyword">new</span> <span class="hljs-title class_">RateLimiter</span>(<span class="hljs-number">100</span>, <span class="hljs-number">60000</span>); <span class="hljs-comment">// 100/min</span>

<span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input, context</span>) {
  <span class="hljs-keyword">const</span> identifier = context.<span class="hljs-property">user</span>?.<span class="hljs-property">id</span> || context.<span class="hljs-property">ip</span>;
  <span class="hljs-keyword">const</span> limit = rateLimiter.<span class="hljs-title function_">check</span>(identifier);
  
  <span class="hljs-keyword">if</span> (!limit.<span class="hljs-property">allowed</span>) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;RATE_LIMIT_EXCEEDED&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Ha excedido el límite de peticiones&quot;</span>,
        <span class="hljs-attr">limit</span>: <span class="hljs-number">100</span>,
        <span class="hljs-attr">window</span>: <span class="hljs-string">&quot;1 minuto&quot;</span>,
        <span class="hljs-attr">retryAfter</span>: <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">ceil</span>((limit.<span class="hljs-property">resetAt</span> - <span class="hljs-title class_">Date</span>.<span class="hljs-title function_">now</span>()) / <span class="hljs-number">1000</span>),
        <span class="hljs-attr">suggestion</span>: <span class="hljs-string">&quot;Espere antes de realizar más peticiones&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// Verificar cuota</span>
  <span class="hljs-keyword">const</span> quota = <span class="hljs-keyword">await</span> <span class="hljs-title function_">checkQuota</span>(context.<span class="hljs-property">user</span>);
  <span class="hljs-keyword">if</span> (quota.<span class="hljs-property">used</span> &gt;= quota.<span class="hljs-property">limit</span>) {
    <span class="hljs-keyword">return</span> {
      <span class="hljs-attr">success</span>: <span class="hljs-literal">false</span>,
      <span class="hljs-attr">error</span>: {
        <span class="hljs-attr">code</span>: <span class="hljs-string">&quot;QUOTA_EXCEEDED&quot;</span>,
        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Ha excedido su cuota mensual&quot;</span>,
        <span class="hljs-attr">quotaUsed</span>: quota.<span class="hljs-property">used</span>,
        <span class="hljs-attr">quotaLimit</span>: quota.<span class="hljs-property">limit</span>,
        <span class="hljs-attr">quotaReset</span>: quota.<span class="hljs-property">resetDate</span>,
        <span class="hljs-attr">suggestion</span>: <span class="hljs-string">&quot;Actualice su plan o espere al próximo período&quot;</span>
      }
    };
  }
  
  <span class="hljs-comment">// Procesar...</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="185" lang="en-US">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="186" lang="en-US">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-javascript"><span class="hljs-keyword">async</span> <span class="hljs-keyword">function</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">input, context</span>) {

  } <span class="hljs-keyword">catch</span> (error) {

        <span class="hljs-attr">ip</span>: context.<span class="hljs-property">ip</span>
      }

    <span class="hljs-comment">// Devolver error genérico</span>
    <span class="hljs-keyword">return</span> {

      <span class="hljs-attr">error</span>: {

        <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Ocurrió un error interno. Por favor, inténtelo más tarde.&quot;</span>,
        requestId,
        <span class="hljs-attr">suggestion</span>: <span class="hljs-string">&quot;Si el problema persiste, contacte con soporte con el ID de solicitud&quot;</span>
      }
    };
  }
}
</code></pre>
</section>
